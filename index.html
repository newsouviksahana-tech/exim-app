<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExIm Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0d1117;--surf:#161b27;--surf2:#1c2235;--surf3:#222840;
  --bdr:#2a3050;--bdr2:#353d5c;
  --txt:#e2e8f0;--txt2:#8892b0;--txt3:#4a5580;
  --blue:#4f9cf9;--blue2:#3b82f6;--green:#34d399;--amber:#fbbf24;
  --red:#f87171;--purple:#a78bfa;--cyan:#22d3ee;--pink:#f472b6;
  --r:10px;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surf)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* APP */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:224px;min-width:224px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:16px 14px 10px;border-bottom:1px solid var(--bdr)}
.logo h1{font-size:13px;font-weight:600;letter-spacing:-.2px}
.logo p{font-size:10px;color:var(--txt3);margin-top:2px;font-family:var(--mono)}
.db-pill{margin:8px 8px 2px;padding:5px 9px;border-radius:6px;font-size:10px;font-family:var(--mono);display:flex;align-items:center;gap:5px;border:1px solid}
.dbok{background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.2);color:var(--green)}
.dberr{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.2);color:var(--red)}
.dbload{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.2);color:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
.spn{display:inline-block;width:10px;height:10px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
.nav-grp{padding:10px 8px 2px;font-size:9px;font-weight:600;color:var(--txt3);letter-spacing:.12em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:pointer;border-radius:6px;margin:1px 4px;font-size:12px;color:var(--txt2);transition:all .12s}
.nav-item:hover{background:var(--surf2);color:var(--txt)}
.nav-item.active{background:rgba(79,156,249,.12);color:var(--blue);font-weight:500}
.ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:14px;font-weight:600;letter-spacing:-.2px}
.pbadge{font-size:9px;padding:1px 6px;border-radius:20px;background:var(--surf2);color:var(--txt3);margin-left:7px;font-family:var(--mono)}
.content{flex:1;overflow-y:auto;padding:14px 16px}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px}
.klbl{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.kval{font-size:22px;font-weight:600;font-family:var(--mono);letter-spacing:-1px}

/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.ctitle{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 9px;background:var(--surf2);font-weight:500;font-size:10px;color:var(--txt3);border-bottom:1px solid var(--bdr);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:6px 9px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.016)}
.mono{font-family:var(--mono);font-size:11px}

/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--mono)}
.bg{background:rgba(52,211,153,.1);color:var(--green)}
.bb{background:rgba(79,156,249,.1);color:var(--blue)}
.ba{background:rgba(251,191,36,.1);color:var(--amber)}
.br{background:rgba(248,113,113,.1);color:var(--red)}
.bp{background:rgba(167,139,250,.1);color:var(--purple)}
.bc{background:rgba(34,211,238,.1);color:var(--cyan)}
.bgr{background:var(--surf2);color:var(--txt3)}

/* BUTTONS */
button{cursor:pointer;border:1px solid var(--bdr2);background:var(--surf2);color:var(--txt2);border-radius:6px;padding:5px 11px;font-size:12px;font-family:var(--font);transition:all .12s;white-space:nowrap}
button:hover{background:var(--bdr);color:var(--txt)}
button.pri{background:var(--blue);color:#fff;border-color:transparent;font-weight:500}
button.pri:hover{background:var(--blue2)}
button.suc{background:rgba(52,211,153,.12);color:var(--green);border-color:rgba(52,211,153,.25)}
button.suc:hover{background:rgba(52,211,153,.2)}
button.dan{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.2)}
button.dan:hover{background:rgba(248,113,113,.2)}
button.ghost{background:transparent;border-color:transparent;color:var(--txt3)}
button.ghost:hover{background:var(--surf2);color:var(--txt)}
button.sm{padding:3px 8px;font-size:11px}
button.xs{padding:2px 6px;font-size:10px}

/* SEARCH */
.sbar{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.sbar input,.sbar select{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:12px;font-family:var(--font);color:var(--txt);outline:none;max-width:260px}
.sbar input:focus,.sbar select:focus{border-color:var(--blue)}
.sbar input::placeholder{color:var(--txt3)}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:40px 14px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:var(--surf);border:1px solid var(--bdr2);border-radius:12px;width:620px;max-width:96vw;padding:20px;max-height:88vh;overflow-y:auto}
.modal.lg{width:820px}
.modal h3{font-size:14px;font-weight:600;margin-bottom:16px;letter-spacing:-.2px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fgrp{display:flex;flex-direction:column;gap:3px}
.fgrp.full{grid-column:1/-1}
label{font-size:10px;color:var(--txt3);font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.fgrp input,.fgrp select,.fgrp textarea{background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:6px 9px;font-size:12px;font-family:var(--font);color:var(--txt);width:100%;outline:none;transition:border .12s}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--blue)}
.fgrp input.af{border-color:rgba(52,211,153,.4);color:var(--green)}
.fgrp select option{background:var(--surf2)}
textarea{resize:vertical;min-height:54px}
.mac{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;padding-top:12px;border-top:1px solid var(--bdr)}
.msec{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;padding:12px 0 6px;border-bottom:1px solid var(--bdr);grid-column:1/-1;margin-top:2px}

/* QUERY WINDOW */
.qwin{background:var(--surf2);border:1px solid var(--bdr2);border-radius:8px;padding:10px;margin-bottom:12px}
.qwin-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.qwin-title{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.08em}
.qwin-search{background:var(--surf);border:1px solid var(--bdr);border-radius:5px;padding:5px 8px;font-size:11px;font-family:var(--font);color:var(--txt);outline:none;width:200px}
.qwin-search::placeholder{color:var(--txt3)}
.qwin-search:focus{border-color:var(--blue)}
.qwin-list{max-height:190px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.qcard{background:var(--surf);border:1px solid var(--bdr);border-radius:7px;padding:9px 11px;cursor:pointer;transition:all .1s}
.qcard:hover{border-color:var(--blue);background:rgba(79,156,249,.05)}
.qcard.sel{border-color:var(--green);background:rgba(52,211,153,.06)}
.qcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.qcard-id{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--blue)}
.qcard-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.qtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.qtag{background:var(--surf2);border:1px solid var(--bdr);border-radius:3px;padding:1px 6px;font-size:10px;color:var(--txt2)}
.qtag.hi{color:var(--amber)}
.qtag.ok{color:var(--green)}
.bmark{display:flex;align-items:center;gap:5px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:6px;padding:4px 8px;margin-top:5px}
.bmark-lbl{font-size:9px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.bmark-val{font-size:11px;font-weight:500;color:var(--amber);font-family:var(--mono)}
.sel-pill{display:flex;align-items:center;gap:8px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:6px;padding:6px 10px;margin-top:6px}
.sel-pill-txt{font-size:11px;color:var(--green);font-weight:500;flex:1}

/* MISC */
.acell{display:flex;gap:3px}
.dok{color:var(--green);font-weight:500}
.dbad{color:var(--red);font-weight:500}
.empty{text-align:center;padding:30px;color:var(--txt3);font-size:12px;line-height:1.8}
.divider{height:1px;background:var(--bdr);margin:12px 0}
.ref-strip{display:none;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:7px;padding:8px 11px;grid-column:1/-1}
.ref-strip b{font-size:11px;font-weight:500;color:var(--green);display:block;margin-bottom:2px}
.ref-strip span{font-size:10px;color:var(--green);opacity:.8}

/* TOAST */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:18px;right:18px;padding:9px 15px;border-radius:9px;font-size:12px;z-index:9999;font-weight:500;border:1px solid;animation:fadeUp .2s ease}
.ts{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:var(--green)}
.te{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red)}
.tw{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--amber)}

/* ALERT BANNER */
.alert-banner{border-radius:8px;padding:9px 13px;margin-bottom:10px;border:1px solid;display:none}
.alert-red{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.25)}
.alert-amber{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.25)}
.alert-title{font-size:12px;font-weight:500;margin-bottom:2px}
.alert-red .alert-title{color:var(--red)}
.alert-amber .alert-title{color:var(--amber)}
.alert-sub{font-size:11px}
.alert-red .alert-sub{color:var(--red)}
.alert-amber .alert-sub{color:var(--amber)}

/* MULTI PLOT */
.plot-row{background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.plot-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.plot-lbl{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em}
.plot-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:7px}
.plot-grid .fgrp input,.plot-grid .fgrp select{font-size:11px;padding:5px 7px}
.add-link{background:none;border:none;font-size:11px;color:var(--blue);cursor:pointer;padding:4px 0;font-family:var(--font)}
.add-link:hover{opacity:.8}

/* GROUPS */
.grp-box{background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;overflow:hidden;margin-bottom:9px}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surf3);border-bottom:1px solid var(--bdr)}
.grp-hdr-l{display:flex;align-items:center;gap:8px}
.grp-num{width:20px;height:20px;border-radius:50%;background:rgba(79,156,249,.15);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid rgba(79,156,249,.3);flex-shrink:0}
.grp-name{background:transparent;border:none;font-size:12px;font-weight:500;color:var(--txt);font-family:var(--font);outline:none;width:170px}
.grp-name:focus{border-bottom:1px solid var(--blue)}
.grp-meta{font-size:10px;color:var(--txt3);margin-top:1px}
.grp-body{padding:12px}
.grp-surv{display:flex;align-items:center;gap:8px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--bdr)}
.grp-surv-lbl{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;min-width:110px}
.grp-surv input{max-width:180px;font-size:12px}
.grp-surv-note{font-size:10px;color:var(--txt3);margin-left:8px}
.col-hdrs{display:grid;gap:4px;margin-bottom:3px}
.col-hdr{font-size:9px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;text-align:center}
.con-row{display:grid;gap:4px;align-items:center;margin-bottom:4px}
.con-row input,.con-row select{font-size:11px;padding:4px 7px;background:var(--surf);border:1px solid var(--bdr);border-radius:5px;color:var(--txt);font-family:var(--font);outline:none;width:100%}
.con-row input:focus,.con-row select:focus{border-color:var(--blue)}
.con-row input.auto{border-color:rgba(52,211,153,.35);color:var(--green)}
.vbtn{background:var(--surf3);border:1px solid var(--bdr);border-radius:5px;padding:4px 7px;font-size:11px;color:var(--txt3);cursor:pointer;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .12s;width:100%}
.vbtn:hover{border-color:var(--blue);color:var(--txt)}
.vbtn.filled{border-color:rgba(52,211,153,.35);color:var(--green);font-weight:500}
.sovr{font-size:9px;color:var(--txt3);cursor:pointer;display:flex;align-items:center;gap:3px;margin-top:2px}
.sovr:hover{color:var(--blue)}
</style>
</head>
<body>
<div id="root"></div>
<div id="mroot"></div>

<script>
const SUPA_URL='https://wktdubbvddynyigxmoyb.supabase.co';
const SUPA_KEY='sb_publishable_-BjRXe1NkSTPQKQoRWDQVQ_Uu5CNZFX';
const{createClient}=supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

// ── State ──────────────────────────────────────────────────
const TABLES=['orders','purchases','containers','transporters','loading','surveyor_ef',
  'psi','cfs_trucks','cfs_stuffing','invoices','customs','shipping','payments','rates','product_specs'];

let S={
  page:'dashboard',
  recs:Object.fromEntries(TABLES.map(t=>[t,[]])),
  masters:{buyers:[],products:[],exporters:[],transporters:[]},
  dbStatus:'loading',search:'',
  // modal temp
  sel:{contract:null,booking:null,assignment:null,vendor1:null,vendor2:null},
  groups:[],groupCounter:0,
  plots:[],plotCounter:0,
  qSearch:{contract:'',booking:'',assignment:'',vendor:''},
  _editIds:{},
};

// ── DB ─────────────────────────────────────────────────────
async function loadTable(t){
  try{const{data,error}=await db.from(t).select('*').order('created_at',{ascending:false});
    if(error)throw error;S.recs[t]=data||[];}
  catch(e){S.recs[t]=[];console.warn(t,e.message);}
}
async function loadAll(){
  S.dbStatus='loading';renderSidebar();
  await Promise.all(TABLES.map(t=>loadTable(t)));
  rebuildMasters();S.dbStatus='ok';renderAll();
}
function rebuildMasters(){
  S.masters.buyers=[...new Set(S.recs.orders.map(o=>o.buyer).filter(Boolean))];
  S.masters.products=[...new Set(S.recs.orders.map(o=>o.product).filter(Boolean))];
  S.masters.exporters=[...new Set(S.recs.orders.map(o=>o.exporter).filter(Boolean))];
  S.masters.transporters=[...new Set(S.recs.transporters.map(o=>o.transporter).filter(Boolean))];
}
async function saveRec(table,data,id){
  try{
    const res=id?await db.from(table).update(data).eq('id',id).select()
                :await db.from(table).insert(data).select();
    if(res.error)throw res.error;
    await loadTable(table);rebuildMasters();renderAll();closeModal();toast('Saved');
  }catch(e){toast(e.message,'e');console.error(e);}
}
async function delRec(table,id){
  if(!confirm('Delete this record?'))return;
  try{const{error}=await db.from(table).delete().eq('id',id);
    if(error)throw error;await loadTable(table);renderAll();toast('Deleted','w');}
  catch(e){toast(e.message,'e');}
}

// ── Helpers ────────────────────────────────────────────────
const today=()=>new Date().toISOString().slice(0,10);
const fy=()=>{const y=new Date().getFullYear(),m=new Date().getMonth();
  return m>=3?`${y}-${String(y+1).slice(2)}`:`${y-1}-${String(y).slice(2)}`;}
const fmt=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const fmtN=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN'):'—';
const fv=(id)=>{const e=document.getElementById(id);return e?e.value:'';}
const uid=(p)=>`${p}-${Date.now().toString(36).toUpperCase()}`;

function toast(msg,type='s'){
  const d=document.createElement('div');
  d.className=`toast t${type}`;d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),2600);
}
function bdg(v){
  const m={Confirmed:'bg',Pending:'ba',Cancelled:'br',Matched:'bg',Discrepancy:'br',
    Approved:'bb',Paid:'bg',Unpaid:'ba',Overdue:'br','Booked':'bb',Yes:'bg',No:'br',
    'Gate-In Done':'bg','LEO Received':'bb','Clearance Pending':'ba',Completed:'bg',
    'In Transit':'bb',Assigned:'ba','Ready for Customs':'bg',Scheduled:'ba',
    'In Progress':'bb',Passed:'bg',Failed:'br','Re-inspection':'ba',Partial:'bp',
    'PSI Done':'bg','PSI Pending':'ba','Dispatched':'bb','Received':'bg',
    'Stuffed':'bg','Awaiting Stuffing':'ba','BL Received':'bg','Docs Sent':'bc',
    'Payment Received':'bg','Telex Released':'bp'};
  return`<span class="badge ${m[v]||'bgr'}">${v||'—'}</span>`;
}
function setPage(p){S.page=p;S.search='';renderAll();}
function closeModal(){document.getElementById('mroot').innerHTML='';}
function openModal(html){document.getElementById('mroot').innerHTML=`<div class="moverlay" onclick="if(event.target===this)closeModal()">${html}</div>`;}
function mw(title,body,onSave,lg=false){
  return`<div class="modal${lg?' lg':''}"><h3>${title}</h3>${body}<div class="mac"><button onclick="closeModal()">Cancel</button><button class="pri" onclick="${onSave}">Save to Database</button></div></div>`;
}
function mf(lbl,id,type='text',opts='',full=false,val=''){
  const c='fgrp'+(full?' full':'');
  if(type==='select')return`<div class="${c}"><label>${lbl}</label><select id="${id}">${opts}</select></div>`;
  if(type==='textarea')return`<div class="${c}"><label>${lbl}</label><textarea id="${id}">${val||''}</textarea></div>`;
  return`<div class="${c}"><label>${lbl}</label><input type="${type}" id="${id}" value="${(val||'').toString().replace(/"/g,'&quot;')}"></div>`;
}
function sel(opts,cur){return opts.map(o=>`<option value="${o}"${cur===o?' selected':''}>${o}</option>`).join('');}
function dlf(lbl,id,lid,items,full=false,val=''){
  const c='fgrp'+(full?' full':'');
  return`<div class="${c}"><label>${lbl}</label><input id="${id}" list="${lid}" value="${(val||'').replace(/"/g,'&quot;')}" autocomplete="off"><datalist id="${lid}">${items.map(i=>`<option value="${i}">`).join('')}</datalist></div>`;
}
function msec(t){return`<div class="msec">${t}</div>`;}

// ── Contract number auto-generate ─────────────────────────
function genContractNo(exp){
  if(!exp)return'';
  const pfx=exp.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,4);
  const ex=S.recs.orders.filter(o=>o.contract_no&&o.contract_no.startsWith(pfx+'/'));
  return`${pfx}/${fy()}/${String(ex.length+1).padStart(3,'0')}`;
}

function calcDeadline(){
  const p=document.getElementById('t_pickup')?.value;
  const ft=parseInt(document.getElementById('t_freetime')?.value)||0;

  const ban=document.getElementById('trans-deadline-banner');
  if(!p||!ft){if(el)el.value='';return;}
  const d=new Date(p);d.setDate(d.getDate()+ft-1);
  const dl=d.toISOString().slice(0,10);
  if(el){el.value=dl;
    const diff=Math.round((d-new Date())/86400000);

    (!q||[p.vendor,p.commodity,p.bag_marking,p.linked_contract_no].join(' ').toLowerCase().includes(q.toLowerCase())));
  const vbody=`<div class="modal" style="width:520px"><h3>Select Vendor Purchase Lot</h3>
    <input class="qwin-search" style="width:100%;margin-bottom:10px" placeholder="Search vendor, product, bag marking…" value="${q}" oninput="S.qSearch.vendor=this.value;refreshVendorPicker(${gi},${ri})">
    <div style="max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:5px">
      ${list.length?list.map(p=>`
        <div class="qcard" onclick="pickVendor('${p.id}')">
          <div class="qcard-top">
            <div><div class="qcard-id" style="color:var(--amber)">${p.vendor||'—'}</div><div class="qcard-sub">${p.commodity||'—'}</div></div>
            <span class="badge ba">${fmtN(p.pending_qty||p.qty)} MT pending</span>
          </div>
          <div class="bmark"><span class="bmark-lbl">Bag Marking</span><span class="bmark-val">${p.bag_marking||'—'}</span></div>
          <div class="qtags" style="margin-top:5px">
            <span class="qtag">₹${fmt(p.price_inr)}/MT</span>
            <span class="qtag">${p.linked_contract_no||'—'}</span>
          </div>
        </div>`).join(''):`<div class="empty">No pending vendor lots found.</div>`}
    </div>
    <div class="mac"><button onclick="closeVendorPicker()">Cancel</button></div>
  </div>`;
  document.getElementById('mroot').innerHTML=`<div class="moverlay" onclick="if(event.target===this)closeVendorPicker()">${vbody}</div>`;
}
function refreshVendorPicker(gi,ri){openVendorPicker(gi,ri);}
function closeVendorPicker(){openLoadingModal(S._editIds.loading);}
function pickVendor(pid){
  const p=S.recs.purchases.find(x=>x.id===pid);
  const{gi,ri}=_vendorTarget;
  const g=S.groups.find(x=>x.id===gi);
  if(g&&g.rows[ri]){g.rows[ri].vendor=p.vendor||'';g.rows[ri].bagMarking=p.bag_marking||'';g.rows[ri].purchaseId=pid;}
  openLoadingModal(S._editIds.loading);
}
const COLS='1.1fr 1fr 68px 1fr 1fr 1.2fr 1fr 1.1fr 80px 22px';
const COL_H=['Container No.','Vehicle No.','Qty (MT)','From','To','Vendor','Bag Marking','Surveyor','Rate (INR)',''];
function renderGroups(){
  if(!S.groups.length)return`<div style="text-align:center;padding:20px;color:var(--txt3);font-size:12px;border:1px dashed var(--bdr);border-radius:8px">${_lSelA?'Click + Add Group to begin':'Select assignment above, then add groups'}</div>`;
  return S.groups.map(g=>{
    const totQ=g.rows.reduce((s,r)=>s+(Number(r.qty)||0),0);
    const vendors=[...new Set(g.rows.map(r=>r.vendor).filter(Boolean))];
    return`<div class="grp-box">
      <div class="grp-hdr">
        <div class="grp-hdr-l">
          <div class="grp-num">${S.groups.indexOf(g)+1}</div>
          <div><input class="grp-name" value="${g.name}" oninput="updGrp(${g.id},'name',this.value)">
            <div class="grp-meta">${g.rows.length} containers · ${totQ.toFixed(3)} MT${vendors.length?' · '+vendors.join(', '):''}</div>
          </div>
        </div>
        <button class="dan xs" onclick="removeGroup(${g.id})">Remove</button>
      </div>
      <div class="grp-body">
        <div class="grp-surv">
          <span class="grp-surv-lbl">Group Surveyor</span>
          <input placeholder="Surveyor name for all rows" value="${g.surveyor||''}" oninput="updGrp(${g.id},'surveyor',this.value)">
          <span class="grp-surv-note">Override per row below if needed</span>
        </div>
        ${g.rows.length?`
        <div class="col-hdrs" style="display:grid;grid-template-columns:${COLS};gap:4px;margin-bottom:3px">
          ${COL_H.map(h=>`<div class="col-hdr">${h}</div>`).join('')}
        </div>
        ${g.rows.map((r,ri)=>`
          <div class="con-row" style="grid-template-columns:${COLS}">
            <input placeholder="TCKU1234567" value="${r.cno||''}" oninput="updRow(${g.id},${ri},'cno',this.value)">
            <input placeholder="AP09AB1234" value="${r.vno||''}" oninput="updRow(${g.id},${ri},'vno',this.value)">
            <input type="number" placeholder="0.000" value="${r.qty||''}" oninput="updRow(${g.id},${ri},'qty',this.value)">
            <input placeholder="From" value="${r.from||''}" oninput="updRow(${g.id},${ri},'from',this.value)">
            <input placeholder="To" value="${r.to||''}" oninput="updRow(${g.id},${ri},'to',this.value)">
            <button class="vbtn${r.vendor?' filled':''}" onclick="openVendorPicker(${g.id},${ri})">${r.vendor||'+ Select Vendor'}</button>
            <input class="${r.bagMarking?'auto':''}" placeholder="Auto from vendor" value="${r.bagMarking||''}" oninput="updRow(${g.id},${ri},'bagMarking',this.value)">
            <div>
              <input placeholder="${r.sovr?'Override surveyor':'From group'}" value="${r.sovr?r.surveyor:g.surveyor}" ${!r.sovr?'readonly style="color:var(--txt3)"':''} oninput="updRow(${g.id},${ri},'surveyor',this.value)">
              <div class="sovr" onclick="toggleSovr(${g.id},${ri})">${r.sovr?'↩ Use group':'✎ Override'}</div>
            </div>
            <input type="number" placeholder="Rate" value="${r.rate||''}" oninput="updRow(${g.id},${ri},'rate',this.value)">
            <button class="ghost xs" onclick="removeRow(${g.id},${ri})">✕</button>
          </div>`).join('')}`:''}
        <button class="add-link" onclick="addRow(${g.id});reRenderModal()">＋ Add container row</button>
      </div>
    </div>`;
  }).join('');
}
async function saveLoading(id){
  const data={assignment_id:fv('l_aid'),loading_date:fv('l_date')||null,booking_ref:fv('l_bref')||null,
    status:fv('l_status'),groups:JSON.stringify(S.groups),remarks:fv('l_rem')};
  if(!id)data.id=uid('LOD');
  _lSelA=null;_lSelBref='';S.groups=[];S.groupCounter=0;_reRenderFn=null;
  await saveRec('loading',data,id||null);
}

// ══════════════════════════════════════════════════════════
// PLACEHOLDER PAGES (to be built in next stages)
// ══════════════════════════════════════════════════════════
function placeholderPage(title,icon,desc){
  return`<div style="text-align:center;padding:60px 20px">
    <div style="font-size:48px;margin-bottom:12px;opacity:.3">${icon}</div>
    <div style="font-size:16px;font-weight:500;color:var(--txt2);margin-bottom:6px">${title}</div>
    <div style="font-size:13px;color:var(--txt3);max-width:360px;margin:0 auto;line-height:1.7">${desc}</div>
    <div style="margin-top:16px"><span class="badge ba">Coming in next build stage</span></div>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// RATES & PRODUCT SPECS
// ══════════════════════════════════════════════════════════
function renderRates(){
  const rows=S.recs.rates.filter(r=>!S.search||[r.category,r.provider,r.description].join(' ').toLowerCase().includes(S.search.toLowerCase()));
  return`<div class="sbar"><input placeholder="Filter…" value="${S.search||''}" oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderRates()"><button class="pri" onclick="openRateModal()">+ Add Rate</button></div>`+
  `<div class="card">`+tbl(rows,['Category','Provider','Description','Rate','Unit','Effective From','Actions'],r=>`<tr>
    <td>${bdg(r.category||'Other')}</td><td><strong>${r.provider||'—'}</strong></td>
    <td>${r.description||'—'}</td><td class="mono">${fmt(r.rate)}</td>
    <td>${r.unit||'—'}</td><td>${r.effective_from||'—'}</td>
    <td><div class="acell"><button class="sm" onclick="openRateModal('${r.id}')">Edit</button><button class="sm dan" onclick="delRec('rates','${r.id}')">Del</button></div></td>
  </tr>`,'No rates defined yet.')+`</div>`;
}
function openRateModal(id){
  const r=id?S.recs.rates.find(o=>o.id===id):{};
  const body=`<div class="fg">
    <div class="fgrp"><label>Category</label><select id="r_cat">${sel(['Freight','Transporter','Clearing','Phyto','Fumigation','Plot Charges','Survey','Other'],r.category||'Freight')}</select></div>
    <div class="fgrp"><label>Provider / Route</label><input id="r_prov" value="${r.provider||''}"></div>
    <div class="fgrp full"><label>Description</label><input id="r_desc" value="${r.description||''}"></div>
    <div class="fgrp"><label>Rate</label><input type="number" id="r_rate" value="${r.rate||''}"></div>
    <div class="fgrp"><label>Unit</label><input id="r_unit" value="${r.unit||'per container'}"></div>
    <div class="fgrp"><label>Effective From</label><input type="date" id="r_from" value="${r.effective_from||today()}"></div>
    <div class="fgrp full"><label>Remarks</label><textarea id="r_rem">${r.remarks||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit Rate':'Add Rate',body,id?`saveRate('${id}')`:'saveRate()'));
}
async function saveRate(id){
  const data={category:fv('r_cat'),provider:fv('r_prov'),description:fv('r_desc'),rate:fv('r_rate')||null,unit:fv('r_unit'),effective_from:fv('r_from')||null,remarks:fv('r_rem')};
  if(!id)data.id=uid('RATE');
  await saveRec('rates',data,id||null);
}

function renderProductSpecs(){
  const rows=S.recs.product_specs.filter(r=>!S.search||[r.product,r.commodity_type].join(' ').toLowerCase().includes(S.search.toLowerCase()));
  return`<div class="sbar"><input placeholder="Search product…" value="${S.search||''}" oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderProductSpecs()"><button class="pri" onclick="openSpecModal()">+ Add Product Spec</button></div>`+
  `<div class="card">`+tbl(rows,['Product','Commodity Type','Spec Fields','Tolerance Notes','Actions'],r=>`<tr>
    <td><strong>${r.product||'—'}</strong></td><td>${r.commodity_type||'—'}</td>
    <td style="font-size:11px;color:var(--txt2)">${r.spec_fields||'—'}</td>
    <td style="font-size:11px;color:var(--txt3)">${r.tolerance_notes||'—'}</td>
    <td><div class="acell"><button class="sm" onclick="openSpecModal('${r.id}')">Edit</button><button class="sm dan" onclick="delRec('product_specs','${r.id}')">Del</button></div></td>
  </tr>`,'No product specs defined yet.')+`</div>`;
}
function openSpecModal(id){
  const r=id?S.recs.product_specs.find(o=>o.id===id):{};
  const body=`<div class="fg">
    ${dlf('Product Name','ps_prod','ps_prod_dl',S.masters.products,false,r.product||'')}
    <div class="fgrp"><label>Commodity Type</label><select id="ps_type">${sel(['Rice','Wheat','Pulses','Spices','Sugar','Other'],r.commodity_type||'Rice')}</select></div>
    <div class="fgrp full"><label>Quality Spec Fields (comma separated, e.g. Moisture %,Broken %,DD %,Length,Black Kernels)</label><textarea id="ps_fields">${r.spec_fields||''}</textarea></div>
    <div class="fgrp full"><label>Tolerance Notes (per contract/buyer)</label><textarea id="ps_notes">${r.tolerance_notes||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit Product Spec':'Add Product Spec',body,id?`saveSpec('${id}')`:'saveSpec()'));
}
async function saveSpec(id){
  const data={product:fv('ps_prod'),commodity_type:fv('ps_type'),spec_fields:fv('ps_fields'),tolerance_notes:fv('ps_notes')};
  if(!id)data.id=uid('SPEC');
  await saveRec('product_specs',data,id||null);
}

// ── Page registry ─────────────────────────────────────────
const pages={
  dashboard:{title:'Dashboard',render:renderDash},
  orders:{title:'Orders & Contracts',render:renderOrders},
  purchases:{title:'Raw Material Purchase',render:renderPurchases},
  containers:{title:'Container Bookings',render:renderContainers},
  transporters:{title:'Transporters & Plot',render:renderTransporters},
  loading:{title:'Loading Assignment',render:renderLoading},
  surveyor_ef:{title:'Surveyor Report — Ex-Factory',render:()=>placeholderPage('Surveyor Report — Ex-Factory','🔬','Survey results, pass/fail flow, weighment and vendor bill verification for ex-factory stuffing.')},
  psi:{title:'PSI — Pre-Shipment Inspection',render:()=>placeholderPage('PSI — Pre-Shipment Inspection','🧪','Pre-shipment quality inspection at miller location. Qty-based dispatch flag system.')},
  cfs_trucks:{title:'CFS Truck Dispatch & Receipt',render:()=>placeholderPage('CFS Truck Dispatch & Receipt','🚛','Track miller truck dispatches to CFS. Factory vs CFS weight reconciliation. PSI qty flag.')},
  cfs_stuffing:{title:'CFS Stuffing & Container Allocation','render':()=>placeholderPage('CFS Stuffing & Container Allocation','📦','Container stuffing at CFS. DSR tracking. Stock at CFS running balance.')},
  invoices:{title:'Invoice & Packing List',render:()=>placeholderPage('Invoice & Packing List','🧾','Flexible invoice creation. Multiple invoices per contract. Packing list with seal numbers. Cut-off date tracking.')},
  customs:{title:'Customs & Documentation',render:()=>placeholderPage('Customs & Documentation','🛃','First check copy, LEO, Phyto, seal numbers, port entry vehicle numbers per container.')},
  shipping:{title:'Shipping & BL',render:()=>placeholderPage('Shipping & BL','🚢','BL copy receipt. Miscellaneous documents. Full document checklist per shipment.')},
  payments:{title:'Payment Tracking',render:()=>placeholderPage('Payment Tracking','💰','Bank negotiation, telex release, direct payment. Track per invoice.')},
  rates:{title:'Master Rates',render:renderRates},
  product_specs:{title:'Product Specs',render:renderProductSpecs},
};

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
renderAll();loadAll();
