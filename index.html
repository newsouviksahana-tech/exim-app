<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExIm Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f1f5f9;--surf:#ffffff;--surf2:#f8fafc;--surf3:#f1f5f9;
  --bdr:#e2e8f0;--bdr2:#cbd5e1;
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;
  --blue:#2563eb;--blue2:#1d4ed8;--green:#059669;--amber:#d97706;
  --red:#dc2626;--purple:#7c3aed;--cyan:#0891b2;--pink:#db2777;
  --r:10px;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* APP */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:224px;min-width:224px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:16px 14px 10px;border-bottom:1px solid var(--bdr)}
.logo h1{font-size:13px;font-weight:600;letter-spacing:-.2px}
.logo p{font-size:10px;color:var(--txt3);margin-top:2px;font-family:var(--mono)}
.db-pill{margin:8px 8px 2px;padding:5px 9px;border-radius:6px;font-size:10px;font-family:var(--mono);display:flex;align-items:center;gap:5px;border:1px solid}
.dbok{background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.2);color:var(--green)}
.dberr{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.2);color:var(--red)}
.dbload{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.2);color:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
.spn{display:inline-block;width:10px;height:10px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
.nav-grp{padding:10px 8px 2px;font-size:9px;font-weight:600;color:var(--txt3);letter-spacing:.12em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:pointer;border-radius:6px;margin:1px 4px;font-size:12px;color:var(--txt2);transition:all .12s}
.nav-item:hover{background:var(--surf2);color:var(--txt)}
.nav-item.active{background:rgba(37,99,235,.08);color:var(--blue);font-weight:500}
.ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:14px;font-weight:600;letter-spacing:-.2px}
.pbadge{font-size:9px;padding:1px 6px;border-radius:20px;background:var(--surf2);color:var(--txt3);margin-left:7px;font-family:var(--mono)}
.content{flex:1;overflow-y:auto;padding:14px 16px}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
.klbl{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.kval{font-size:22px;font-weight:600;font-family:var(--mono);letter-spacing:-1px}

/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
.ctitle{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 9px;background:var(--surf2);font-weight:600;font-size:10px;color:var(--txt2);border-bottom:1px solid var(--bdr);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:6px 9px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(15,23,42,.025)}
.mono{font-family:var(--mono);font-size:11px}

/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--mono)}
.bg{background:rgba(5,150,105,.1);color:var(--green)}
.bb{background:rgba(37,99,235,.1);color:var(--blue)}
.ba{background:rgba(217,119,6,.1);color:var(--amber)}
.br{background:rgba(220,38,38,.1);color:var(--red)}
.bp{background:rgba(124,58,237,.1);color:var(--purple)}
.bc{background:rgba(8,145,178,.1);color:var(--cyan)}
.bgr{background:var(--surf2);color:var(--txt3)}

/* BUTTONS */
button{cursor:pointer;border:1px solid var(--bdr2);background:var(--surf2);color:var(--txt2);border-radius:6px;padding:5px 11px;font-size:12px;font-family:var(--font);transition:all .12s;white-space:nowrap}
button:hover{background:var(--bdr2);color:var(--txt)}
button.pri{background:var(--blue);color:#fff;border-color:transparent;font-weight:500;box-shadow:0 1px 3px rgba(37,99,235,.25)}
button.pri:hover{background:var(--blue2)}
button.suc{background:rgba(52,211,153,.12);color:var(--green);border-color:rgba(52,211,153,.25)}
button.suc:hover{background:rgba(52,211,153,.2)}
button.dan{background:rgba(220,38,38,.1);color:var(--red);border-color:rgba(248,113,113,.2)}
button.dan:hover{background:rgba(248,113,113,.2)}
button.ghost{background:transparent;border-color:transparent;color:var(--txt3)}
button.ghost:hover{background:var(--surf2);color:var(--txt)}
button.sm{padding:3px 8px;font-size:11px}
button.xs{padding:2px 6px;font-size:10px}

/* SEARCH */
.sbar{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.sbar input,.sbar select{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:12px;font-family:var(--font);color:var(--txt);outline:none;max-width:260px}
.sbar input:focus,.sbar select:focus{border-color:var(--blue)}
.sbar input::placeholder{color:var(--txt3)}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:40px 14px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;width:620px;max-width:96vw;padding:20px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(15,23,42,.15)}
.modal.lg{width:820px}
.modal h3{font-size:14px;font-weight:600;margin-bottom:16px;letter-spacing:-.2px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fgrp{display:flex;flex-direction:column;gap:3px}
.fgrp.full{grid-column:1/-1}
label{font-size:10px;color:var(--txt3);font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.fgrp input,.fgrp select,.fgrp textarea{background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:6px 9px;font-size:12px;font-family:var(--font);color:var(--txt);width:100%;outline:none;transition:border .12s}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--blue)}
.fgrp input.af{border-color:rgba(52,211,153,.4);color:var(--green)}
.fgrp select option{background:var(--surf2)}
textarea{resize:vertical;min-height:54px}
.mac{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;padding-top:12px;border-top:1px solid var(--bdr)}
.msec{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;padding:12px 0 6px;border-bottom:1px solid var(--bdr);grid-column:1/-1;margin-top:2px}

/* QUERY WINDOW */
.qwin{background:var(--surf2);border:1px solid var(--bdr2);border-radius:8px;padding:10px;margin-bottom:12px}
.qwin-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.qwin-title{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.08em}
.qwin-search{background:var(--surf);border:1px solid var(--bdr);border-radius:5px;padding:5px 8px;font-size:11px;font-family:var(--font);color:var(--txt);outline:none;width:200px}
.qwin-search::placeholder{color:var(--txt3)}
.qwin-search:focus{border-color:var(--blue)}
.qwin-list{max-height:190px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.qcard{background:var(--surf);border:1px solid var(--bdr);border-radius:7px;padding:9px 11px;cursor:pointer;transition:all .1s}
.qcard:hover{border-color:var(--blue);background:rgba(37,99,235,.04)}
.qcard.sel{border-color:var(--green);background:rgba(5,150,105,.05)}
.qcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.qcard-id{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--blue)}
.qcard-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.qtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.qtag{background:var(--surf2);border:1px solid var(--bdr);border-radius:3px;padding:1px 6px;font-size:10px;color:var(--txt2)}
.qtag.hi{color:var(--amber)}
.qtag.ok{color:var(--green)}
.bmark{display:flex;align-items:center;gap:5px;background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.18);border-radius:6px;padding:4px 8px;margin-top:5px}
.bmark-lbl{font-size:9px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.bmark-val{font-size:11px;font-weight:500;color:var(--amber);font-family:var(--mono)}
.sel-pill{display:flex;align-items:center;gap:8px;background:rgba(5,150,105,.06);border:1px solid rgba(5,150,105,.18);border-radius:6px;padding:6px 10px;margin-top:6px}
.sel-pill-txt{font-size:11px;color:var(--green);font-weight:500;flex:1}

/* MISC */
.acell{display:flex;gap:3px}
.dok{color:var(--green);font-weight:500}
.dbad{color:var(--red);font-weight:500}
.empty{text-align:center;padding:30px;color:var(--txt3);font-size:12px;line-height:1.8}
.divider{height:1px;background:var(--bdr);margin:12px 0}
.ref-strip{display:none;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:7px;padding:8px 11px;grid-column:1/-1}
.ref-strip b{font-size:11px;font-weight:500;color:var(--green);display:block;margin-bottom:2px}
.ref-strip span{font-size:10px;color:var(--green);opacity:.8}

/* TOAST */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:18px;right:18px;padding:9px 15px;border-radius:9px;font-size:12px;z-index:9999;font-weight:500;border:1px solid;animation:fadeUp .2s ease}
.ts{background:rgba(5,150,105,.08);border-color:rgba(5,150,105,.25);color:var(--green)}
.te{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.25);color:var(--red)}
.tw{background:rgba(217,119,6,.08);border-color:rgba(217,119,6,.25);color:var(--amber)}

/* ALERT BANNER */
.alert-banner{border-radius:8px;padding:9px 13px;margin-bottom:10px;border:1px solid;display:none}
.alert-red{background:rgba(220,38,38,.06);border-color:rgba(220,38,38,.2)}
.alert-amber{background:rgba(217,119,6,.06);border-color:rgba(217,119,6,.2)}
.alert-title{font-size:12px;font-weight:500;margin-bottom:2px}
.alert-red .alert-title{color:var(--red)}
.alert-amber .alert-title{color:var(--amber)}
.alert-sub{font-size:11px}
.alert-red .alert-sub{color:var(--red)}
.alert-amber .alert-sub{color:var(--amber)}

/* MULTI PLOT */
.plot-row{background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.plot-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.plot-lbl{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em}
.plot-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:7px}
.plot-grid .fgrp input,.plot-grid .fgrp select{font-size:11px;padding:5px 7px}
.add-link{background:none;border:none;font-size:11px;color:var(--blue);cursor:pointer;padding:4px 0;font-family:var(--font)}
.add-link:hover{opacity:.8}

/* GROUPS */
.grp-box{background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;overflow:hidden;margin-bottom:9px}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surf3);border-bottom:1px solid var(--bdr)}
.grp-hdr-l{display:flex;align-items:center;gap:8px}
.grp-num{width:20px;height:20px;border-radius:50%;background:rgba(79,156,249,.15);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid rgba(79,156,249,.3);flex-shrink:0}
.grp-name{background:transparent;border:none;font-size:12px;font-weight:500;color:var(--txt);font-family:var(--font);outline:none;width:170px}
.grp-name:focus{border-bottom:1px solid var(--blue)}
.grp-meta{font-size:10px;color:var(--txt3);margin-top:1px}
.grp-body{padding:12px}
.grp-surv{display:flex;align-items:center;gap:8px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--bdr)}
.grp-surv-lbl{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;min-width:110px}
.grp-surv input{max-width:180px;font-size:12px}
.grp-surv-note{font-size:10px;color:var(--txt3);margin-left:8px}
.col-hdrs{display:grid;gap:4px;margin-bottom:3px}
.col-hdr{font-size:9px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;text-align:center}
.con-row{display:grid;gap:4px;align-items:center;margin-bottom:4px}
.con-row input,.con-row select{font-size:11px;padding:4px 7px;background:var(--surf);border:1px solid var(--bdr);border-radius:5px;color:var(--txt);font-family:var(--font);outline:none;width:100%}
.con-row input:focus,.con-row select:focus{border-color:var(--blue)}
.con-row input.auto{border-color:rgba(52,211,153,.35);color:var(--green)}
.vbtn{background:var(--surf3);border:1px solid var(--bdr);border-radius:5px;padding:4px 7px;font-size:11px;color:var(--txt3);cursor:pointer;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .12s;width:100%}
.vbtn:hover{border-color:var(--blue);color:var(--txt)}
.vbtn.filled{border-color:rgba(52,211,153,.35);color:var(--green);font-weight:500}
.sovr{font-size:9px;color:var(--txt3);cursor:pointer;display:flex;align-items:center;gap:3px;margin-top:2px}
.sovr:hover{color:var(--blue)}

/* AUTH */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--surf);border:1px solid var(--bdr2);border-radius:14px;padding:32px 28px;width:380px;max-width:95vw}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.login-logo p{font-size:12px;color:var(--txt3)}
.login-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.login-field label{font-size:11px;color:var(--txt3);font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.login-field input{background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--txt);outline:none}
.login-field input:focus{border-color:var(--blue)}
.login-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;margin-top:4px}
.login-btn:hover{background:var(--blue2)}
.login-err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:7px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.user-chip{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:20px;background:var(--surf2);border:1px solid var(--bdr)}
.user-chip-avatar{width:22px;height:22px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.user-chip-name{font-size:11px;color:var(--txt2);font-weight:500}
.user-chip-role{font-size:9px;color:var(--txt3)}
/* REPORT */
.report-wrap{display:flex;flex-direction:column;gap:10px}
.report-contract{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.rc-hdr{padding:10px 14px;background:var(--surf2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.rc-id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue)}
.rc-buyer{font-size:12px;color:var(--txt2)}
.rc-body{padding:12px 14px}
.inv-track{display:flex;flex-direction:column;gap:6px}
.inv-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:var(--surf2);border:1px solid var(--bdr)}
.inv-no{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--blue);min-width:130px}
.inv-stages{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.stage-dot{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.stage-done{background:rgba(5,150,105,.1);color:var(--green)}
.stage-active{background:rgba(37,99,235,.1);color:var(--blue)}
.stage-pending{background:var(--surf3);color:var(--txt3)}

</style>
</head>
<body>
<div id="root"></div>
<div id="mroot"></div>

<script>
const SUPA_URL='https://wktdubbvddynyigxmoyb.supabase.co';
const SUPA_KEY='sb_publishable_-BjRXe1NkSTPQKQoRWDQVQ_Uu5CNZFX';
const{createClient}=supabase;
const db=createClient(SUPA_URL,SUPA_KEY,{auth:{persistSession:true,autoRefreshToken:true}});
let currentUser=null,currentProfile=null;

// ── State ──────────────────────────────────────────────────
const TABLES=['orders','purchases','containers','transporters','loading','surveyor_ef',
  'psi','cfs_trucks','cfs_stuffing','invoices','customs','shipping','payments','rates','product_specs',
  'user_profiles','companies','audit_log'];

let S={
  page:'dashboard',
  recs:Object.fromEntries(TABLES.map(t=>[t,[]])),
  masters:{buyers:[],products:[],exporters:[],transporters:[]},
  dbStatus:'loading',search:'',
  // modal temp
  sel:{contract:null,booking:null,assignment:null,vendor1:null,vendor2:null},
  groups:[],groupCounter:0,
  plots:[],plotCounter:0,
  qSearch:{contract:'',booking:'',assignment:'',vendor:''},
  _editIds:{},
};

// ── DB ─────────────────────────────────────────────────────
async function loadTable(t){
  try{const{data,error}=await db.from(t).select('*').order('created_at',{ascending:false});
    if(error)throw error;S.recs[t]=data||[];}
  catch(e){S.recs[t]=[];console.warn(t,e.message);}
}
async function loadAll(){
  S.dbStatus='loading';renderSidebar();
  await Promise.all(TABLES.map(t=>loadTable(t)));
  // also load user profiles and companies for master admin
  if(currentProfile?.role==='master_admin'||currentProfile?.role==='admin'){
    await loadTable('user_profiles');await loadTable('companies');await loadTable('audit_log');
  } else {
    await loadTable('companies');
  }
  rebuildMasters();S.dbStatus='ok';renderAll();
}
function rebuildMasters(){
  S.masters.buyers=[...new Set(S.recs.orders.map(o=>o.buyer).filter(Boolean))];
  S.masters.products=[...new Set(S.recs.orders.map(o=>o.product).filter(Boolean))];
  S.masters.exporters=[...new Set(S.recs.orders.map(o=>o.exporter).filter(Boolean))];
  S.masters.transporters=[...new Set(S.recs.transporters.map(o=>o.transporter).filter(Boolean))];
}
// Tables that have created_by/updated_by columns
// User tracking disabled until columns confirmed in Supabase
// To enable: add created_by uuid and updated_by uuid columns to specific tables first
const TRACKED_TABLES=[]; // empty — no user tracking to avoid column errors

async function saveRec(table,data,id){
  try{
    // Only add user tracking to tables that have those columns
    const tracked=TRACKED_TABLES.includes(table);
    if(tracked&&currentUser){
      if(!id)data.created_by=currentUser.id;
      data.updated_by=currentUser.id;
    }
    // Clean data — convert empty strings to null for uuid/id fields
    // and remove any keys with undefined values
    const clean={};
    Object.entries(data).forEach(([k,v])=>{
      if(v===undefined)return; // skip undefined
      if(v===''&&(k==='created_by'||k==='updated_by'||k.endsWith('_id')))clean[k]=null;
      else clean[k]=v;
    });
    // Attempt save
    let res;
    try{
      res=id
        ? await db.from(table).update(clean).eq('id',id).select()
        : await db.from(table).insert(clean).select();
    }catch(netErr){
      throw new Error('Network error: '+netErr.message);
    }
    if(res.error){
      // If column not found error, try removing unknown columns and retry
      if(res.error.message&&res.error.message.includes('column')){
        const col=res.error.message.match(/column "([^"]+)"/)?.[1];
        if(col){
          console.warn('Removing unknown column:',col);
          delete clean[col];
          res=id
            ? await db.from(table).update(clean).eq('id',id).select()
            : await db.from(table).insert(clean).select();
        }
      }
      if(res.error)throw res.error;
    }
    // Audit log — fire and forget, don't block save
    if(currentUser){
      db.from('audit_log').insert({
        user_id:currentUser.id,
        user_name:currentProfile?.full_name||currentUser.email,
        user_email:currentUser.email,
        table_name:table,
        record_id:String(data.id||id||'—'),
        action:id?'UPDATE':'INSERT',
        new_data:clean,
        changed_at:new Date().toISOString()
      }).then(({error})=>{if(error)console.warn('audit log:',error.message);});
    }
    await loadTable(table);
    rebuildMasters();
    renderAll();
    closeModal();
    toast('Saved successfully');
  }catch(e){
    toast('Save failed: '+e.message,'e');
    console.error('saveRec error:',table,e);
  }
}
async function delRec(table,id){
  if(!confirm('Delete this record? This cannot be undone.'))return;
  try{
    const{error}=await db.from(table).delete().eq('id',id);
    if(error)throw error;
    await loadTable(table);
    renderAll();
    toast('Record deleted','w');
  }catch(e){toast('Delete failed: '+e.message,'e');console.error('delRec:',e);}
}

// ── Helpers ────────────────────────────────────────────────
const today=()=>new Date().toISOString().slice(0,10);
const fy=()=>{const y=new Date().getFullYear(),m=new Date().getMonth();
  return m>=3?`${y}-${String(y+1).slice(2)}`:`${y-1}-${String(y).slice(2)}`;}
const fmt=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const fmtN=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN'):'—';
const fv=(id)=>{const e=document.getElementById(id);return e?e.value:'';}
const uid=(p)=>`${p}-${Date.now().toString(36).toUpperCase()}`;

function toast(msg,type='s'){
  const d=document.createElement('div');
  d.className=`toast t${type}`;d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),2600);
}
function bdg(v){
  const m={Confirmed:'bg',Pending:'ba',Cancelled:'br',Matched:'bg',Discrepancy:'br',
    Approved:'bb',Paid:'bg',Unpaid:'ba',Overdue:'br','Booked':'bb',Yes:'bg',No:'br',
    'Gate-In Done':'bg','LEO Received':'bb','Clearance Pending':'ba',Completed:'bg',
    'In Transit':'bb',Assigned:'ba','Ready for Customs':'bg',Scheduled:'ba',
    'In Progress':'bb',Passed:'bg',Failed:'br','Re-inspection':'ba',Partial:'bp',
    'PSI Done':'bg','PSI Pending':'ba','Dispatched':'bb','Received':'bg',
    'Stuffed':'bg','Awaiting Stuffing':'ba','BL Received':'bg','Docs Sent':'bc',
    'Payment Received':'bg','Telex Released':'bp'};
  return`<span class="badge ${m[v]||'bgr'}">${v||'—'}</span>`;
}

function mw(title,body,onSave,lg=false){

function mf(lbl,id,type='text',opts='',full=false,val=''){
  const c='fgrp'+(full?' full':'');
  if(type==='select')return`<div class="${c}"><label>${lbl}</label><select id="${id}">${opts}</select></div>`;
  if(type==='textarea')return`<div class="${c}"><label>${lbl}</label><textarea id="${id}">${val||''}</textarea></div>`;
  return`<div class="${c}"><label>${lbl}</label><input type="${type}" id="${id}" value="${(val||'').toString().replace(/"/g,'&quot;')}"></div>`;
}
function sel(opts,cur){return opts.map(o=>`<option value="${o}"${cur===o?' selected':''}>${o}</option>`).join('');}
function dlf(lbl,id,lid,items,full=false,val=''){
  const c='fgrp'+(full?' full':'');
  return`<div class="${c}"><label>${lbl}</label><input id="${id}" list="${lid}" value="${(val||'').replace(/"/g,'&quot;')}" autocomplete="off"><datalist id="${lid}">${items.map(i=>`<option value="${i}">`).join('')}</datalist></div>`;
}

// ── Contract number auto-generate ─────────────────────────
function genContractNo(exp){
  if(!exp)return'';
  const pfx=exp.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,4);
  const ex=S.recs.orders.filter(o=>o.contract_no&&o.contract_no.startsWith(pfx+'/'));
  return`${pfx}/${fy()}/${String(ex.length+1).padStart(3,'0')}`;
}

function renderSidebar(){
  const el=document.getElementById('snav');if(!el)return;
  const pill=S.dbStatus==='ok'
    ?`<div class="db-pill dbok"><span class="pulse"></span>Live · Supabase</div>`
    :S.dbStatus==='loading'
    ?`<div class="db-pill dbload"><span class="spn"></span>Connecting…</div>`
    :`<div class="db-pill dberr"><span class="pulse"></span>DB Error</div>`;
  el.innerHTML=pill+NAV.map(n=>n.grp
    ?`<div class="nav-grp">${n.grp}</div>`
    :`<div class="nav-item${S.page===n.id?' active':''}" onclick="setPage('${n.id}')"><span class="ndot" style="background:${n.color}"></span>${n.label}</div>`
  ).join('');
}

function tbl(rows,hdrs,rowFn,emsg){
  return`<div style="overflow-x:auto"><table><thead><tr>${hdrs.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${
    rows.length?rows.map(rowFn).join(''):`<tr><td colspan="${hdrs.length}"><div class="empty">${emsg}</div></td></tr>`
  }</tbody></table></div>`;
}

function renderOrders(){
  const rows=S.recs.orders.filter(o=>!S.search||[o.buyer,o.contract_no,o.product,o.exporter].join(' ').toLowerCase().includes(S.search.toLowerCase()));
  return`<div class="sbar"><input placeholder="Search buyer, contract, product…" value="${S.search||''}" oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderOrders()"><button class="pri" onclick="openOrderModal()">+ New Contract</button></div>`+
  `<div class="card">`+tbl(rows,['Contract No.','Date','Buyer','Buyer Port','Product','Qty (MT)','Currency','Price','Exporter','Bag Marking','Bag Type','Signed','Actions'],r=>`<tr>
    <td><span class="mono" style="color:var(--blue)">${r.contract_no||'—'}</span></td>
    <td>${r.contract_date||'—'}</td><td><strong>${r.buyer||'—'}</strong></td><td>${r.buyer_port||'—'}</td>
    <td>${r.product||'—'}</td><td class="mono">${fmtN(r.qty)}</td><td>${r.currency||'USD'}</td>
    <td class="mono">${fmt(r.unit_price)}</td><td>${r.exporter||'—'}</td>
    <td>${r.bag_marking||'—'}</td><td>${r.bag_type||'—'}</td>
    <td>${bdg(r.signed_contract==='Yes'?'Confirmed':'Pending')}</td>
    <td><div class="acell"><button class="sm" onclick="openOrderModal('${r.id}')">Edit</button><button class="sm dan" onclick="delRec('orders','${r.id}')">Del</button></div></td>
  </tr>`,'Click + New Contract to begin.')+`</div>`;

function openOrderModal(id){
  const r=id?S.recs.orders.find(o=>o.id===id):{};
  const currencies=['USD','EUR','GBP','INR','AED','SGD','JPY'];
  const bagTypes=['PP Bag','Jute Bag','HDPE Bag','Paper Bag','Bulk','Other'];
  const body=`<div class="fg">
    ${msec('Contract')}
    ${dlf('Exporter Name','o_exp','o_exp_dl',S.masters.exporters,false,r.exporter||'')}
    <div class="fgrp"><label>Contract No. (auto)</label><input id="o_cno" value="${r.contract_no||''}" style="font-family:var(--mono);color:var(--blue)"></div>
    <div class="fgrp"><label>Contract Date</label><input type="date" id="o_date" value="${r.contract_date||today()}"></div>
    <div class="fgrp"><label>Signed Contract?</label><select id="o_signed">${sel(['No','Yes','Pending'],r.signed_contract||'No')}</select></div>
    ${msec('Buyer')}
    ${dlf('Buyer Name','o_buyer','o_buyer_dl',S.masters.buyers,false,r.buyer||'')}
    <div class="fgrp"><label>Buyer Port</label><input id="o_bport" value="${r.buyer_port||''}"></div>
    ${msec('Product & Pricing')}
    ${dlf('Product','o_prod','o_prod_dl',S.masters.products,false,r.product||'')}
    <div class="fgrp"><label>Quantity (MT)</label><input type="number" id="o_qty" value="${r.qty||''}"></div>
    <div class="fgrp"><label>Currency</label><select id="o_cur">${sel(currencies,r.currency||'USD')}</select></div>
    <div class="fgrp"><label>Unit Price</label><input type="number" id="o_price" value="${r.unit_price||''}"></div>
    <div class="fgrp"><label>Payment Terms</label><input id="o_pterm" value="${r.payment_terms||''}"></div>
    <div class="fgrp"><label>Delivery Terms</label><input id="o_dterm" value="${r.delivery_terms||''}"></div>
    ${msec('Packing')}
    <div class="fgrp"><label>Bag Marking</label><input id="o_bmark" value="${r.bag_marking||''}"></div>
    <div class="fgrp"><label>Bag Type</label><select id="o_btype">${sel(bagTypes,r.bag_type||'PP Bag')}</select></div>
    <div class="fgrp full"><label>Remarks</label><textarea id="o_rem">${r.remarks||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit Contract':'New Contract',body,id?`saveOrder('${id}')`:'saveOrder()'));
  setTimeout(()=>{
    const expEl=document.getElementById('o_exp');
    const cnoEl=document.getElementById('o_cno');
    if(expEl&&cnoEl&&!id){
      expEl.addEventListener('input',()=>{
        const v=expEl.value.trim();
        if(v){const pfx=v.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,4);
          const ex=S.recs.orders.filter(o=>o.contract_no&&o.contract_no.startsWith(pfx+'/'));
          cnoEl.value=`${pfx}/${fy()}/${String(ex.length+1).padStart(3,'0')}`;}
      });
    }
  },80);
}
async function saveOrder(id){
  const data={contract_date:fv('o_date')||null,exporter:fv('o_exp'),contract_no:fv('o_cno'),
    buyer:fv('o_buyer'),buyer_port:fv('o_bport'),product:fv('o_prod'),qty:fv('o_qty')||null,
    currency:fv('o_cur'),unit_price:fv('o_price')||null,payment_terms:fv('o_pterm'),
    delivery_terms:fv('o_dterm'),bag_marking:fv('o_bmark'),bag_type:fv('o_btype'),
    signed_contract:fv('o_signed'),remarks:fv('o_rem')};
  if(!id)data.id=uid('ORD');
  await saveRec('orders',data,id||null);
}

function renderPurchasesReport(){
  const cn=_reportContractNo,cid=_reportContractId;
  const contract=S.recs.orders.find(o=>o.contract_no===cn||o.id===cid);
  const rows=(S.recs.purchases||[]).filter(p=>p.linked_contract_no===cn||p.linked_contract_id===cid);
  const totalQty=rows.reduce((s,p)=>s+(Number(p.qty)||0),0);
  const totalPending=rows.reduce((s,p)=>s+(Number(p.pending_qty)||Number(p.qty)||0),0);
  const totalAmt=rows.reduce((s,p)=>s+(Number(p.qty)||0)*(Number(p.price_inr)||0),0);
  return reportBanner()+`
  <div class="kgrid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">
    <div class="kpi"><div class="klbl">Contract Qty</div><div class="kval">${fmtN(contract?.qty)} MT</div></div>
    <div class="kpi"><div class="klbl">Total Purchased</div><div class="kval" style="color:var(--green)">${fmtN(totalQty)} MT</div></div>
    <div class="kpi"><div class="klbl">Pending Purchase</div><div class="kval" style="color:${(Number(contract?.qty)||0)-totalQty>0?'var(--red)':'var(--green)'}">${fmtN((Number(contract?.qty)||0)-totalQty)} MT</div></div>
    <div class="kpi"><div class="klbl">Total Purchase Value</div><div class="kval" style="font-size:14px">₹${fmt(totalAmt)}</div></div>
  </div>
  <div class="card">`+tbl(rows,
    ['Vendor / Miller','Date','Qty (MT)','Pending Qty','Price (INR/MT)','Type','Bag Marking','Broker','Status'],
    p=>`<tr>
      <td><strong>${p.vendor||'—'}</strong></td>
      <td>${p.purchase_date||'—'}</td>
      <td class="mono">${fmtN(p.qty)}</td>
      <td class="mono ${Number(p.pending_qty)>0?'dbad':'dok'}">${fmtN(p.pending_qty||p.qty)}</td>
      <td class="mono">₹${fmt(p.price_inr)}</td>
      <td>${p.price_type||'—'}</td>
      <td class="mono" style="font-size:11px">${p.bag_marking||'—'}</td>
      <td>${p.broker||'—'}</td>
      <td>${bdg(Number(p.pending_qty)>0?'Pending':'Dispatched')}</td>
    </tr>`,
    'No purchase records for this contract.'
  )+`</div>`;
}

  const rows=S.recs.purchases.filter(o=>!S.search||[o.vendor,o.commodity,o.linked_contract_no].join(' ').toLowerCase().includes(S.search.toLowerCase()));

function selPurchaseContract(id){
  _pSelC=id;
  const c=S.recs.orders.find(o=>o.id===id);
  if(c){
    // Update the display field in the already-open modal directly
    const dispEl=document.getElementById('qw_contract_display');
    if(dispEl){
      dispEl.value=c.contract_no+' — '+c.buyer+' · '+c.product;
      dispEl.style.color='var(--green)';
      dispEl.style.borderColor='rgba(52,211,153,.4)';
    }
    // Update the hidden contract field
    const cn=document.getElementById('p_contract');
    if(cn){cn.value=c.contract_no||'';cn.style.color='var(--green)';}
    // Auto-fill commodity and bag marking if empty
    const pr=document.getElementById('p_comm');
    if(pr&&!pr.value)pr.value=c.product||'';
    const bm=document.getElementById('p_bmark');
    if(bm&&!bm.value)bm.value=c.bag_marking||'';
    // Show the hint below the select button
    const hint=document.getElementById('contract_sel_hint');
    if(hint){
      hint.textContent='Bag Marking: '+(c.bag_marking||'—')+' · '+c.qty+' MT · '+(c.currency||'USD')+' '+c.unit_price+'/MT';
      hint.style.display='block';
    }
  }
  // Do NOT call openPurchaseModal here — that would wipe the form
  // Just close the popup (already closed by pickContractFromPopup)
}

async function savePurchase(id){
  const qty=parseFloat(fv('p_qty'))||null;
  const data={purchase_date:fv('p_date')||null,vendor:fv('p_vendor'),commodity:fv('p_comm'),
    qty,pending_qty:parseFloat(fv('p_pqty'))||qty,price_inr:fv('p_price')||null,
    price_type:fv('p_ptype'),delivery_location:fv('p_dloc'),broker:fv('p_broker'),
    bag_marking:fv('p_bmark'),quality_grade:fv('p_grade'),payment_terms:fv('p_pterm'),
    linked_contract_no:fv('p_contract'),linked_contract_id:_pSelC||null,remarks:fv('p_rem')};
  if(!id)data.id=uid('PUR');
  _pSelC=null;_reRenderFn=null;
  await saveRec('purchases',data,id||null);
}

function calcDeadline(){
  const p=document.getElementById('t_pickup')?.value;
  const ft=parseInt(document.getElementById('t_freetime')?.value)||0;

  const ban=document.getElementById('trans-deadline-banner');
  if(!p||!ft){if(el)el.value='';return;}
  const d=new Date(p);d.setDate(d.getDate()+ft-1);
  const dl=d.toISOString().slice(0,10);
  if(el){el.value=dl;
    const diff=Math.round((d-new Date())/86400000);
    el.style.color=diff<0?'var(--red)':diff<=2?'var(--amber)':'var(--green)';}

function pickSurveyAssign(lid){
  const l=S.recs.loading.find(x=>x.id===lid);if(!l)return;
  _svSelAssign=l.assignment_id||l.id;
  _svSelAssignObj=l;
  try{_svSelAssignObj.groups=JSON.parse(l.groups||'[]');}catch(e){_svSelAssignObj.groups=[];}
  _svSelRow=null;
  S.qSearch.assignment='';
  openSurveyorEfModal(S._editIds.surveyor_ef);
}
function clearSurveyAssign(){_svSelAssign=null;_svSelAssignObj=null;_svSelRow=null;openSurveyorEfModal(S._editIds.surveyor_ef);}
function pickSurveyRow(gi,ri){
  if(!_svSelAssignObj)return;
  const g=_svSelAssignObj.groups[gi];
  const rw=g.rows[ri];
  _svSelRow={g,rw};
  af('sv_aid',_svSelAssign);
  af('sv_cno',rw.cno||'');
  af('sv_vno',rw.vno||'');
  af('sv_vendor',rw.vendor||'');
  af('sv_bmark',rw.bagMarking||'');
  af('sv_planned',rw.qty||'');
  const survEl=document.getElementById('sv_surv');
  if(survEl&&!survEl.value)survEl.value=g.surveyor||'';
  openSurveyorEfModal(S._editIds.surveyor_ef);
}
function setSurveyResult(res){
  document.getElementById('sv_result').value=res;
  ['Passed','Failed','Re-inspection'].forEach(r2=>{
    const el=document.getElementById('sres-'+r2.replace(' ',''));
    if(el){
      const active=r2===res;
      el.style.borderColor=active?(r2==='Passed'?'var(--green)':r2==='Failed'?'var(--red)':'var(--amber)'):'var(--bdr)';
      el.style.background=active?(r2==='Passed'?'rgba(52,211,153,.08)':r2==='Failed'?'rgba(248,113,113,.08)':'rgba(251,191,36,.08)'):'';
    }
  });
  document.getElementById('sv_fail_section').style.display=(res==='Failed'||res==='Re-inspection')?'block':'none';
  document.getElementById('sv_loading_section').style.display=(res==='Passed'||res==='Re-inspection')?'block':'none';
}
function setSurveyResolution(res){
  document.getElementById('sv_resolution').value=res;
  ['New material manufactured','Redirect to different vendor','Accept at discounted rate','Partial acceptance'].forEach(r2=>{
    const el=document.getElementById('svres-'+r2.replace(/ /g,'-'));
    if(el){el.style.borderColor=r2===res?'var(--blue)':'var(--bdr)';el.style.background=r2===res?'rgba(79,156,249,.08)':'';}
  });
  const av=document.getElementById('sv_alt_vendor_row');
  const disc=document.getElementById('sv_disc_row');
  if(av)av.style.display=res==='Redirect to different vendor'?'flex':'none';
  if(disc)disc.style.display=res==='Accept at discounted rate'?'grid':'none';
}
function calcSurveyDiffs(){
  const pp=parseFloat(document.getElementById('sv_poprice')?.value)||0;
  const bp=parseFloat(document.getElementById('sv_billprice')?.value)||0;
  const pq=parseFloat(document.getElementById('sv_poqty')?.value)||0;
  const bq=parseFloat(document.getElementById('sv_billqty')?.value)||0;
  const pd=bp-pp,qd=bq-pq;
  const pel=document.getElementById('sv_pricediff');
  const qel=document.getElementById('sv_qtydiff');
  if(pel&&(pp||bp)){pel.textContent=(pd>=0?'+':'')+'₹'+fmt(pd);pel.style.color=pd===0?'var(--green)':pd>0?'var(--red)':'var(--green)';}
  if(qel&&(pq||bq)){qel.textContent=(qd>=0?'+':'')+qd.toFixed(3)+' MT';qel.style.color=qd===0?'var(--green)':Math.abs(qd)>0.1?'var(--red)':'var(--green)';}
}
function toggleSurveyInvoice(){
  const flag=document.getElementById('sv_invflag');
  const tog=document.getElementById('sv_inv_toggle');
  const knob=document.getElementById('sv_knob');
  const lbl=document.getElementById('sv_inv_lbl');
  const det=document.getElementById('sv_inv_detail');
  const on=flag.value!=='1';
  flag.value=on?'1':'';
  if(tog)tog.style.background=on?'var(--green)':'var(--bdr)';
  if(knob)knob.style.left=on?'18px':'2px';
  if(lbl){lbl.textContent=on?'Flagged':'Not flagged';lbl.style.color=on?'var(--green)':'var(--txt3)';lbl.style.fontWeight=on?'500':'400';}
  if(det)det.style.display=on?'contents':'none';
}

function renderEfAssignList(list){
  if(!list.length)return`<div class="empty">No assignments found.</div>`;
  const today2=new Date();
  return list.map(t=>{
    const dl=t.gate_in_deadline?new Date(t.gate_in_deadline):null;
    const diff=dl?Math.round((dl-today2)/86400000):null;
    const urgCls=diff===null?'bgr':diff<0?'br':diff<=2?'ba':'bg';
    return`<div class="qcard" onclick="pickEfAssign('${t.assignment_id||t.id}')" style="cursor:pointer">
      <div class="qcard-top">
        <div><div class="qcard-id" style="color:var(--purple)">${t.assignment_id||t.id}</div>
        <div class="qcard-sub">${t.transporter||'—'}</div></div>
        <div style="display:flex;gap:4px;flex-direction:column;align-items:flex-end">
          ${bdg(t.status||'Assigned')}
          ${diff!==null?`<span class="badge ${urgCls}" style="font-size:9px">${diff<0?'Overdue':diff+'d left'}</span>`:''}
        </div>
      </div>
      <div class="qtags">
        <span class="qtag">Booking: ${t.booking_ref||'—'}</span>
        <span class="qtag">Contract: ${t.order_id||'—'}</span>
        <span class="qtag hi">${t.num_containers_actual||'?'} containers</span>
        ${t.gate_in_deadline?`<span class="qtag">Gate-in: ${t.gate_in_deadline}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function filterEfAssignPopup(q){
  const list=S.recs.transporters.filter(t=>
    (t.status==='Assigned'||t.status==='In Transit'||t.status==='Delivered')&&
    (!q||[t.assignment_id,t.transporter,t.booking_ref,t.order_id].join(' ').toLowerCase().includes(q.toLowerCase()))
  );
  const el=document.getElementById('ef-assign-list');
  if(el)el.innerHTML=renderEfAssignList(list);
}

function closeEfAssignPopup(){
  const el=document.getElementById('ef-assign-wrapper');
  if(el)el.remove();
}

function pickEfAssign(aid){
  _efStuffSelAssign=aid;
  const t=S.recs.transporters.find(x=>x.assignment_id===aid||x.id===aid);
  const l=S.recs.loading.find(x=>x.assignment_id===aid);

  // Update display
  const disp=document.getElementById('ef_assign_display');
  if(disp&&t){disp.value=aid+' — '+(t.transporter||'—');disp.style.color='var(--green)';}

  // Update fields
  const setVal=(id,val)=>{const el=document.getElementById(id);if(el){el.value=val||'';el.classList.add('af');}};
  setVal('ef_aid',aid);
  setVal('ef_bref',t?.booking_ref||'');
  setVal('ef_contract',t?.order_id||'');

  // Pull container rows from loading groups
  if(l&&l.groups){
    try{
      const groups=JSON.parse(l.groups||'[]');
      _efStuffContainers=[];
      groups.forEach(g=>{
        (g.rows||[]).forEach(row=>{
          if(row.cno){
            _efStuffContainers.push({
              container_no:row.cno||'',
              vehicle_no:row.vno||'',
              seal_no:'',
              bags:'',
              net_weight:'',
              vendor:row.vendor||'',
              bag_marking:row.bagMarking||'',
              group_name:g.name||''
            });
          }
        });
      });
    }catch(e){_efStuffContainers=[];}
  }

  // Re-render containers
  const el=document.getElementById('ef_containers_render');
  if(el)el.innerHTML=renderEfContainers();
  closeEfAssignPopup();
}

  </div>
  ${_efStuffContainers.map((c,i)=>`
    <div style="display:grid;grid-template-columns:${COLS};gap:4px;margin-bottom:4px;align-items:center">

      <input style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);color:var(--amber);width:100%" value="${c.seal_no||''}" placeholder="SEAL001" oninput="updEfCont(${i},'seal_no',this.value)">
      <input type="number" style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);width:100%" value="${c.bags||''}" placeholder="0" oninput="updEfCont(${i},'bags',this.value)">
      <input type="number" step="0.001" style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);width:100%" value="${c.net_weight||''}" placeholder="0.000" oninput="updEfCont(${i},'net_weight',this.value)">
      <input style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;width:100%;color:var(--green)" value="${c.vendor||''}" readonly placeholder="Auto from loading">
      <input style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;width:100%;color:var(--amber)" value="${c.bag_marking||''}" readonly placeholder="Auto from loading">
      <button class="ghost xs" onclick="removeEfCont(${i})">✕</button>
    </div>`).join('')}
  <div style="margin-top:6px;font-size:11px;color:var(--txt3)">
    ${_efStuffContainers.length} containers ·
    Total bags: <strong style="color:var(--green);font-family:var(--mono)">${fmtN(_efStuffContainers.reduce((s,c)=>s+(Number(c.bags)||0),0))}</strong> ·
    Total net: <strong style="color:var(--blue);font-family:var(--mono)">${fmt(_efStuffContainers.reduce((s,c)=>s+(Number(c.net_weight)||0),0))} MT</strong>

function renderPsiReport(){
  const cn=_reportContractNo,cid=_reportContractId;
  const contract=S.recs.orders.find(o=>o.contract_no===cn||o.id===cid);
  const purchases=(S.recs.purchases||[]).filter(p=>p.linked_contract_no===cn||p.linked_contract_id===cid);
  const psiRecs=S.recs.psi.filter(p=>p.linked_contract_no===cn||p.linked_contract_id===cid);

  // Group by miller/vendor
  const vendorMap={};
  purchases.forEach(p=>{
    const v=p.vendor||'Unknown';
    if(!vendorMap[v])vendorMap[v]={vendor:v,purchase_qty:0,psi_records:[],approved:0,surveyed:0,dispatched:0};
    vendorMap[v].purchase_qty+=(Number(p.qty)||0);
  });
  psiRecs.forEach(p=>{
    const v=p.miller_name||'Unknown';
    if(!vendorMap[v])vendorMap[v]={vendor:v,purchase_qty:0,psi_records:[],approved:0,surveyed:0,dispatched:0};
    vendorMap[v].psi_records.push(p);
    vendorMap[v].approved+=(Number(p.qty_approved)||0);
    vendorMap[v].surveyed+=(Number(p.qty_surveyed)||0);
    vendorMap[v].dispatched+=(Number(p.qty_dispatched)||0);
  });

  const vendors=Object.values(vendorMap);
  const totalPurchased=vendors.reduce((s,v)=>s+v.purchase_qty,0);
  const totalApproved=vendors.reduce((s,v)=>s+v.approved,0);
  const totalDispatched=vendors.reduce((s,v)=>s+v.dispatched,0);

  return reportBanner()+`
  <div class="kgrid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">
    <div class="kpi"><div class="klbl">Contract</div><div style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue)">${cn}</div></div>
    <div class="kpi"><div class="klbl">Total Purchased</div><div class="kval" style="font-size:16px">${fmtN(totalPurchased)} MT</div></div>
    <div class="kpi"><div class="klbl">PSI Approved</div><div class="kval" style="color:var(--green);font-size:16px">${fmtN(totalApproved)} MT</div></div>
    <div class="kpi"><div class="klbl">PSI Pending</div><div class="kval" style="color:${totalPurchased-totalApproved>0?'var(--red)':'var(--green)'};font-size:16px">${fmtN(totalPurchased-totalApproved)} MT</div></div>
  </div>
  ${vendors.map(v=>{
    const pendPSI=v.purchase_qty-v.approved;
    const pct=v.purchase_qty?Math.round(v.approved/v.purchase_qty*100):0;
    return`<div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--amber)">${v.vendor}</div>
          <div style="font-size:11px;color:var(--txt2);margin-top:2px">Purchase: ${fmtN(v.purchase_qty)} MT · Approved: ${fmtN(v.approved)} MT · Dispatched: ${fmtN(v.dispatched)} MT</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--txt3)">PSI Pending</div>
          <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:${pendPSI>0?'var(--red)':'var(--green)'}">${fmtN(pendPSI)} MT</div>
        </div>
      </div>
      <div style="background:var(--bdr);border-radius:4px;height:6px;overflow:hidden;margin-bottom:10px">

function filterPsiPurchasePopup(q){
  const contractNo=document.getElementById('psi_contract')?.value;
  const purchases=S.recs.purchases.filter(p=>
    (!contractNo||(p.linked_contract_no===contractNo||p.linked_contract_id===_psiSelC))&&
    (!q||[p.vendor,p.commodity,p.bag_marking].join(' ').toLowerCase().includes(q.toLowerCase()))
  );
  const el=document.getElementById('psi-pur-list');
  if(!el)return;
  if(!purchases.length){el.innerHTML='<div class="empty">No matching purchase lots.</div>';return;}
  el.innerHTML=purchases.map(p=>{
    const psiDone=S.recs.psi.filter(ps=>ps.purchase_id===p.id).reduce((s,ps)=>s+(Number(ps.qty_approved)||0),0);
    const psiPending=(Number(p.qty)||0)-psiDone;
    const pct=p.qty?Math.round(psiDone/p.qty*100):0;
    return`<div class="qcard" onclick="pickPsiPurchase('${p.id}')" style="cursor:pointer">

function pickPsiPurchase(pid){
  _psiSelPurchase=pid;
  const p=S.recs.purchases.find(x=>x.id===pid);
  if(!p){closePsiPurchasePopup();return;}

  // Calculate PSI done and pending for this purchase lot
  const psiDone=S.recs.psi
    .filter(ps=>ps.purchase_id===pid)
    .reduce((s,ps)=>s+(Number(ps.qty_approved)||0),0);
  const psiPending=(Number(p.qty)||0)-psiDone;

  // Update fields directly in the open modal
  const dispEl=document.getElementById('psi_purchase_display');
  if(dispEl){
    dispEl.value=p.vendor+' — '+p.commodity+' ('+p.qty+' MT)';
    dispEl.style.color='var(--green)';
    dispEl.style.borderColor='rgba(52,211,153,.4)';
  }
  // Hidden purchase_id field
  const pidEl=document.getElementById('psi_purchase_id');
  if(pidEl)pidEl.value=pid;

  // Auto-fill miller name and location
  const millerEl=document.getElementById('psi_miller');
  if(millerEl&&!millerEl.value)millerEl.value=p.vendor||'';

  // Update quantity fields
  const survEl=document.getElementById('psi_surveyed');
  // Don't auto-fill qty — surveyor decides how much to survey

  // Show PSI balance panel
  const panel=document.getElementById('psi_balance_panel');
  if(panel){
    panel.style.display='block';
    document.getElementById('psi_lot_qty').textContent=fmtN(p.qty)+' MT';
    document.getElementById('psi_done_qty').textContent=fmtN(psiDone)+' MT';
    document.getElementById('psi_pending_qty').textContent=fmtN(psiPending)+' MT';
    document.getElementById('psi_pending_qty').style.color=psiPending>0?'var(--green)':'var(--red)';
    // Progress bar
    const pct=p.qty?Math.round(psiDone/p.qty*100):0;
    const bar=document.getElementById('psi_progress_bar');
    if(bar)bar.style.width=Math.min(pct,100)+'%';
    document.getElementById('psi_pct').textContent=pct+'% inspected';
  }

  closePsiPurchasePopup();
}

function closePsiPurchasePopup(){
  const el=document.getElementById('psi-pur-wrapper');
  if(el)el.remove();
}

function recalcPsiPending(){
  if(!_psiSelPurchase)return;
  const approved=parseFloat(document.getElementById('psi_approved')?.value)||0;
  const panel=document.getElementById('psi_balance_panel');
  if(!panel||panel.style.display==='none')return;
  const p=S.recs.purchases.find(x=>x.id===_psiSelPurchase);
  if(!p)return;
  const prevDone=S.recs.psi
    .filter(ps=>ps.purchase_id===_psiSelPurchase)
    .reduce((s,ps)=>s+(Number(ps.qty_approved)||0),0);
  // After this PSI is approved, total done = prevDone + approved
  const totalDone=prevDone+approved;
  const totalPending=(Number(p.qty)||0)-totalDone;
  document.getElementById('psi_done_qty').textContent=fmtN(totalDone)+' MT (incl. this PSI)';
  document.getElementById('psi_pending_qty').textContent=fmtN(totalPending)+' MT';
  document.getElementById('psi_pending_qty').style.color=totalPending>0?'var(--green)':'var(--red)';
  const pct=p.qty?Math.round(totalDone/p.qty*100):0;
  const bar=document.getElementById('psi_progress_bar');
  if(bar)bar.style.width=Math.min(pct,100)+'%';
  document.getElementById('psi_pct').textContent=pct+'% inspected';
}

function calcPsiAvail(){
  const approved=parseFloat(document.getElementById('psi_approved')?.value)||0;
  const dispatched=parseFloat(document.getElementById('psi_dispatched')?.value)||0;
  const avail=approved-dispatched;
  const el=document.getElementById('psi_avail');
  if(el){el.textContent=avail.toFixed(3)+' MT';el.style.color=avail>0?'var(--green)':avail===0?'var(--amber)':'var(--red)';}
}
async function savePsi(id){
  // Collect dynamic spec fields
  const contract=_psiSelC?S.recs.orders.find(o=>o.id===_psiSelC):null;
  const specRec=contract?S.recs.product_specs.find(ps=>ps.product===contract.product):null;
  const specFields=specRec?.spec_fields?specRec.spec_fields.split(',').map(s=>s.trim()):['Moisture %','Broken %','DD %','Length','Black Kernels'];
  const specResults={};
  specFields.forEach(f=>{
    const v=fv('spec_'+f.replace(/[^a-zA-Z0-9]/g,'_'));
    if(v)specResults[f]=parseFloat(v);
  });
  const data={
    psi_date:fv('psi_date')||null,miller_name:fv('psi_miller'),miller_location:fv('psi_loc'),
    surveyor_name:fv('psi_surveyor'),purchase_id:fv('psi_purchase_id')||null,
    linked_contract_no:fv('psi_contract'),linked_contract_id:_psiSelC||null,
    qty_surveyed:fv('psi_surveyed')||null,qty_approved:fv('psi_approved')||null,
    qty_dispatched:fv('psi_dispatched')||0,
    spec_results:JSON.stringify(specResults),spec_notes:fv('psi_notes'),
    result:fv('psi_result'),remarks:fv('psi_rem')
  };
  if(!id)data.id=uid('PSI');
  _psiSelC=null;_reRenderFn=null;
  await saveRec('psi',data,id||null);
}

function renderCfsPurchaseList(purchases){
  if(!purchases.length)return`<div class="empty">No pending purchase lots found. Add purchases first.</div>`;
  return purchases.map(p=>{
    // Get linked contract details
    const contract=S.recs.orders.find(o=>o.id===p.linked_contract_id||o.contract_no===p.linked_contract_no);
    // Get PSI summary for this purchase lot
    const psiList=S.recs.psi.filter(ps=>ps.purchase_id===p.id);
    const totalPsiApproved=psiList.reduce((s,ps)=>s+(Number(ps.qty_approved)||0),0);
    const totalPsiSurveyed=psiList.reduce((s,ps)=>s+(Number(ps.qty_surveyed)||0),0);
    const latestPsi=psiList.sort((a,b)=>new Date(b.psi_date||0)-new Date(a.psi_date||0))[0];
    // Get trucks already dispatched for this purchase
    const trucksDispatched=S.recs.cfs_trucks
      .filter(t=>t.purchase_id===p.id)
      .reduce((s,t)=>s+(Number(t.qty_mt)||0),0);
    const availableToDispatch=totalPsiApproved-trucksDispatched;
    return`<div class="qcard" onclick="pickCfsPurchase('${p.id}')" style="cursor:pointer">
      <div class="qcard-top">
        <div>
          <div class="qcard-id" style="color:var(--amber)">${p.vendor||'—'}</div>
          <div class="qcard-sub">${p.commodity||'—'} · ${p.linked_contract_no||'—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          <span class="badge ba">${fmtN(p.pending_qty||p.qty)} MT lot</span>
          <span class="badge ${availableToDispatch>0?'bg':'br'}">${fmt(availableToDispatch)} MT available</span>
        </div>
      </div>
      <div class="bmark"><span class="bmark-lbl">Bag Marking</span><span class="bmark-val">${p.bag_marking||'—'}</span></div>
      ${contract?`<div style="display:flex;align-items:center;gap:5px;background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.15);border-radius:5px;padding:4px 8px;margin-top:5px">
        <span style="font-size:9px;font-weight:600;color:var(--blue);text-transform:uppercase;white-space:nowrap">Contract</span>
        <span style="font-size:11px;font-weight:500;color:var(--blue);font-family:var(--mono)">${contract.contract_no||'—'}</span>
        <span style="font-size:10px;color:var(--txt2);margin-left:4px">${contract.buyer||'—'} · Exporter: ${contract.exporter||'—'}</span>
      </div>`:''}
      <div style="background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;margin-top:6px">
        <div style="font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">PSI Summary</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
          <div><div style="font-size:9px;color:var(--txt3)">PSI Records</div><div style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue)">${psiList.length}</div></div>
          <div><div style="font-size:9px;color:var(--txt3)">Total Surveyed</div><div style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--txt)">${fmt(totalPsiSurveyed)} MT</div></div>
          <div><div style="font-size:9px;color:var(--txt3)">Total Approved</div><div style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--green)">${fmt(totalPsiApproved)} MT</div></div>
          <div><div style="font-size:9px;color:var(--txt3)">Available (approved−dispatched)</div><div style="font-family:var(--mono);font-size:12px;font-weight:600;color:${availableToDispatch>0?'var(--green)':'var(--red)'}">${fmt(availableToDispatch)} MT</div></div>
        </div>
        ${latestPsi?`<div style="margin-top:6px;font-size:10px;color:var(--txt3)">Latest PSI: <span style="color:var(--txt2)">${latestPsi.psi_date||'—'}</span> · Surveyor: <span style="color:var(--txt2)">${latestPsi.surveyor_name||'—'}</span> · Result: ${bdg(latestPsi.result||'Pending')}</div>`:'<div style="margin-top:4px;font-size:10px;color:var(--red)">⚠ No PSI done for this lot yet</div>'}
      </div>
      <div class="qtags" style="margin-top:5px">
        <span class="qtag">₹${fmt(p.price_inr)}/MT</span>
        <span class="qtag">${p.price_type||'—'}</span>
        <span class="qtag">Broker: ${p.broker||'—'}</span>
        <span class="qtag">${p.purchase_date||'—'}</span>
      </div>
    </div>`;
  }).join('');
}

function filterCfsPurchasePopup(q){
  const purchases=S.recs.purchases.filter(p=>Number(p.pending_qty||p.qty||0)>0&&
    (!q||[p.vendor,p.commodity,p.bag_marking,p.linked_contract_no].join(' ').toLowerCase().includes(q.toLowerCase())));
  const el=document.getElementById('cfs-pur-list');
  if(el)el.innerHTML=renderCfsPurchaseList(purchases);
}

function closeCfsPurchasePopup(){
  const el=document.getElementById('cfs-pur-wrapper');
  if(el)el.remove();
}

function pickCfsPurchase(pid){
  _cfsSelPurchase=pid;
  const p=S.recs.purchases.find(x=>x.id===pid);
  if(!p){closeCfsPurchasePopup();return;}

  // Get contract
  const contract=S.recs.orders.find(o=>o.id===p.linked_contract_id||o.contract_no===p.linked_contract_no);

  // Get PSI summary
  const psiList=S.recs.psi.filter(ps=>ps.purchase_id===pid);
  const totalPsiApproved=psiList.reduce((s,ps)=>s+(Number(ps.qty_approved)||0),0);
  const latestPsi=psiList.sort((a,b)=>new Date(b.psi_date||0)-new Date(a.psi_date||0))[0];

  // Get trucks already dispatched for this purchase
  const trucksDispatched=S.recs.cfs_trucks
    .filter(t=>t.purchase_id===pid)
    .reduce((s,t)=>s+(Number(t.qty_mt)||0),0);
  const available=totalPsiApproved-trucksDispatched;

  // Update display field
  const disp=document.getElementById('cfs_purchase_display');
  if(disp){disp.value=p.vendor+' — '+p.commodity+' ('+fmtN(p.qty)+' MT)';disp.style.color='var(--green)';}

  // Auto-fill fields directly in open modal
  const setVal=(id,val,colored=true)=>{
    const el=document.getElementById(id);
    if(el){el.value=val||'';if(colored)el.classList.add('af');}
  };

  // Contract fields
  setVal('cfs_contract',contract?.contract_no||p.linked_contract_no||'');
  setVal('cfs_brand',p.bag_marking?.split('/')[0]?.trim()||p.commodity||'');

  // Purchaser = the vendor/company who bought from miller (from purchases record)
  // In this case the purchaser is whoever created the purchase order
  // The exporter is from the contract
  setVal('cfs_purchaser',p.vendor||'');  // vendor is who sold to us = miller is the seller, purchaser is us

  // Actually: purchaser = our company (the one who made the purchase)
  // exporter = from contract
  setVal('cfs_exporter',contract?.exporter||'');
  setVal('cfs_miller',p.vendor||'');  // vendor in purchases = the miller who is selling
  setVal('cfs_miller_loc',p.delivery_location||'');
  setVal('cfs_bag_marking',p.bag_marking||'');

  // PSI fields
  const psiEl=document.getElementById('cfs_psi_id');
  if(psiEl&&latestPsi)psiEl.value=latestPsi.id;

  // Show PSI summary panel
  const panel=document.getElementById('cfs_psi_panel');
  if(panel){
    panel.style.display='block';
    const setTxt=(id,val)=>{const e=document.getElementById(id);if(e)e.textContent=val;};
    setTxt('cfs_panel_miller',p.vendor||'—');
    setTxt('cfs_panel_lot',fmtN(p.qty)+' MT');
    setTxt('cfs_panel_approved',fmt(totalPsiApproved)+' MT');
    setTxt('cfs_panel_dispatched',fmt(trucksDispatched)+' MT');
    setTxt('cfs_panel_available',fmt(available)+' MT');
    const avEl=document.getElementById('cfs_panel_available');
    if(avEl)avEl.style.color=available>0?'var(--green)':'var(--red)';
    if(latestPsi){
      setTxt('cfs_panel_psi_date',latestPsi.psi_date||'—');
      setTxt('cfs_panel_psi_surv',latestPsi.surveyor_name||'—');
      setTxt('cfs_panel_psi_result',latestPsi.result||'—');
    }
  }

  closeCfsPurchasePopup();
}

function calcCfsAmount(){
  const qty=parseFloat(document.getElementById('cfs_qty')?.value)||0;
  const rate=parseFloat(document.getElementById('cfs_rate')?.value)||0;
  const el=document.getElementById('cfs_amount_disp');
  if(el)el.textContent=qty&&rate?'₹'+fmt(qty*rate):'—';
}

function calcCfsWeights(){
  const fg=parseFloat(document.getElementById('cfs_fgross')?.value)||0;
  const ft=parseFloat(document.getElementById('cfs_ftare')?.value)||0;
  const fn_el=document.getElementById('cfs_fnet');
  if(fn_el&&(fg||ft))fn_el.textContent=fmt(fg-ft)+' MT';
  // Check PSI limit
  const qty=parseFloat(document.getElementById('cfs_qty')?.value)||0;
  const avEl=document.getElementById('cfs_panel_available');
  const warnEl=document.getElementById('cfs_psi_warn');
  if(warnEl&&avEl){
    const avail=parseFloat(avEl.textContent)||0;
    warnEl.style.display=qty>avail?'block':'none';
  }
}

      <div class="fgrp"><label>Factory Net Wt (auto)</label><div id="cfs_fnet" style="padding:6px 9px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--green)">${r.factory_net?fmt(r.factory_net)+' MT':'—'}</div></div>
      ${msec('Rate & Amount')}
      <div class="fgrp"><label>Rate (INR/MT)</label><input type="number" step="0.01" id="cfs_rate" value="${r.rate_inr||''}" oninput="calcCfsAmount()"></div>
      <div class="fgrp"><label>Amount (INR) (auto)</label><div id="cfs_amount_disp" style="padding:6px 9px;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)">${r.amount_inr?'₹'+fmt(r.amount_inr):'—'}</div></div>
      <div class="fgrp full"><label>Remarks</label><textarea id="cfs_rem">${r.remarks||''}</textarea></div>
    </div>`;

  openModal(mw(id?'Edit CFS Truck Dispatch':'New CFS Truck Dispatch',body,id?`saveCfsTruck('${id}')`:'saveCfsTruck()',true));
  setTimeout(()=>{calcCfsAmount();calcCfsWeights();},80);
}

async function saveCfsTruck(id){
  const fg=parseFloat(document.getElementById('cfs_fgross')?.value)||0;
  const ft_val=parseFloat(document.getElementById('cfs_ftare')?.value)||0;
  const qty=parseFloat(document.getElementById('cfs_qty')?.value)||0;
  const rate=parseFloat(document.getElementById('cfs_rate')?.value)||0;
  const selP=_cfsSelPurchase?S.recs.purchases.find(p=>p.id===_cfsSelPurchase):null;
  const contract=selP?S.recs.orders.find(o=>o.id===selP?.linked_contract_id||o.contract_no===selP?.linked_contract_no):null;
  const data={
    purchase_id:_cfsSelPurchase||null,
    invoice_ref:fv('cfs_invref'),
    brand:fv('cfs_bag_marking'),
    purchaser:fv('cfs_purchaser'),
    billing_party:fv('cfs_purchaser'),
    exporter:fv('cfs_exporter'),
    miller_name:fv('cfs_miller'),
    miller_place:fv('cfs_miller_loc'),
    miller_invoice_no:fv('cfs_minvno'),
    miller_invoice_date:fv('cfs_minvdate')||null,
    vehicle_no:fv('cfs_vehicle'),
    truck_date:fv('cfs_truckdate')||null,
    total_bags:parseInt(fv('cfs_bags'))||null,
    qty_mt:qty||null,
    rate_inr:rate||null,
    amount_inr:qty&&rate?qty*rate:null,
    factory_gross:fg||null,
    factory_tare:ft_val||null,
    factory_net:fg?fg-ft_val:null,
    psi_id:fv('cfs_psi_id')||null,
    linked_contract_no:fv('cfs_contract'),
    linked_contract_id:selP?.linked_contract_id||contract?.id||null,
    is_part:fv('cfs_part')==='Yes',
    bag_marking:fv('cfs_bag_marking'),
    remarks:fv('cfs_rem')
  };
  if(!id)data.id=uid('CFS');
  _cfsSelPurchase=null;
  await saveRec('cfs_trucks',data,id||null);
}

        <h3 style="margin:0">Select Invoice</h3>

      </div>
      <input id="stf-inv-search"
        style="background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;font-size:12px;font-family:var(--font);color:var(--txt);width:100%;outline:none;margin-bottom:10px;flex-shrink:0"

function renderStuffingInvList(list){
  if(!list.length)return`<div class="empty">No invoices found. Create one in Invoice & Packing List first.</div>`;
  return list.map(inv=>{
    const contract=S.recs.orders.find(o=>o.contract_no===inv.contract_no||o.id===inv.linked_contract_id);
    // Count trucks already linked to this invoice
    const trucks=S.recs.cfs_trucks.filter(t=>t.invoice_ref===inv.invoice_no);
    return`<div class="qcard" onclick="pickStuffingInvoice('${inv.id}')" style="cursor:pointer">
      <div class="qcard-top">
        <div>
          <div class="qcard-id">${inv.invoice_no||inv.id}</div>
          <div class="qcard-sub">${inv.buyer||'—'} · ${inv.exporter||'—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          ${bdg(inv.invoice_type||'CFS')}
          <span class="badge bb">${inv.currency||'USD'} ${fmt(inv.invoice_value)}</span>
        </div>
      </div>
      <div class="bmark"><span class="bmark-lbl">Bag Marking</span><span class="bmark-val">${inv.bag_marking||'—'}</span></div>
      <div class="qtags" style="margin-top:5px">
        <span class="qtag ok">${inv.contract_no||'—'}</span>
        <span class="qtag">${inv.commodity||'—'}</span>
        <span class="qtag hi">${fmtN(inv.qty)} MT</span>
        <span class="qtag">${trucks.length} truck${trucks.length!==1?'s':''} dispatched</span>
        <span class="qtag">Date: ${inv.invoice_date||'—'}</span>
      </div>
    </div>`;
  }).join('');
}

function filterStuffingInvPopup(q){
  const list=S.recs.invoices.filter(inv=>
    !q||[inv.invoice_no,inv.buyer,inv.contract_no,inv.exporter,inv.bag_marking].join(' ').toLowerCase().includes(q.toLowerCase())
  );
  const el=document.getElementById('stf-inv-list');
  if(el)el.innerHTML=renderStuffingInvList(list);
}

function closeStuffingInvPopup(){
  const el=document.getElementById('stf-inv-wrapper');
  if(el)el.remove();
}

function pickStuffingInvoice(invId){
  _stuffSelInv=invId;
  const inv=S.recs.invoices.find(i=>i.id===invId);
  if(!inv){closeStuffingInvPopup();return;}

  // Update display field
  const disp=document.getElementById('stf_inv_display');
  if(disp){disp.value=inv.invoice_no+' — '+inv.buyer+' · '+inv.exporter;disp.style.color='var(--green)';}

  // Auto-fill fields
  const setVal=(id,val)=>{const el=document.getElementById(id);if(el){el.value=val||'';el.classList.add('af');}};
  setVal('stf_contract',inv.contract_no||'');
  setVal('stf_invdate',inv.invoice_date||'');
  setVal('stf_exporter',inv.exporter||'');
  setVal('stf_buyer',inv.buyer||'');
  setVal('stf_brand',inv.bag_marking||'');
  setVal('stf_commodity',inv.commodity||'');
  setVal('stf_inv_qty',inv.qty||'');

  // Load trucks for this invoice from cfs_trucks table
  const trucks=S.recs.cfs_trucks.filter(t=>t.invoice_ref===inv.invoice_no);
  _stuffTrucks=trucks.map(t=>({
    miller_name:t.miller_name||'',
    miller_place:t.miller_place||'',
    miller_invoice_no:t.miller_invoice_no||'',
    miller_invoice_date:t.miller_invoice_date||'',
    truck_no:t.vehicle_no||'',
    truck_date:t.truck_date||'',
    total_bags:t.total_bags||'',
    qty_mt:t.qty_mt||'',
    brand:t.brand||inv.bag_marking||'',
    receiving_bags:t.receiving_bags||t.total_bags||'',
    cfs_date:t.cfs_date||'',
    factory_gross:t.factory_gross||'',
    factory_tare:t.factory_tare||'',
    factory_net:t.factory_net||'',
    cfs_gross:t.cfs_gross||'',
    cfs_tare:t.cfs_tare||'',
    cfs_net:t.cfs_net||'',
    cfs_name:'',
    remarks:t.remarks||''
  }));

  // Calculate total bags from trucks
  const totalBags=_stuffTrucks.reduce((s,t)=>s+(Number(t.total_bags)||0),0);
  const totalBagsEl=document.getElementById('stf_total_bags');
  if(totalBagsEl)totalBagsEl.value=totalBags||'';

  // Load containers from invoice packing list
  let invConts=[];try{invConts=JSON.parse(inv.containers||'[]');}catch(e){}
  if(invConts.length&&!_stuffContainers.length){
    _stuffContainers=invConts.map(c=>({
      container_no:c.container_no||'',
      seal_no:c.seal_no||'',
      bags:'',
      stuffing_date:'',
      tare_weight:'',
      is_part:false,
      remarks:''
    }));
  }

  // Re-render truck and container tables
  const trEl=document.getElementById('stf_trucks_render');
  if(trEl)trEl.innerHTML=renderStuffTrucks();
  const cnEl=document.getElementById('stf_containers_render');
  if(cnEl)cnEl.innerHTML=renderStuffContainers();
  updateStuffBalance();
  closeStuffingInvPopup();
}

// ── Truck rows renderer ────────────────────────────────────

  const THDRS=['#','Miller Name','Place','Miller Inv.','Date','Truck No.','Truck Date','Total Bags','MTs','Brand','Rcvd Bags','CFS Date','Fac.Gross','Fac.Tare','Fac.Net','CFS Gross','CFS Tare','CFS Net','CFS Name','Remarks',''];
  return`<div style="overflow-x:auto">
  <div style="display:grid;grid-template-columns:${TCOLS};gap:3px;margin-bottom:3px;min-width:1400px">
    ${THDRS.map(h=>`<div class="col-hdr">${h}</div>`).join('')}

    <div style="display:grid;grid-template-columns:${TCOLS};gap:3px;margin-bottom:3px;align-items:center;min-width:1400px">
      <div style="font-family:var(--mono);font-size:10px;color:var(--txt3);text-align:center">${i+1}</div>
      ${['miller_name','miller_place','miller_invoice_no','miller_invoice_date','truck_no','truck_date','total_bags','qty_mt','brand','receiving_bags','cfs_date','factory_gross','factory_tare','factory_net','cfs_gross','cfs_tare','cfs_net','cfs_name','remarks'].map((f,fi)=>`
        <input type="${['total_bags','qty_mt','receiving_bags','factory_gross','factory_tare','factory_net','cfs_gross','cfs_tare','cfs_net'].includes(f)?'number':['miller_invoice_date','truck_date','cfs_date'].includes(f)?'date':'text'}"
          step="${f.includes('gross')||f.includes('tare')||f.includes('net')||f==='qty_mt'?'0.001':'1'}"
          style="background:var(--surf);border:1px solid var(--bdr);border-radius:4px;padding:4px 5px;font-size:10px;font-family:${f==='truck_no'||f.includes('invoice_no')?'var(--mono)':'var(--font)'};color:var(--txt);width:100%;outline:none"
          value="${t[f]||''}"
          placeholder="${f==='miller_name'?'Miller':f==='truck_no'?'AP00XX0000':''}"
          oninput="updStuffTruck(${i},'${f}',this.value);${f==='total_bags'||f==='receiving_bags'?'updateStuffBalance();':''}">`
      ).join('')}
      <button class="ghost xs" onclick="removeStuffTruck(${i})">✕</button>
    </div>`).join('')}

    ${_stuffTrucks.length} truck${_stuffTrucks.length!==1?'s':''} ·
    Total bags: <strong style="color:var(--green);font-family:var(--mono)">${fmtN(_stuffTrucks.reduce((s,t)=>s+(Number(t.total_bags)||0),0))}</strong> ·
    Total MT: <strong style="color:var(--green);font-family:var(--mono)">${fmt(_stuffTrucks.reduce((s,t)=>s+(Number(t.qty_mt)||0),0))}</strong> ·
    Fac.Net: <strong style="color:var(--blue);font-family:var(--mono)">${fmt(_stuffTrucks.reduce((s,t)=>s+(Number(t.factory_net)||0),0))} MT</strong> ·
    CFS Net: <strong style="color:var(--blue);font-family:var(--mono)">${fmt(_stuffTrucks.reduce((s,t)=>s+(Number(t.cfs_net)||0),0))} MT</strong>

function addStuffTruck(){
  _stuffTrucks.push({miller_name:'',miller_place:'',miller_invoice_no:'',miller_invoice_date:'',truck_no:'',truck_date:today(),total_bags:'',qty_mt:'',brand:'',receiving_bags:'',cfs_date:'',factory_gross:'',factory_tare:'',factory_net:'',cfs_gross:'',cfs_tare:'',cfs_net:'',cfs_name:'',remarks:''});
  const el=document.getElementById('stf_trucks_render');
  if(el)el.innerHTML=renderStuffTrucks();
  updateStuffBalance();
}
function removeStuffTruck(i){_stuffTrucks.splice(i,1);const el=document.getElementById('stf_trucks_render');if(el)el.innerHTML=renderStuffTrucks();updateStuffBalance();}
function updStuffTruck(i,f,v){
  if(_stuffTrucks[i])_stuffTrucks[i][f]=v;
  // Auto-calc net weights
  if(f==='factory_gross'||f==='factory_tare'){
    const fg=parseFloat(_stuffTrucks[i].factory_gross)||0;
    const ft=parseFloat(_stuffTrucks[i].factory_tare)||0;
    _stuffTrucks[i].factory_net=fg?parseFloat((fg-ft).toFixed(3)):0;
  }
  if(f==='cfs_gross'||f==='cfs_tare'){
    const cg=parseFloat(_stuffTrucks[i].cfs_gross)||0;
    const ct=parseFloat(_stuffTrucks[i].cfs_tare)||0;
    _stuffTrucks[i].cfs_net=cg?parseFloat((cg-ct).toFixed(3)):0;
  }
}

    ${_stuffContainers.length} container${_stuffContainers.length!==1?'s':''} ·

    ${_stuffContainers.filter(c=>c.is_part).length?' · '+_stuffContainers.filter(c=>c.is_part).length+' PART containers':''}

  </div>`;
}

function addStuffCont(){_stuffContainers.push({container_no:'',seal_no:'',bags:'',stuffing_date:today(),tare_weight:'',is_part:false,remarks:''});const el=document.getElementById('stf_containers_render');if(el)el.innerHTML=renderStuffContainers();updateStuffBalance();}
function removeStuffCont(i){_stuffContainers.splice(i,1);const el=document.getElementById('stf_containers_render');if(el)el.innerHTML=renderStuffContainers();updateStuffBalance();}
function updStuffCont(i,f,v){if(_stuffContainers[i])_stuffContainers[i][f]=v;}

function updateStuffBalance(){
  const rcv=_stuffTrucks.reduce((s,t)=>s+(Number(t.receiving_bags||t.total_bags)||0),0);
  const stuffed=_stuffContainers.reduce((s,c)=>s+(Number(c.bags)||0),0);
  const stock=rcv-stuffed;
  const el=document.getElementById('stf_balance_display');
  if(el)el.innerHTML=`Received: <strong style="color:var(--blue);font-family:var(--mono)">${fmtN(rcv)} bags</strong> &nbsp;·&nbsp; Stuffed: <strong style="color:var(--green);font-family:var(--mono)">${fmtN(stuffed)} bags</strong> &nbsp;·&nbsp; Stock at CFS: <strong style="color:${stock>0?'var(--cyan)':'var(--green)'};font-family:var(--mono)">${fmtN(stock)} bags</strong>`;
  const tbEl=document.getElementById('stf_total_bags');
  if(tbEl&&!tbEl.value)tbEl.value=rcv||'';
}

async function saveStuffing(id){
  const selInv=_stuffSelInv?S.recs.invoices.find(i=>i.id===_stuffSelInv):null;
  const invNo=document.getElementById('stf_invno')?.value||fv('stf_invno');
  const totalRcvBags=_stuffTrucks.reduce((s,t)=>s+(Number(t.receiving_bags||t.total_bags)||0),0);
  const stuffedBags=_stuffContainers.reduce((s,c)=>s+(Number(c.bags)||0),0);
  const stock=totalRcvBags-stuffedBags;
  const data={
    invoice_id:_stuffSelInv||null,
    export_invoice_no:invNo||selInv?.invoice_no||'',
    invoice_date:fv('stf_invdate')||null,
    linked_contract_no:fv('stf_contract'),
    linked_contract_id:selInv?.linked_contract_id||null,
    exporter:fv('stf_exporter'),
    buyer:fv('stf_buyer'),
    brand:fv('stf_brand'),
    commodity:fv('stf_commodity'),
    invoice_qty:fv('stf_inv_qty')||null,
    cfs_name:fv('stf_cfs'),
    port_reporting_date:fv('stf_port_date')||null,
    port_reporting_time:fv('stf_port_time')||null,
    cfs_reporting_date:fv('stf_cfs_date')||null,
    cfs_reporting_time:fv('stf_cfs_time')||null,
    total_bags_received:parseInt(fv('stf_total_bags'))||totalRcvBags||null,
    dsr_ref:fv('stf_dsr'),
    status:fv('stf_status'),
    truck_records:JSON.stringify(_stuffTrucks),
    containers:JSON.stringify(_stuffContainers),
    stock_at_cfs:stock||null,
    remarks:fv('stf_rem')
  };
  if(!id)data.id=uid('DSR');
  _stuffSelInv=null;_stuffTrucks=[];_stuffContainers=[];
  await saveRec('cfs_stuffing',data,id||null);
}

    const hasPL=withPL.has(inv.id);
    return`<div class="qcard${hasPL?' sel':''}" onclick="pickPlInvoice('${inv.id}')" style="cursor:pointer">
      <div class="qcard-top">
        <div>

function filterPlInvPopup(q){
  const withPL=new Set((S.recs.packing_list||[]).map(r=>r.invoice_id).filter(Boolean));
  const all=S.recs.invoices.filter(inv=>!q||[inv.invoice_no,inv.buyer,inv.contract_no,inv.exporter].join(' ').toLowerCase().includes(q.toLowerCase()));
  const pending=all.filter(i=>!withPL.has(i.id));
  const el=document.getElementById('pl-inv-list');
  if(el)el.innerHTML=renderPlInvList(pending,all,withPL);
}

function closePlInvPopup(){
  const el=document.getElementById('pl-inv-wrapper');
  if(el)el.remove();
}

function pickPlInvoice(invId){
  _plSelInv=invId;
  const inv=S.recs.invoices.find(i=>i.id===invId);
  if(!inv){closePlInvPopup();return;}

  // Update display
  const disp=document.getElementById('pl_inv_display');
  if(disp){disp.value=inv.invoice_no+' — '+inv.buyer+' · '+inv.exporter;disp.style.color='var(--green)';}

  // Auto-fill header fields
  const sa=(id,val)=>{const el=document.getElementById(id);if(el){el.value=val||'';el.classList.add('af');}};
  sa('pl_invno',inv.invoice_no||'');
  sa('pl_contract',inv.contract_no||'');
  sa('pl_buyer',inv.buyer||'');
  sa('pl_exporter',inv.exporter||'');
  sa('pl_comm',inv.commodity||'');
  sa('pl_bmark',inv.bag_marking||'');
  sa('pl_qty',inv.qty||'');
  sa('pl_invdate',inv.invoice_date||'');

  // Detect flow type and auto-populate containers
  const invType=inv.invoice_type||'';
  let sourceType='';
  let sourceContainers=[];

  if(invType==='CFS / Port Delivery'){
    // Look for CFS stuffing record
    const cfsRec=S.recs.cfs_stuffing.find(r=>r.export_invoice_no===inv.invoice_no||r.invoice_id===invId);
    if(cfsRec){
      try{
        const conts=JSON.parse(cfsRec.containers||'[]');
        sourceContainers=conts.map(c=>({container_no:c.container_no||'',bags:c.bags||'',net_weight:c.cfs_net||c.net_weight||'',gross_weight:c.cfs_gross||c.gross_weight||''}));
        sourceType='CFS Stuffing (DSR)';
      }catch(e){}
    }
  } else {
    // Ex-Factory or Material Supply — look for EF stuffing
    const efRec=(S.recs.ef_stuffing||[]).find(r=>r.linked_contract_no===inv.contract_no||r.booking_ref===inv.booking_ref);
    if(efRec){
      try{
        const conts=JSON.parse(efRec.containers||'[]');
        sourceContainers=conts.map(c=>({container_no:c.container_no||'',bags:c.bags||'',net_weight:c.net_weight||'',gross_weight:''}));
        sourceType='Ex-Factory Stuffing';
      }catch(e){}
    }
    // Fallback to CFS if no EF stuffing
    if(!sourceContainers.length){
      const cfsRec=S.recs.cfs_stuffing.find(r=>r.export_invoice_no===inv.invoice_no||r.invoice_id===invId);
      if(cfsRec){
        try{
          const conts=JSON.parse(cfsRec.containers||'[]');
          sourceContainers=conts.map(c=>({container_no:c.container_no||'',bags:c.bags||'',net_weight:c.cfs_net||c.net_weight||'',gross_weight:c.cfs_gross||c.gross_weight||''}));
          sourceType='CFS Stuffing (DSR)';
        }catch(e){}
      }
    }
  }

  if(sourceContainers.length){
    _plContainers=sourceContainers;
    const srcEl=document.getElementById('pl_source_info');
    if(srcEl){srcEl.textContent='Auto-filled from: '+sourceType+' ('+sourceContainers.length+' containers)';srcEl.style.display='block';}
  }

  const stEl=document.getElementById('pl_source_type');
  if(stEl)stEl.value=sourceType||invType;

  const el=document.getElementById('pl_containers_render');
  if(el)el.innerHTML=renderPlContainers();
  closePlInvPopup();
}

async function saveInvoice(id){
  calcInvoiceValue();
  const data={
    invoice_no:fv('inv_no')||null,invoice_date:fv('inv_date')||null,
    contract_no:fv('inv_contract'),linked_contract_id:_invSelC||null,
    buyer:fv('inv_buyer'),exporter:fv('inv_exporter'),commodity:fv('inv_comm'),
    bag_marking:fv('inv_bmark'),qty:fv('inv_qty')||null,unit_price:fv('inv_price')||null,
    currency:fv('inv_cur'),invoice_value:fv('inv_value')||null,
    payment_terms:fv('inv_pterm'),delivery_terms:fv('inv_dterm'),
    cutoff_date:fv('inv_cutoff')||null,invoice_type:fv('inv_type'),
    payment_status:fv('inv_pstatus'),
    containers:JSON.stringify(_invContainers),
    remarks:fv('inv_rem')
  };
  if(!id)data.id=uid('INV');
  _invSelC=null;_invContainers=[];_reRenderFn=null;
  await saveRec('invoices',data,id||null);
}
