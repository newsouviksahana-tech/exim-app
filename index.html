// ── PSI records for a vendor ──────────────────────────────
function renderPsiForVendor(vendor,contractNo){
  const psiList=(S.recs.psi||[]).filter(p=>
    (p.miller_name===vendor||p.linked_contract_no===contractNo)&&
    (p.miller_name===vendor)
  );
  if(!psiList.length)return`<div style="font-size:11px;color:var(--txt3);padding:4px 8px">No PSI records found for ${vendor}.</div>`;
  return`<div style="margin-top:6px;margin-left:8px">
    ${psiList.map(p=>`
      <div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--surf);border:1px solid var(--bdr);border-radius:5px;margin-bottom:3px;flex-wrap:wrap">
        <span class="mono" style="font-size:10px;color:var(--pink)">${p.id}</span>
        <span style="font-size:11px;color:var(--txt2)">${p.psi_date||'—'}</span>
        ${bdg(p.result||'Pending')}
        <span style="font-size:10px;color:var(--txt3)">Approved: <strong style="font-family:var(--mono);color:var(--green)">${fmtN(p.qty_approved)} MT</strong></span>
        <span style="font-size:10px;color:var(--txt3)">Surveyor: ${p.surveyor_name||'—'}</span>
      </div>`).join('')}
  </div>`;
}

// ── Pending status tracker ────────────────────────────────
function renderPendingStatus(o){
  const contractNo=o.contract_no;
  const bookings=(S.recs.containers||[]).filter(c=>c.linked_contract_no===contractNo);
  const transporters=(S.recs.transporters||[]).filter(t=>t.order_id===contractNo||bookings.some(b=>b.booking_ref===t.booking_ref));
  const loading=(S.recs.loading||[]).filter(l=>transporters.some(t=>t.assignment_id===l.assignment_id));
  const psiList=(S.recs.psi||[]).filter(p=>p.linked_contract_no===contractNo);
  const cfsItems=(S.recs.cfs_trucks||[]).filter(t=>t.linked_contract_no===contractNo);
  const cfsStuff=(S.recs.cfs_stuffing||[]).filter(s=>s.linked_contract_no===contractNo);
  const customs=(S.recs.customs||[]).filter(c=>c.contract_no===contractNo);

  // Build stage status
  const stages=[
    {
      label:'Container Booking',
      done:bookings.length>0,
      detail:bookings.length?`${bookings.reduce((s,b)=>s+(Number(b.num_containers)||0),0)} containers booked (${bookings.map(b=>b.booking_ref||'—').join(', ')})`:'No bookings yet',
      color:bookings.length?'var(--green)':'var(--red)'
    },
    {
      label:'Transporter Assigned',
      done:transporters.length>0,
      detail:transporters.length?`${transporters.length} assignment${transporters.length>1?'s':''} — ${transporters.map(t=>t.transporter||'—').join(', ')}`:'No transporter assigned',
      color:transporters.length?'var(--green)':'var(--amber)'
    },
  ];

  // Ex-factory specific
  if(loading.length||o.invoice_type==='Ex-Factory'){
    stages.push({
      label:'Loading Assignment (Ex-Factory)',
      done:loading.length>0,
      detail:loading.length?loading.map(l=>{
        let grps=[];try{grps=JSON.parse(l.groups||'[]');}catch(e){}
        const totC=grps.reduce((s,g)=>s+g.rows.length,0);
        const millers=[...new Set(grps.flatMap(g=>g.rows.map(r=>r.vendor).filter(Boolean)))];
        return`${l.assignment_id||l.id}: ${totC} containers, millers: ${millers.join(', ')||'—'}`;
      }).join(' | '):'No loading assignment',
      color:loading.length?'var(--green)':'var(--amber)'
    });
  }

  // PSI (CFS)
  if(psiList.length||cfsItems.length){
    const psiApproved=psiList.reduce((s,p)=>s+(Number(p.qty_approved)||0),0);
    stages.push({
      label:'PSI Done (CFS)',
      done:psiList.length>0,
      detail:psiList.length?`${psiList.length} PSI record${psiList.length>1?'s':''} — ${fmtN(psiApproved)} MT approved`:'No PSI done yet',
      color:psiList.length?'var(--green)':'var(--amber)'
    });
    const cfsQty=cfsItems.reduce((s,t)=>s+(Number(t.qty_mt)||0),0);
    stages.push({
      label:'CFS Truck Dispatch',
      done:cfsItems.length>0,
      detail:cfsItems.length?`${cfsItems.length} trucks — ${fmt(cfsQty)} MT dispatched`:'No trucks dispatched yet',
      color:cfsItems.length?'var(--green)':'var(--amber)'
    });
    const stuffedConts=cfsStuff.reduce((s,r)=>{let c=[];try{c=JSON.parse(r.containers||'[]');}catch(e){}return s+c.length;},0);
    stages.push({
      label:'CFS Stuffing',
      done:cfsStuff.length>0,
      detail:cfsStuff.length?`${stuffedConts} containers stuffed`:'CFS stuffing not done',
      color:cfsStuff.length?'var(--green)':'var(--amber)'
    });
  }

  // Port entry
  const portDone=customs.filter(c=>c.status==='Gate-In Done'||c.status==='Loaded on Vessel').length;
  stages.push({
    label:'Port Entry / Gate-In',
    done:portDone>0,
    detail:portDone>0?`${portDone} container${portDone>1?'s':''} gate-in done`:customs.length?`Customs in progress (${customs[0]?.status||'—'})`:'Port entry not started',
    color:portDone>0?'var(--green)':customs.length?'var(--amber)':'var(--red)'
  });

  return`
  <div style="display:flex;flex-direction:column;gap:6px">
    ${stages.map(s=>`
      <div style="display:flex;align-items:flex-start;gap:10px;padding:7px 10px;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px">
        <div style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0;margin-top:3px"></div>
        <div>
          <div style="font-size:11px;font-weight:500;color:var(--txt)">${s.label}</div>
          <div style="font-size:10px;color:var(--txt3);margin-top:1px">${s.detail}</div>
        </div>
        <div style="margin-left:auto;flex-shrink:0">${s.done?'<span style="font-size:10px;color:var(--green);font-weight:500">✓ Done</span>':'<span style="font-size:10px;color:var(--amber)">Pending</span>'}</div>
      </div>`).join('')}
  </div>`;
}


// ══════════════════════════════════════════════════════════
// CONTRACT TRACKING MODULE v2
// Pipeline: Booking → Purchase → Bags → [EF flow] OR [CFS flow] → Invoice → Packing List → Customs → Container Status → Payment
// ══════════════════════════════════════════════════════════
let _trackFilter='all',_trackCo='',_trackSearch='',_trackExp={};

function renderTracking(){
  const orders=S.recs.orders||[];
  const companies=S.recs.companies||[];
  const confirmed=orders.filter(o=>o.signed_contract==='Yes');

  // Classify completed vs pending
  const isComplete=o=>{
    const invs=(S.recs.invoices||[]).filter(i=>i.contract_no===o.contract_no);
    const invQty=invs.reduce((s,i)=>s+(Number(i.qty)||0),0);
    return invs.length>0&&invs.every(i=>i.payment_status==='Paid')&&invQty>=(Number(o.qty)||0)*0.95;
  };

  let list=confirmed.filter(o=>
    (!_trackCo||o.exporter===_trackCo)&&
    (!_trackSearch||[o.contract_no,o.buyer,o.product,o.exporter].join(' ').toLowerCase().includes(_trackSearch.toLowerCase()))
  );
  const cmpSet=new Set(list.filter(isComplete).map(o=>o.id));
  if(_trackFilter==='completed')list=list.filter(o=>cmpSet.has(o.id));
  else if(_trackFilter==='pending')list=list.filter(o=>!cmpSet.has(o.id));

  const total=confirmed.length,done=confirmed.filter(isComplete).length,pend=total-done;

  return`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <div style="display:flex;gap:4px;flex-wrap:wrap">
      ${[['all',total,'All'],['completed',done,'Completed'],['pending',pend,'Pending']].map(([f,n,lbl])=>`
        <div onclick="_trackFilter='${f}';document.getElementById('ca').innerHTML=renderTracking()"
          style="padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;border:1px solid;transition:all .1s;
            ${_trackFilter===f?'background:var(--blue);color:#fff;border-color:var(--blue)':'background:var(--surf);color:var(--txt2);border-color:var(--bdr)'}">
          ${lbl} <span style="opacity:.7;font-size:10px">(${n})</span>
        </div>`).join('')}
    </div>
    <select style="background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:12px;color:var(--txt);font-family:var(--font);outline:none"
      onchange="_trackCo=this.value;document.getElementById('ca').innerHTML=renderTracking()">
      <option value="">All Companies</option>
      ${companies.map(c=>`<option value="${c.name}"${_trackCo===c.name?' selected':''}>${c.name}</option>`).join('')}
    </select>
    <input style="background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:12px;font-family:var(--font);color:var(--txt);outline:none;flex:1;max-width:240px"
      placeholder="Search contract, buyer, product…" value="${_trackSearch}"
      oninput="_trackSearch=this.value;document.getElementById('ca').innerHTML=renderTracking()">
  </div>
  ${list.length?list.map(o=>renderTrackCard(o,cmpSet.has(o.id))).join('')
    :`<div class="empty"><strong>No contracts found</strong></div>`}`;
}


// ── Pending items summary (always visible on card) ────────

function toggleContract(contractId){
  _trackExp[contractId]=!(_trackExp[contractId]||false);
  document.getElementById('ca').innerHTML=renderTracking();
}

function toggleStage(expKey){
  _trackExp[expKey]=!(_trackExp[expKey]||false);
  document.getElementById('ca').innerHTML=renderTracking();
}

function openModuleReport(pageId,contractNo,contractId,contractLabel){
  setPage(pageId,contractNo,contractId,contractLabel);
}

function renderPendingSummary(o,d){
  const contractQty=Number(o.qty)||0;
  const items=[];
  const purchasedQty=d.purchases.reduce((s,p)=>s+(Number(p.qty)||0),0);
  const invoicedQty=d.invoices.reduce((s,i)=>s+(Number(i.qty)||0),0);
  const psiApproved=d.psi.reduce((s,p)=>s+(Number(p.qty_approved)||0),0);
  const truckQty=d.cfsTrucks.reduce((s,t)=>s+(Number(t.qty_mt)||0),0);
  const truckBags=d.cfsTrucks.reduce((s,t)=>s+(Number(t.total_bags)||0),0);
  const rcvBags=d.cfsStuff.reduce((s,r)=>s+(Number(r.total_bags_received)||0),0);
  let stuffedBags=0;
  d.cfsStuff.forEach(r=>{let c=[];try{c=JSON.parse(r.containers||'[]');}catch(e){}stuffedBags+=c.reduce((s,x)=>s+(Number(x.bags)||0),0);});
  const rcvUSD=d.payments.reduce((s,p)=>s+(Number(p.amount_received)||0),0);
  const totalInvUSD=d.invoices.reduce((s,i)=>s+(Number(i.invoice_value)||0),0);

  // 1. Pending shipment qty
  const pendShip=contractQty-invoicedQty;
  if(pendShip>0.001)items.push({label:'Shipment qty pending',val:fmtN(pendShip)+' MT',color:'red'});
  // 2. Container booking
  const bookedConts=d.bookings.reduce((s,b)=>s+(Number(b.num_containers)||0),0);
  if(!bookedConts)items.push({label:'Container booking',val:'Not started',color:'red'});
  // 3. Pending purchase qty
  const pendPurch=contractQty-purchasedQty;
  if(pendPurch>0.001)items.push({label:'Purchase qty pending',val:fmtN(pendPurch)+' MT',color:'amber'});
  // 4. Bags pending receipt
  const pendBags=d.pkgOrders.reduce((s,p)=>s+Math.max(0,(Number(p.qty_ordered)||0)-(Number(p.qty_received)||0)),0);
  if(pendBags>0)items.push({label:'Bags pending receipt',val:fmtN(pendBags)+' units',color:'amber'});
  // 5. PSI pending
  const psiPending=purchasedQty-psiApproved;
  if(psiPending>0.001&&(d.psi.length>0||d.cfsTrucks.length>0))items.push({label:'PSI pending',val:fmtN(psiPending)+' MT',color:'amber'});
  // 6. Vendor dispatch pending
  const pendDispatch=psiApproved-truckQty;
  if(pendDispatch>0.001)items.push({label:'Vendor dispatch pending',val:fmtN(pendDispatch)+' MT',color:'amber'});
  // 7. CFS unloading pending
  const pendUnload=truckBags-rcvBags;
  if(pendUnload>0&&d.cfsTrucks.length>0)items.push({label:'CFS unloading pending',val:fmtN(pendUnload)+' bags',color:'amber'});
  // 8. CFS stuffing pending
  const pendStuff=rcvBags-stuffedBags;
  if(pendStuff>0)items.push({label:'CFS stuffing pending',val:fmtN(pendStuff)+' bags',color:'red'});
  // 9. Customs pending
  const invWithoutCustoms=d.invoices.filter(inv=>!d.customs.some(c=>c.invoice_no===inv.invoice_no||c.invoice_id===inv.id));
  if(invWithoutCustoms.length>0)items.push({label:'Customs pending',val:invWithoutCustoms.length+' invoice'+(invWithoutCustoms.length>1?'s':''),color:'amber'});
  // 10. Gate-in pending
  const notGateIn=d.customs.filter(c=>c.status!=='Gate-In Done'&&c.status!=='Loaded on Vessel');
  if(notGateIn.length>0&&d.customs.length>0)items.push({label:'Gate-in pending',val:notGateIn.length+' record'+(notGateIn.length>1?'s':''),color:'amber'});
  // 11. BL pending
  const noBL=d.shipping.filter(s=>!s.bl_no||!s.bl_received);
  if(noBL.length>0)items.push({label:'BL copy pending',val:noBL.length+' invoice'+(noBL.length>1?'s':''),color:'amber'});
  else if(d.customs.some(c=>c.status==='Gate-In Done'||c.status==='Loaded on Vessel')&&!d.shipping.length)items.push({label:'BL not received',val:'Sailing pending',color:'amber'});
  // 12. Payment pending
  const balUSD=totalInvUSD-rcvUSD;
  if(balUSD>0.01&&d.invoices.length>0)items.push({label:'Payment pending',val:'$'+fmt(balUSD),color:'red'});

  if(!items.length){
    if(d.invoices.every(i=>i.payment_status==='Paid')&&d.invoices.length>0)return`<div style="font-size:11px;color:var(--green);font-weight:500">✓ All complete</div>`;
    return`<div style="font-size:11px;color:var(--txt3)">No records yet across modules.</div>`;
  }
  const bg={red:'rgba(220,38,38,.07)',amber:'rgba(217,119,6,.07)',blue:'rgba(37,99,235,.07)',green:'rgba(5,150,105,.07)'};
  const bd={red:'rgba(220,38,38,.2)',amber:'rgba(217,119,6,.2)',blue:'rgba(37,99,235,.2)',green:'rgba(5,150,105,.2)'};
  const tc={red:'var(--red)',amber:'var(--amber)',blue:'var(--blue)',green:'var(--green)'};
  return`<div style="display:flex;gap:5px;flex-wrap:wrap">`+
    items.map(item=>`<div style="display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:${bg[item.color]};border:1px solid ${bd[item.color]}">
      <span style="font-size:10px;color:${tc[item.color]};font-weight:500">${item.label}:</span>
      <span style="font-size:10px;font-family:var(--mono);font-weight:600;color:${tc[item.color]}">${item.val}</span>
    </div>`).join('')+'</div>';
}

// ── Contract summary card ─────────────────────────────────
function renderTrackCard(o,done){
  const d=gatherCD(o);
  const pipe=buildPipe(o,d);
  const pct=Math.round(pipe.filter(s=>s.st==='done').length/pipe.length*100);
  const exp=_trackExp[o.id]||false;
  const invQty=d.invoices.reduce((s,i)=>s+(Number(i.qty)||0),0);
  const pendQty=(Number(o.qty)||0)-invQty;

  return`<div class="card" style="margin-bottom:8px;border-left:3px solid ${done?'var(--green)':'var(--blue)'}">
    <!-- Collapsed header - only the header row is clickable, not child content -->
    <div style="display:flex;align-items:flex-start;gap:10px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;cursor:pointer;padding:4px 0"
          onclick="toggleContract('${o.id}')">
          <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue)">${o.contract_no||o.id}</span>
          ${bdg(done?'Completed':'In Progress')}
          <span style="font-size:12px;color:var(--txt2)">${o.buyer||'—'}</span>
          <span style="font-size:11px;color:var(--txt3)">${o.exporter||'—'} · ${o.product||'—'} · ${fmtN(o.qty)} MT</span>
          ${invQty>0?`<span style="font-size:11px;color:var(--green)">Invoiced: ${fmtN(invQty)} MT</span>`:''}
          ${pendQty>0?`<span style="font-size:11px;color:var(--amber)">Pending: ${fmtN(pendQty)} MT</span>`:''}
          <span style="margin-left:auto;font-size:11px;color:var(--txt3);font-weight:400">${exp?'▲ collapse':'▼ expand'}</span>
        </div>
        <!-- Pending items summary — always visible -->
        ${renderPendingSummary(o,d)}
        <!-- Stage dots row -->
        <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-bottom:6px">
          ${pipe.map((s,i)=>`
            <div title="${s.label}" style="display:flex;align-items:center;gap:2px">
              <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${
                s.st==='done'?'var(--green)':s.st==='active'?'var(--blue)':s.st==='warn'?'var(--amber)':'var(--bdr2)'}"></div>
              <span style="font-size:9px;color:${
                s.st==='done'?'var(--green)':s.st==='active'?'var(--blue)':s.st==='warn'?'var(--amber)':'var(--txt3)'};white-space:nowrap">${s.short}</span>
            </div>
            ${i<pipe.length-1?`<span style="color:var(--bdr2);font-size:9px">›</span>`:''}`).join('')}
        </div>
        <!-- Progress bar -->
        <div style="background:var(--bdr);border-radius:3px;height:4px;overflow:hidden">
          <div style="height:100%;background:${done?'var(--green)':'var(--blue)'};width:${pct}%;border-radius:3px"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;padding-top:2px">
        <div style="font-size:11px;color:var(--txt3)">${pct}%</div>
        <div style="font-size:11px;color:var(--txt3);margin-top:3px">${exp?'▲':'▼'}</div>
      </div>
    </div>
    ${exp?renderPipeDetail(o,d,pipe):''}
  </div>`;
}

// ── Gather all related records ────────────────────────────
function gatherCD(o){
  const cn=o.contract_no,oid=o.id;
  const inv=(S.recs.invoices||[]).filter(i=>i.contract_no===cn||i.linked_contract_id===oid);
  const invNos=new Set(inv.map(i=>i.invoice_no).filter(Boolean));
  return{
    bookings:(S.recs.containers||[]).filter(c=>c.linked_contract_no===cn),
    purchases:(S.recs.purchases||[]).filter(p=>p.linked_contract_no===cn||p.linked_contract_id===oid),
    pkgOrders:(S.recs.pkg_orders||[]).filter(p=>p.contract_no===cn),
    pkgDisp:(S.recs.pkg_dispatches||[]).filter(p=>p.contract_no===cn),
    transporters:(S.recs.transporters||[]).filter(t=>t.order_id===cn),
    loading:(S.recs.loading||[]).filter(l=>(S.recs.transporters||[]).filter(t=>t.order_id===cn).some(t=>t.assignment_id===l.assignment_id)),
    survey:(S.recs.surveyor_ef||[]).filter(s=>(S.recs.loading||[]).filter(l=>(S.recs.transporters||[]).filter(t=>t.order_id===cn).some(t=>t.assignment_id===l.assignment_id)).length>0&&s.assignment_id&&(S.recs.transporters||[]).filter(t=>t.order_id===cn).some(t=>t.assignment_id===s.assignment_id)),
    efStuff:(S.recs.ef_stuffing||[]).filter(s=>s.linked_contract_no===cn),
    psi:(S.recs.psi||[]).filter(p=>p.linked_contract_no===cn||p.linked_contract_id===oid),
    cfsTrucks:(S.recs.cfs_trucks||[]).filter(t=>t.linked_contract_no===cn),
    cfsStuff:(S.recs.cfs_stuffing||[]).filter(s=>s.linked_contract_no===cn),
    invoices:inv,
    packingLists:(S.recs.packing_list||[]).filter(p=>p.contract_no===cn||invNos.has(p.invoice_no)),
    customs:(S.recs.customs||[]).filter(c=>c.contract_no===cn||invNos.has(c.invoice_no)),
    shipping:(S.recs.shipping||[]).filter(s=>invNos.has(s.invoice_no)||inv.some(i=>i.id===s.invoice_id)),
    payments:(S.recs.payments||[]).filter(p=>invNos.has(p.invoice_no)||inv.some(i=>i.id===p.invoice_id))
  };
}

// ── Build pipeline stage list ─────────────────────────────
function buildPipe(o,d){
  const st=(done,active,warn)=>done?'done':warn?'warn':active?'active':'pending';
  const hasEF=d.loading.length>0||d.efStuff.length>0||d.transporters.length>0;
  const hasCFS=d.psi.length>0||d.cfsTrucks.length>0||d.cfsStuff.length>0;

  const pipe=[
    {key:'booking',short:'Booking',label:'Container Booking',
     st:st(d.bookings.length>0,false,false)},
    {key:'purchase',short:'Purchase',label:'Material Purchase',
     st:st(d.purchases.length>0,d.bookings.length>0,false)},
    {key:'bags',short:'Bags',label:'Bags / Packing Material',
     st:st(d.pkgOrders.length>0||d.pkgDisp.length>0,d.purchases.length>0,false)},
  ];

  if(hasEF||!hasCFS){
    pipe.push(
      {key:'bags_dispatch_wh',short:'Bags→WH',label:'Bags Dispatched to Warehouse',
       st:st(d.pkgDisp.filter(p=>p.dispatch_to==='Warehouse').length>0,d.pkgOrders.length>0,false)},
      {key:'transporter',short:'Transporter',label:'Transporter Assigned',
       st:st(d.transporters.length>0,d.bookings.length>0,false)},
      {key:'container_pickup',short:'Pickup',label:'Container Pickup Status',
       st:st(d.transporters.some(t=>t.status==='In Transit'||t.status==='Delivered'),d.transporters.length>0,
         d.transporters.some(t=>t.gate_in_deadline&&Math.round((new Date(t.gate_in_deadline)-new Date())/86400000)<=2))},
      {key:'loading',short:'Loading',label:'Loading Assignment',
       st:st(d.loading.length>0,d.transporters.length>0,false)},
      {key:'survey',short:'Survey',label:'Surveyor Report (Ex-Factory)',
       st:st(d.survey.length>0,d.loading.length>0,d.survey.some(s=>s.survey_result==='Fail'))},
      {key:'ef_stuff',short:'EF Stuff',label:'Ex-Factory Stuffing',
       st:st(d.efStuff.length>0,d.survey.length>0,false)}
    );
  }

  if(hasCFS||!hasEF){
    pipe.push(
      {key:'bags_dispatch_miller',short:'Bags→Miller',label:'Bags Dispatched to Miller',
       st:st(d.pkgDisp.filter(p=>p.dispatch_to==='Miller').length>0,d.pkgOrders.length>0,false)},
      {key:'psi',short:'PSI',label:'Pre-Shipment Inspection',
       st:st(d.psi.some(p=>p.result==='Pass'),d.psi.length>0,d.psi.some(p=>p.result==='Fail'))},
      {key:'cfs_trucks',short:'CFS Trucks',label:'CFS Truck Dispatch',
       st:st(d.cfsTrucks.length>0,d.psi.length>0,false)},
      {key:'cfs_stuff',short:'CFS Stuff',label:'CFS Unloading & Container Stuffing',
       st:st(d.cfsStuff.some(s=>s.status==='Fully Stuffed'||s.status==='Completed'),
            d.cfsStuff.length>0,
            d.cfsStuff.some(s=>s.status==='In Progress'))}
    );
  }

  pipe.push(
    {key:'invoice',short:'Invoice',label:'Invoice Creation',
     st:st(d.invoices.length>0,true,false)},
    {key:'packing',short:'Pack List',label:'Packing List',
     st:st(d.packingLists.length>0,d.invoices.length>0,false)},
    {key:'customs',short:'Customs',label:'Customs & Documentation',
     st:st(d.customs.some(c=>c.status==='Gate-In Done'||c.status==='Loaded on Vessel'),
          d.customs.length>0,
          d.customs.some(c=>c.cutoff_date&&!c.status?.includes('Gate-In')&&Math.round((new Date(c.cutoff_date)-new Date())/86400000)<=2))},
    {key:'container_status',short:'Gate-In',label:'Container Gate-In & Port Status',
     st:st(d.customs.some(c=>c.status==='Loaded on Vessel'),
          d.customs.some(c=>c.status==='Gate-In Done'),
          false)},
    {key:'shipping',short:'Sailed',label:'Shipping & BL',
     st:st(d.shipping.some(s=>s.bl_received),d.shipping.length>0,false)},
    {key:'payment',short:'Payment',label:'Payment',
     st:st(d.payments.some(p=>p.status==='Paid'),d.payments.length>0,
          d.payments.some(p=>p.status==='Overdue'))}
  );

  return pipe;
}

// ── Full pipeline detail view ─────────────────────────────
function renderPipeDetail(o,d,pipe){
  return`<div style="margin-top:12px;border-top:1px solid var(--bdr);padding-top:12px">
    ${pipe.map(stage=>renderStageBlock(stage,o,d)).join('')}
  </div>`;
}

function renderStageBlock(stage,o,d){
  const isDone=stage.st==='done',isActive=stage.st==='active',isWarn=stage.st==='warn',isPend=stage.st==='pending';
  const expKey=o.id+'__'+stage.key;
  const isExp=_trackExp[expKey]||false;
  const dotColor=isDone?'var(--green)':isWarn?'var(--amber)':isActive?'var(--blue)':'var(--bdr2)';
  const lineColor=isDone?'var(--green)':'var(--bdr)';
  const navMap={
    booking:'containers',purchase:'purchases',bags:'packaging',
    bags_dispatch_wh:'packaging',bags_dispatch_miller:'packaging',
    transporter:'transporters',container_pickup:'transporters',
    loading:'loading',survey:'surveyor_ef',ef_stuff:'ef_stuffing',
    psi:'psi',cfs_trucks:'cfs_trucks',cfs_stuff:'cfs_stuffing',
    invoice:'invoices',packing:'packing_list',customs:'customs',
    container_status:'customs',shipping:'shipping',payment:'payments'
  };
  const targetPage=navMap[stage.key]||stage.key;
  const cn=o.contract_no||'';
  const cid=o.id||'';
  const clabel=(cn+' — '+(o.buyer||'')).replace(/'/g,'');
  const detail=getStageDetail(stage.key,o,d);

  return`
  <div style="display:flex;gap:0;margin-bottom:4px">
    <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:20px">
      <div style="width:10px;height:10px;border-radius:50%;background:${dotColor};border:2px solid ${dotColor};flex-shrink:0;margin-top:3px"></div>
      <div style="width:2px;flex:1;background:${lineColor};margin-top:2px;min-height:18px"></div>
    </div>
    <div style="flex:1;padding:2px 0 10px 10px">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:${isDone?'500':'400'};color:${isDone?'var(--txt)':isPend?'var(--txt3)':'var(--txt2)'}">${stage.label}</span>
        ${isDone?'<span class="badge bg" style="font-size:9px">✓</span>':isWarn?'<span class="badge ba" style="font-size:9px">⚠</span>':isActive?'<span class="badge bb" style="font-size:9px">…</span>':''}
        ${isDone?`<span style="margin-left:auto;display:inline-flex;gap:5px">
          <button
            style="background:none;border:1px solid var(--bdr);border-radius:5px;padding:1px 7px;font-size:10px;color:var(--txt3);cursor:pointer;font-family:var(--font)"
            onclick="toggleStage('${expKey}')">${isExp?'▲':'▼'} detail</button>
          <button
            style="background:var(--blue);color:#fff;border:none;border-radius:5px;padding:1px 9px;font-size:10px;cursor:pointer;font-family:var(--font)"
            onclick="openModuleReport('${targetPage}','${cn}','${cid}','${clabel}')">Open ↗</button>
        </span>`:''}
      </div>
      ${detail&&detail.summary?`<div style="font-size:11px;color:var(--txt3);margin-top:2px">${detail.summary}</div>`:''}
      ${isDone&&isExp&&detail?`<div style="margin-top:6px;background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;padding:8px 10px;font-size:11px">${detail.rows||''}</div>`:''}
    </div>
  </div>`;
}

function getStageDetail(key,o,d){
  const row=(cells)=>`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 0;border-bottom:1px solid var(--bdr)">${cells}</div>`;
  const cell=(v,c)=>`<span style="font-size:11px;color:${c||'var(--txt2)'};">${v}</span>`;
  const mcell=(v,c)=>`<span style="font-family:var(--mono);font-size:11px;color:${c||'var(--txt)'};">${v}</span>`;

  switch(key){
    case 'booking':return{
      summary:`${d.bookings.length} booking${d.bookings.length>1?'s':''} · ${d.bookings.reduce((s,b)=>s+(Number(b.num_containers)||0),0)} containers`,
      rows:d.bookings.map(b=>row(`
        ${mcell(b.booking_ref||b.id,'var(--blue)')} ${bdg(b.status||'Booked')}
        ${cell(b.shipping_line||'—')} ${cell('ETD: '+(b.etd||'—'),'var(--txt3)')}
        ${cell((b.pol||'—')+' → '+(b.pod||'—'),'var(--txt3)')}
        <span class="badge bb">${b.num_containers||'?'} × ${b.container_type||'—'}</span>
        ${cell('Forwarder: '+(b.forwarder||'—'),'var(--txt3)')}
      `)).join('')};

    case 'purchase':return{
      summary:`${d.purchases.length} lot${d.purchases.length>1?'s':''} · ${fmt(d.purchases.reduce((s,p)=>s+(Number(p.qty)||0),0))} MT`,
      rows:d.purchases.map(p=>row(`
        ${cell(p.vendor||'—','var(--amber)')}
        ${mcell(fmtN(p.qty)+' MT')} ${cell('₹'+fmt(p.price_inr)+'/MT','var(--txt3)')}
        ${cell(p.price_type||'—','var(--txt3)')} ${bdg(Number(p.pending_qty)>0?'Pending':'Dispatched')}
        ${cell('Bag Marking: '+(p.bag_marking||'—'),'var(--txt3)')}
      `)).join('')};

    case 'bags':
    case 'bags_dispatch_wh':
    case 'bags_dispatch_miller':{
      const disp=key==='bags_dispatch_miller'?d.pkgDisp.filter(p=>p.dispatch_to==='Miller'):key==='bags_dispatch_wh'?d.pkgDisp.filter(p=>p.dispatch_to==='Warehouse'):d.pkgDisp;
      const po=d.pkgOrders;
      if(!po.length&&!disp.length)return null;
      return{
        summary:`${po.length} PO${po.length>1?'s':''} · ${disp.length} dispatch${disp.length>1?'es':''}`,
        rows:[
          ...po.map(p=>row(`${mcell(p.po_no||p.id,'var(--blue)')} ${cell(p.item_name||'—')} ${cell(p.vendor||'—','var(--txt3)')} <span class="badge ba">${fmtN(p.qty_ordered)} ordered</span> <span class="badge ${p.qty_received>=p.qty_ordered?'bg':'ba'}">${fmtN(p.qty_received)} rcvd</span> ${bdg(p.status||'Pending')}`)),
          ...disp.map(p=>row(`${mcell(p.dispatch_no||p.id,'var(--blue)')} ${cell(p.item_name||'—')} <span class="badge bb">→ ${p.location_name||'—'} (${p.dispatch_to})</span> <span class="badge ba">${fmtN(p.qty_sent)} sent</span> ${p.dispatch_to==='Miller'?`<span class="badge ${Number(p.qty_loaded)>0?'bg':'ba'}">${fmtN(p.qty_loaded)} loaded</span><span class="badge ${Number(p.qty_sent)-Number(p.qty_loaded)>0?'br':'bg'}">Bal: ${fmtN(Number(p.qty_sent)-Number(p.qty_loaded))}</span>`:`<span class="badge bg">${fmtN(p.qty_used)} used</span>`}`))
        ].join('')};
    }

    case 'transporter':
    case 'container_pickup':return{
      summary:`${d.transporters.length} assignment${d.transporters.length>1?'s':''}`,
      rows:d.transporters.map(t=>{
        const diff=t.gate_in_deadline?Math.round((new Date(t.gate_in_deadline)-new Date())/86400000):null;
        return row(`
          ${mcell(t.assignment_id||t.id,'var(--purple)')} ${bdg(t.status||'Assigned')}
          ${cell(t.transporter||'—')} ${cell(t.booking_ref||'—','var(--txt3)')}
          ${cell((t.num_containers_actual||'?')+' containers','var(--txt3)')}
          ${cell('Pickup: '+(t.pickup_date||'—'),'var(--txt3)')}
          ${diff!==null?`<span class="badge ${diff<0?'br':diff<=2?'ba':'bg'}">Gate-in: ${diff<0?'Overdue '+Math.abs(diff)+'d':diff+'d left'}</span>`:''}
        `);
      }).join('')};

    case 'loading':return{
      summary:`${d.loading.length} assignment${d.loading.length>1?'s':''}`,
      rows:d.loading.map(l=>{
        let grps=[];try{grps=JSON.parse(l.groups||'[]');}catch(e){}
        const cont=grps.reduce((s,g)=>s+g.rows.length,0);
        const millers=[...new Set(grps.flatMap(g=>g.rows.map(r=>r.vendor).filter(Boolean)))];
        return row(`
          ${mcell(l.assignment_id||l.id,'var(--purple)')} ${bdg(l.status||'Scheduled')}
          ${cell(grps.length+' groups · '+cont+' containers')}
          ${millers.length?cell('Millers: '+millers.join(', '),'var(--amber)'):''}
        `);
      }).join('')};

    case 'survey':return{
      summary:`${d.survey.length} record${d.survey.length>1?'s':''} · ${d.survey.filter(s=>s.survey_result==='Pass').length} passed`,
      rows:d.survey.map(s=>row(`
        ${cell(s.container_no||'—','var(--blue)')} ${cell(s.vendor||'—','var(--amber)')}
        ${bdg(s.survey_result||'Pending')}
        ${s.actual_loaded_qty?`<span class="badge bg">${fmtN(s.actual_loaded_qty)} MT loaded</span>`:''}
        ${s.invoice_flag?`<span class="badge bb">Invoice flagged</span>`:''}
        ${cell(s.surveyor_name||'—','var(--txt3)')}
      `)).join('')};

    case 'ef_stuff':return{
      summary:`${d.efStuff.length} record${d.efStuff.length>1?'s':''}`,
      rows:d.efStuff.map(s=>{
        let conts=[];try{conts=JSON.parse(s.containers||'[]');}catch(e){}
        return row(`
          ${bdg(s.status||'Completed')}
          <span class="badge bb">${conts.length} containers</span>
          ${cell(fmtN(conts.reduce((ss,c)=>ss+(Number(c.bags)||0),0))+' bags · '+fmt(conts.reduce((ss,c)=>ss+(Number(c.net_weight)||0),0))+' MT net','var(--txt3)')}
          ${cell('Date: '+(s.stuffing_date||'—'),'var(--txt3)')}
        `);
      }).join('')};

    case 'psi':return{
      summary:`${d.psi.length} record${d.psi.length>1?'s':''} · ${fmt(d.psi.reduce((s,p)=>s+(Number(p.qty_approved)||0),0))} MT approved`,
      rows:d.psi.map(p=>row(`
        ${mcell(p.id,'var(--pink)')} ${cell(p.miller_name||'—','var(--amber)')}
        ${cell(p.psi_date||'—','var(--txt3)')} ${bdg(p.result||'Pending')}
        ${cell('Surveyed: '+fmtN(p.qty_surveyed)+' MT')}
        <span class="badge bg">Approved: ${fmtN(p.qty_approved)} MT</span>
        <span class="badge bb">Dispatched: ${fmtN(p.qty_dispatched)} MT</span>
        ${cell(p.surveyor_name||'—','var(--txt3)')}
      `)).join('')};

    case 'cfs_trucks':{
      const byMiller=d.cfsTrucks.reduce((acc,t)=>{const k=t.miller_name||'—';if(!acc[k])acc[k]=[];acc[k].push(t);return acc;},{});
      return{
        summary:`${d.cfsTrucks.length} trucks · ${fmt(d.cfsTrucks.reduce((s,t)=>s+(Number(t.qty_mt)||0),0))} MT`,
        rows:Object.entries(byMiller).map(([miller,trucks])=>row(`
          ${cell(miller,'var(--amber)')}
          <span class="badge ba">${trucks.length} truck${trucks.length>1?'s':''}</span>
          ${mcell(fmt(trucks.reduce((s,t)=>s+(Number(t.qty_mt)||0),0))+' MT')}
          ${mcell(fmtN(trucks.reduce((s,t)=>s+(Number(t.total_bags)||0),0))+' bags','var(--txt3)')}
          ${cell('Vehicles: '+trucks.map(t=>t.vehicle_no||'—').join(', '),'var(--txt3)')}
        `)).join('')};
    }

    case 'cfs_stuff':return{
      summary:`${d.cfsStuff.length} DSR record${d.cfsStuff.length>1?'s':''}`,
      rows:d.cfsStuff.map(s=>{
        let conts=[];try{conts=JSON.parse(s.containers||'[]');}catch(e){}
        const stuffed=conts.reduce((ss,c)=>ss+(Number(c.bags)||0),0);
        const stock=(Number(s.total_bags_received)||0)-stuffed;
        return row(`
          ${mcell(s.export_invoice_no||s.id,'var(--blue)')}
          ${bdg(s.status||'In Progress')}
          ${cell('CFS: '+(s.cfs_name||'—'))}
          <span class="badge bb">${conts.length} containers stuffed</span>
          ${cell(fmtN(stuffed)+' bags stuffed','var(--green)')}
          ${stock>0?`<span class="badge ba">Stock: ${fmtN(stock)} bags</span>`:`<span class="badge bg">Fully stuffed</span>`}
          ${s.port_reporting_date?cell('Port: '+s.port_reporting_date,'var(--txt3)'):''}
        `);
      }).join('')};

    case 'invoice':return{
      summary:`${d.invoices.length} invoice${d.invoices.length>1?'s':''} · $${fmt(d.invoices.reduce((s,i)=>s+(Number(i.invoice_value)||0),0))}`,
      rows:d.invoices.map(inv=>row(`
        ${mcell(inv.invoice_no||inv.id,'var(--blue)')} ${cell(inv.invoice_date||'—','var(--txt3)')}
        <span class="badge bb">${inv.currency||'USD'} ${fmt(inv.invoice_value)}</span>
        ${bdg(inv.payment_status||'Unpaid')} ${bdg(inv.invoice_type||'Material Supply')}
        ${cell(fmtN(inv.qty)+' MT')}
      `)).join('')};

    case 'packing':return{
      summary:`${d.packingLists.length} of ${d.invoices.length} invoice${d.invoices.length>1?'s':''} have packing list`,
      rows:d.packingLists.map(pl=>{
        let conts=[];try{conts=JSON.parse(pl.containers||'[]');}catch(e){}
        return row(`
          ${mcell(pl.invoice_no||pl.id,'var(--blue)')} <span class="badge bg">${conts.length} containers</span>
          ${cell(fmtN(conts.reduce((s,c)=>s+(Number(c.bags)||0),0))+' bags · '+fmt(conts.reduce((s,c)=>s+(Number(c.net_weight)||0),0))+' MT net')}
          ${cell('Source: '+(pl.source_type||'—'),'var(--txt3)')}
        `);
      }).join('')};

    case 'customs':
    case 'container_status':return{
      summary:d.customs.map(c=>c.status||'Pending').join(', '),
      rows:d.customs.map(c=>{
        let ce=[];try{ce=JSON.parse(c.container_port_entries||'[]');}catch(e){}
        return row(`
          ${mcell(c.invoice_no||c.id,'var(--cyan)')} ${bdg(c.status||'Clearance Pending')}
          ${c.leo_no?`<span class="badge bg">LEO: ${c.leo_no}</span>`:'<span class="badge ba">LEO Pending</span>'}
          ${c.customs_entry_no?cell('Entry: '+c.customs_entry_no,'var(--txt3)'):''}
          ${bdg(c.phyto_applied==='Yes'?'Phyto ✓':'No Phyto')}
          ${bdg(c.fumigation_done==='Yes'?'Fumigation ✓':'No Fumig.')}
          ${ce.length?`<span class="badge bb">${ce.length} containers</span>`:''}
          ${ce.filter(e=>e.gate_in_date).length?`<span class="badge bg">${ce.filter(e=>e.gate_in_date).length} gate-in done</span>`:'<span class="badge ba">Gate-in pending</span>'}
        `);
      }).join('')};

    case 'shipping':return{
      summary:d.shipping.map(s=>s.bl_no||(s.bl_received?'BL Received':'BL Pending')).join(' · '),
      rows:d.shipping.map(s=>row(`
        ${cell(s.invoice_no||s.id,'var(--txt3)')}
        ${s.bl_no?mcell(s.bl_no,'var(--cyan)'):'<span class="badge ba">BL Pending</span>'}
        ${bdg(s.bl_received?'BL Received':'Pending')}
        ${s.vessel?cell(s.vessel+(s.atd?' · ATD: '+s.atd:''),'var(--txt3)'):''}
        ${bdg(s.status||'Awaiting Sailing')}
      `)).join('')};

    case 'payment':return{
      summary:'$'+fmt(d.payments.reduce((s,p)=>s+(Number(p.amount_received)||0),0))+' received of $'+fmt(d.invoices.reduce((s,i)=>s+(Number(i.invoice_value)||0),0)),
      rows:d.payments.map(p=>row(`
        ${mcell(p.invoice_no||p.id)} ${bdg(p.status||'Unpaid')}
        ${cell('Invoice: $'+fmt(p.invoice_value),'var(--txt3)')}
        ${p.amount_received?`<span class="badge bg">Received: $${fmt(p.amount_received)}</span>`:''}

function matchesContractFilter(record,contractNoFields,contractIdFields){

async function initApp(){
  // Clear any stale recovery tokens from URL
  const hash=window.location.hash;
  const params=new URLSearchParams(window.location.search);
  const isRecovery=hash.includes('type=recovery')||params.get('type')==='recovery';

  const{data:{session},error}=await db.auth.getSession();

  if(session&&!isRecovery){
    currentUser=session.user;
    await loadProfile();
    // Check if profile is active
    if(currentProfile&&currentProfile.active===false){
      await db.auth.signOut({scope:'local'});
      currentUser=null;currentProfile=null;
      showLogin('Your account has been deactivated. Contact your administrator.');
      return;
    }
    renderAll();loadAll();
  } else {
    // Clear any lingering session for recovery flow
    if(isRecovery){
      // Stay on app but show change password screen
      showChangePassword();
    } else {
      showLogin();
    }
  }

  db.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
      currentUser=session.user;
      await loadProfile();
      renderAll();loadAll();
    } else if(event==='SIGNED_OUT'||event==='USER_DELETED'){
      currentUser=null;currentProfile=null;
      Object.keys(localStorage).forEach(k=>{
        if(k.includes('supabase')||k.includes('sb-'))localStorage.removeItem(k);
      });
      showLogin();
    } else if(event==='PASSWORD_RECOVERY'){
      showChangePassword();
    }
  });
}

async function doChangePassword(){
  const p1=document.getElementById('cp-pass')?.value;
  const p2=document.getElementById('cp-pass2')?.value;
  const errEl=document.getElementById('cp-err');
  const okEl=document.getElementById('cp-ok');
  if(!p1||p1.length<6){if(errEl){errEl.textContent='Password must be at least 6 characters.';errEl.style.display='block';}return;}
  if(p1!==p2){if(errEl){errEl.textContent='Passwords do not match.';errEl.style.display='block';}return;}
  const{error}=await db.auth.updateUser({password:p1});
  if(error){if(errEl){errEl.textContent=error.message;errEl.style.display='block';}}
  else{
    if(okEl){okEl.textContent='Password changed successfully! Signing you in…';okEl.style.display='block';}
    if(errEl)errEl.style.display='none';
    setTimeout(async()=>{
      const{data:{session}}=await db.auth.getSession();
      if(session){currentUser=session.user;await loadProfile();renderAll();loadAll();}
      else showLogin('Password changed. Please log in with your new password.');
    },1500);
  }
}

async function saveUser(uid){

    'Loading Assignment','Surveyor Report','PSI','CFS Truck Dispatch','CFS Stuffing',
    'Invoice & Packing List','Customs & Documentation','Shipping & BL','Payment Tracking','Master Rates'];

    if(newUid){
      await db.from('user_profiles').insert({id:newUid,full_name:fv('usr_name'),email,role:fv('usr_role'),company:fv('usr_company'),module_access:JSON.stringify(selMods),active:true});

  }
}

function generateReport(){
  const exporter=fv('rpt_exporter');
  const status=fv('rpt_status');
  const payFilter=fv('rpt_pay');
  const el=document.getElementById('report-output');if(!el)return;

  let contracts=S.recs.orders.filter(o=>o.signed_contract==='Yes');
  if(exporter)contracts=contracts.filter(o=>o.exporter===exporter);
  if(status)contracts=contracts.filter(o=>(status==='Confirmed'?o.signed_contract==='Yes':o.signed_contract!=='Yes'));

  if(!contracts.length){el.innerHTML=`<div class="empty"><strong>No contracts found</strong>Try adjusting your filters.</div>`;return;}

  const html=contracts.map(contract=>{
    const invoices=S.recs.invoices.filter(i=>i.contract_no===contract.contract_no||i.linked_contract_id===contract.id);
    const purchases=S.recs.purchases.filter(p=>p.linked_contract_no===contract.contract_no||p.linked_contract_id===contract.id);
    const totalPurchased=purchases.reduce((s,p)=>s+(Number(p.qty)||0),0);
    const pendingPurchase=contract.qty-(totalPurchased||0);

    // Filter by payment
    if(payFilter==='unrealized'){
      const hasUnpaid=invoices.some(i=>i.payment_status!=='Paid')||invoices.length===0;
      if(!hasUnpaid)return'';
    }
    if(payFilter==='Paid'){
      const allPaid=invoices.length>0&&invoices.every(i=>i.payment_status==='Paid');
      if(!allPaid)return'';
    }

    const invRows=invoices.length?invoices.map(inv=>{
      // Determine stage for each invoice
      const loading=S.recs.loading.find(l=>l.booking_ref&&S.recs.containers.find(c=>c.linked_contract_no===contract.contract_no&&c.booking_ref===l.booking_ref));
      const surveyor=S.recs.surveyor_ef.find(s=>s.assignment_id&&loading?.assignment_id===s.assignment_id);
      const cfsTrucks=S.recs.cfs_trucks.filter(t=>t.invoice_ref===inv.invoice_no);
      const cfsStuffing=S.recs.cfs_stuffing.find(s=>s.export_invoice_no===inv.invoice_no);
      const customs=S.recs.customs.find(c=>c.invoice_no===inv.invoice_no);
      const shipping=S.recs.shipping.find(s=>s.invoice_no===inv.invoice_no);
      const payment=S.recs.payments.find(p=>p.invoice_no===inv.invoice_no);

      const stages=[
        {name:'Purchase',done:purchases.length>0,active:purchases.length>0&&pendingPurchase>0},
        {name:'Loading',done:!!surveyor?.actual_loaded_qty,active:!!loading&&!surveyor?.actual_loaded_qty},
        {name:'CFS Trucks',done:cfsTrucks.length>0&&!!cfsStuffing,active:cfsTrucks.length>0&&!cfsStuffing},
        {name:'Stuffing',done:!!cfsStuffing,active:false},
        {name:'Invoice',done:!!inv.invoice_no,active:true},
        {name:'Customs',done:customs?.status==='Gate-In Done'||customs?.status==='Loaded on Vessel',active:!!customs&&customs.status!=='Gate-In Done'},
        {name:'Shipped',done:!!shipping?.atd,active:!!shipping&&!shipping.atd},
        {name:'BL Done',done:!!shipping?.bl_received,active:!!shipping&&!shipping.bl_received},
        {name:'Payment',done:inv.payment_status==='Paid',active:inv.payment_status==='Partial'},
      ];

      return`<div class="inv-row">
        <div class="inv-no">${inv.invoice_no||inv.id}</div>
        <div style="font-size:11px;color:var(--txt3);min-width:70px">${inv.currency||'USD'} ${fmt(inv.invoice_value)}</div>
        <div class="inv-stages">
          ${stages.map(st=>`<div class="stage-dot ${st.done?'stage-done':st.active?'stage-active':'stage-pending'}">
            ${st.done?'✓':st.active?'→':'○'} ${st.name}
          </div>`).join('')}
        </div>
        <div style="flex-shrink:0">${bdg(inv.payment_status||'Unpaid')}</div>
      </div>`;
    }).join(''):
    `<div class="inv-row" style="color:var(--txt3)">
      <div class="inv-no" style="color:var(--txt3)">No invoices yet</div>
      <div class="inv-stages">
        ${purchases.length?`<div class="stage-dot stage-done">✓ Purchase (${fmtN(totalPurchased)} MT)</div>`:'<div class="stage-dot stage-pending">○ Purchase Pending</div>'}
        ${pendingPurchase>0?`<div class="stage-dot stage-active">→ ${fmtN(pendingPurchase)} MT pending</div>`:''}
      </div>
    </div>`;

    return`<div class="report-contract">
      <div class="rc-hdr">
        <div>
          <span class="rc-id">${contract.contract_no||contract.id}</span>
          <span class="rc-buyer" style="margin-left:10px">${contract.buyer||'—'}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:11px;color:var(--txt3)">${contract.product||'—'} · ${fmtN(contract.qty)} MT · ${contract.currency||'USD'} ${fmt(contract.unit_price)}</span>
          ${bdg(contract.signed_contract==='Yes'?'Confirmed':'Pending')}
          <span style="font-size:10px;color:var(--txt3)">${invoices.length} invoice${invoices.length!==1?'s':''}</span>
        </div>
      </div>
      <div class="rc-body">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">
          <div style="font-size:11px"><span style="color:var(--txt3)">Contract Qty:</span> <strong style="font-family:var(--mono)">${fmtN(contract.qty)} MT</strong></div>
          <div style="font-size:11px"><span style="color:var(--txt3)">Purchased:</span> <strong style="font-family:var(--mono);color:var(--green)">${fmtN(totalPurchased)} MT</strong></div>
          <div style="font-size:11px"><span style="color:var(--txt3)">Pending Purchase:</span> <strong style="font-family:var(--mono);color:${pendingPurchase>0?'var(--amber)':'var(--green)'}">${fmtN(pendingPurchase)} MT</strong></div>
          <div style="font-size:11px"><span style="color:var(--txt3)">Bag Marking:</span> <strong style="font-family:var(--mono);font-size:10px">${contract.bag_marking||'—'}</strong></div>
        </div>
        <div class="inv-track">${invRows}</div>
      </div>
    </div>`;
  }).filter(Boolean).join('');

  el.innerHTML=html||`<div class="empty"><strong>No results</strong>No contracts match your filter criteria.</div>`;
}


</script>
</body>
</html>
