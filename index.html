function renderCustoms(){
  if(_reportContractNo){S.search=_reportContractNo;}
  const rows=S.recs.customs.filter(o=>!S.search||
    [o.invoice_no,o.contract_no,o.clearing_agent,o.leo_no].join(' ').toLowerCase().includes(S.search.toLowerCase()));
  const today2=new Date();
  // Cutoff warnings from invoices
  const cutoffWarnings=S.recs.invoices.filter(inv=>{
    if(!inv.cutoff_date)return false;
    const diff=Math.round((new Date(inv.cutoff_date)-today2)/86400000);
    if(diff<0||diff>2)return false;
    // Check if gate-in is done for this invoice
    const cusRec=S.recs.customs.find(c=>c.invoice_no===inv.invoice_no||c.invoice_id===inv.id);
    const gateInDone=cusRec&&(cusRec.status==='Gate-In Done'||cusRec.status==='Loaded on Vessel');
    return !gateInDone; // only warn if gate-in NOT done
  });
  return`
  ${cutoffWarnings.length?`<div class="alert-banner alert-red" style="display:block">
    <div class="alert-title">⚠ Cargo Cut-Off Warning — ${cutoffWarnings.length} invoice${cutoffWarnings.length>1?'s':''} approaching cut-off</div>
    <div class="alert-sub">${cutoffWarnings.map(inv=>{const d=Math.round((new Date(inv.cutoff_date)-today2)/86400000);return`${inv.invoice_no||inv.id}: cut-off ${d===0?'TODAY':d+'d'} (${inv.cutoff_date})`;}).join(' · ')}</div>
  </div>`:''}
  <div class="sbar">
    <input placeholder="Search invoice no., contract, clearing agent, LEO…" value="${S.search||''}" oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderCustoms()">
    <button class="pri" onclick="openCustomsModal()">+ New Customs Record</button>
  </div>
  <div class="card">`+tbl(rows,
    ['ID','Invoice No.','Contract','CHA','First Check','LEO No.','LEO Date','Phyto','Fumigation','Containers','Status','Actions'],
    r=>{
      let ce=[];try{ce=JSON.parse(r.container_port_entries||'[]');}catch(e){}
      return`<tr>
        <td><span class="mono" style="color:var(--txt3)">${r.id}</span></td>
        <td><strong class="mono" style="color:var(--blue)">${r.invoice_no||'—'}</strong></td>
        <td><span class="mono" style="color:var(--green)">${r.contract_no||'—'}</span></td>
        <td>${r.clearing_agent||'—'}</td>
        <td>${bdg(r.first_check_status||'Pending')}</td>
        <td class="mono" style="color:var(--cyan)">${r.leo_no||'—'}</td>
        <td>${r.leo_date||'—'}</td>
        <td>${bdg(r.phyto_applied||'No')}</td>
        <td>${bdg(r.fumigation_done||'No')}</td>
        <td class="mono">${ce.length}</td>
        <td>${bdg(r.status||'Clearance Pending')}</td>
        <td><div class="acell">
          <button class="sm" onclick="openCustomsModal('${r.id}')">Edit</button>
          <button class="sm" onclick="viewCustomsDetail('${r.id}')">View</button>
          <button class="sm dan" onclick="delRec('customs','${r.id}')">Del</button>
        </div></td>
      </tr>`;
    },
    'No customs records yet.'
  )+`</div>`;
}

      <div class="kpi"><div class="klbl">BL No.</div><div style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--cyan)">${r.bl_no||'—'}</div></div>
      <div class="kpi"><div class="klbl">Status</div><div>${bdg(r.status||'Awaiting Sailing')}</div></div>
      <div class="kpi"><div class="klbl">Vessel / Voyage</div><div style="font-size:13px;font-weight:500">${r.vessel||'—'} / ${r.voyage||'—'}</div></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px">
      ${cl.map((d,i)=>`
        <div style="display:flex;align-items:center;gap:8px;background:${d.done?'rgba(52,211,153,.06)':'var(--surf2)'};border:1px solid ${d.done?'rgba(52,211,153,.2)':'var(--bdr)'};border-radius:6px;padding:7px 10px">
          <div style="width:16px;height:16px;border-radius:50%;background:${d.done?'var(--green)':'var(--bdr)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:#fff">${d.done?'✓':''}</div>
          <div>

            ${d.ref?`<div style="font-size:10px;color:var(--txt3);font-family:var(--mono)">${d.ref}</div>`:''}

    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
      ${docs.map(d=>`<span style="background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--cyan)">${d}</span>`).join('')}

  openModal(`<div class="modal lg"><h3>Shipping Record: ${r.invoice_no||r.id}</h3>${body}</div>`);

      <div class="fgrp"><label>Status</label><select id="shp_status">${sel(['Awaiting Sailing','Sailed','BL Received','Docs Prepared','Docs Sent','Completed'],r.status||'Awaiting Sailing')}</select></div>
    </div>

    <div style="font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px">Document Checklist</div>

}
function selShipInvoice(id){
  _shipSelInv=id;

  openShippingModal(S._editIds.shipping);
}
function renderShipChecklist(){
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
    ${_shipChecklist.map((d,i)=>`
      <div style="display:flex;align-items:center;gap:8px;background:${d.done?'rgba(52,211,153,.06)':'var(--surf2)'};border:1px solid ${d.done?'rgba(52,211,153,.2)':'var(--bdr)'};border-radius:6px;padding:8px 10px;cursor:pointer" onclick="toggleChecklistItem(${i})">

          <input style="background:transparent;border:none;border-bottom:1px dashed var(--bdr);font-size:10px;color:var(--txt3);font-family:var(--mono);width:100%;outline:none;margin-top:2px" placeholder="Ref no. / notes" value="${d.ref||''}" onclick="event.stopPropagation()" oninput="updChecklistRef(${i},this.value)">

}
function toggleChecklistItem(i){

}
function updChecklistRef(i,v){if(_shipChecklist[i])_shipChecklist[i].ref=v;}
function renderShipDocs(){

async function saveShipping(id){
  const invId=_shipSelInv||(id?S.recs.shipping.find(s=>s.id===id)?.invoice_id:null);

    ['ID','Invoice No.','Contract','Buyer','Invoice Value','Payment Mode','Docs Sent','Docs Via','Received Date','Amount Received','Balance Due','Telex','Status','Actions'],

      <div class="fgrp"><label>Amount Received (USD)</label><input type="number" id="pay_rcvamt" value="${r.amount_received||0}" oninput="calcPayBalance()"></div>
      <div class="fgrp"><label>Balance Due (auto)</label><div id="pay_balance_disp" style="padding:6px 9px;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)">$${fmt(r.balance_due||0)}</div></div>
      <input type="hidden" id="pay_balance" value="${r.balance_due||''}">
      ${msec('Telex Release')}
      <div class="fgrp"><label>Telex Released?</label><select id="pay_telex">${sel(['No','Yes'],r.telex_released?'Yes':'No')}</select></div>
      <div class="fgrp"><label>Telex Release Date</label><input type="date" id="pay_telexdate" value="${r.telex_date||''}"></div>
      <div class="fgrp"><label>Payment Status</label><select id="pay_status">${sel(['Unpaid','Partial','Paid','Overdue'],r.status||'Unpaid')}</select></div>
      <div class="fgrp full"><label>Remarks</label><textarea id="pay_rem">${r.remarks||''}</textarea></div>
    </div>`;
  openModal(mw(id?'Edit Payment Record':'New Payment Record',body,id?`savePayment('${id}')`:'savePayment()',true));
  setTimeout(()=>calcPayBalance(),80);
}
function selPayInvoice(id){
  _paySelInv=id;
  const inv=S.recs.invoices.find(i=>i.id===id);
  if(inv){
    af('pay_invno',inv.invoice_no||'');af('pay_contract',inv.contract_no||'');
    af('pay_buyer',inv.buyer||'');af('pay_invval',inv.invoice_value||'');
    setTimeout(()=>calcPayBalance(),50);
  }
  openPaymentModal(S._editIds.payments);
}
function setPayMode(mode){
  document.getElementById('pay_mode').value=mode;
  ['TT Direct','Bank Negotiation','Telex Release'].forEach(m=>{
    const el=document.getElementById('paymode-'+m.replace(/ /g,'-'));
    if(el){el.style.borderColor=m===mode?'var(--blue)':'var(--bdr)';el.style.background=m===mode?'rgba(79,156,249,.08)':'';}
  });
}
function calcPayBalance(){
  const invVal=parseFloat(document.getElementById('pay_invval')?.value)||0;
  const rcvd=parseFloat(document.getElementById('pay_rcvamt')?.value)||0;
  const bal=invVal-rcvd;
  const disp=document.getElementById('pay_balance_disp');
  const hidden=document.getElementById('pay_balance');
  if(disp){disp.textContent='$'+fmt(bal);disp.style.color=bal>0?'var(--red)':'var(--green)';}
  if(hidden)hidden.value=bal;
}
async function savePayment(id){
  calcPayBalance();
  const invId=_paySelInv||(id?S.recs.payments.find(p=>p.id===id)?.invoice_id:null);
  const data={
    invoice_id:invId||null,invoice_no:fv('pay_invno'),contract_no:fv('pay_contract'),
    buyer:fv('pay_buyer'),invoice_value:fv('pay_invval')||null,
    payment_mode:fv('pay_mode'),docs_sent_date:fv('pay_docsdate')||null,
    docs_sent_via:fv('pay_docsvia'),bank_name:fv('pay_bank'),bank_ref:fv('pay_bankref'),
    payment_received_date:fv('pay_rcvdate')||null,amount_received:fv('pay_rcvamt')||0,
    balance_due:fv('pay_balance')||null,telex_released:fv('pay_telex')==='Yes',
    telex_date:fv('pay_telexdate')||null,status:fv('pay_status'),remarks:fv('pay_rem')
  };
  if(!id)data.id=uid('PAY');
  _paySelInv=null;_reRenderFn=null;
  await saveRec('payments',data,id||null);
}

async function savePkgItem(id){
  const data={
    item_type:fv('pi_type'),item_code:fv('pi_code'),name:fv('pi_name'),

function selPkgDispContract(id){
  _pkgDispSelC=id;
  const c=S.recs.orders.find(o=>o.id===id);
  if(c){
    const disp=document.getElementById('qw_contract_display');
    if(disp){disp.value=c.contract_no+' — '+c.buyer+' · '+c.product;disp.style.color='var(--green)';}
    const hint=document.getElementById('contract_sel_hint');
    if(hint){hint.textContent='Bag Marking: '+(c.bag_marking||'—')+' · '+fmtN(c.qty)+' MT';hint.style.display='block';}
    const cn=document.getElementById('pkd_contract');if(cn){cn.value=c.contract_no||'';cn.classList.add('af');}
  }
}

function fillPkgDispItem(){
  const sel=document.getElementById('pkd_item');
  if(!sel||!sel.value)return;
  const opt=sel.options[sel.selectedIndex];
  const sv=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val||'';};
  sv('pkd_iname',opt.dataset.name);sv('pkd_brand',opt.dataset.brand);
  sv('pkd_colour',opt.dataset.colour);sv('pkd_pcode',opt.dataset.pcode);
}

function togglePkgDispType(){
  const v=document.getElementById('pkd_to')?.value;
  const ms=document.getElementById('pkd_miller_section');
  const ws=document.getElementById('pkd_wh_section');
  if(ms)ms.style.display=v==='Warehouse'?'none':'contents';
  if(ws)ws.style.display=v==='Warehouse'?'contents':'none';
}

async function savePkgDispatch(id){
  const opt=document.getElementById('pkd_item')?.selectedOptions[0];
  const data={
    linked_contract_id:_pkgDispSelC||null,contract_no:fv('pkd_contract'),
    dispatch_date:fv('pkd_date')||null,dispatch_no:fv('pkd_dno'),
    item_id:fv('pkd_item')||null,item_name:fv('pkd_iname'),
    brand:fv('pkd_brand'),colour:fv('pkd_colour'),print_code:fv('pkd_pcode'),
    colour_hex:opt?.dataset.hex||null,
    dispatch_to:fv('pkd_to'),location_name:fv('pkd_locname'),
    address:fv('pkd_addr'),vehicle_no:fv('pkd_vehicle'),
    qty_sent:fv('pkd_sent')||null,qty_extra:fv('pkd_extra')||0,
    qty_loaded:fv('pkd_loaded')||0,miller_verified:fv('pkd_verified')==='Yes',
    verification_date:fv('pkd_verdate')||null,
    qty_used:fv('pkd_used')||0,used_for:fv('pkd_usedfor'),
    remarks:fv('pkd_rem')
  };
  if(!id){data.id=uid('PKD');if(!data.dispatch_no)data.dispatch_no='DISP-'+Date.now().toString(36).toUpperCase();}
  _pkgDispSelC=null;
  await saveRec('pkg_dispatches',data,id||null);
}

// TAB 4 — WAREHOUSE STOCK (running balance per warehouse)
// ══════════════════════════════════════════════════════════
function renderPkgStock(){
  const dispatches=S.recs.pkg_dispatches||[];
  const items=S.recs.pkg_items||[];
  const WAREHOUSES=['Warehouse 1','Warehouse 2','Warehouse 3'];

  // Build stock summary per warehouse per item
  const stock={};
  dispatches.filter(d=>d.dispatch_to==='Warehouse').forEach(d=>{
    const wh=d.location_name||'Unknown';
    const key=wh+'::'+d.item_id+'::'+d.item_name;
    if(!stock[key])stock[key]={wh,item_name:d.item_name,brand:d.brand,colour:d.colour,colour_hex:d.colour_hex,print_code:d.print_code,in:0,out:0};
    stock[key].in+=(Number(d.qty_sent)||0)+(Number(d.qty_extra)||0);
    stock[key].out+=(Number(d.qty_used)||0);
  });

  // Also check miller balances
  const millerStock={};
  dispatches.filter(d=>d.dispatch_to==='Miller').forEach(d=>{
    const key=d.location_name+'::'+d.item_id+'::'+d.item_name;
    if(!millerStock[key])millerStock[key]={miller:d.location_name,item_name:d.item_name,brand:d.brand,colour:d.colour,colour_hex:d.colour_hex,print_code:d.print_code,sent:0,loaded:0,contract:d.contract_no};
    millerStock[key].sent+=(Number(d.qty_sent)||0);
    millerStock[key].loaded+=(Number(d.qty_loaded)||0);
  });

  const whRows=Object.values(stock);
  const millerRows=Object.values(millerStock);
  const totalWHStock=whRows.reduce((s,r)=>s+(r.in-r.out),0);
  const totalMillerBal=millerRows.reduce((s,r)=>s+(r.sent-r.loaded),0);

  return`
  <div class="kgrid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi"><div class="klbl">Total WH Stock (units)</div><div class="kval" style="color:var(--blue)">${fmtN(totalWHStock)}</div></div>
    <div class="kpi"><div class="klbl">Balance with Millers</div><div class="kval" style="color:var(--amber)">${fmtN(totalMillerBal)}</div></div>
    <div class="kpi"><div class="klbl">Warehouses Active</div><div class="kval" style="color:var(--green)">${new Set(whRows.map(r=>r.wh)).size}</div></div>
  </div>

  ${WAREHOUSES.map(wh=>{
    const whItems=whRows.filter(r=>r.wh===wh);
    if(!whItems.length)return'';
    return`<div class="card">
      <div class="ctitle">${wh}</div>
      <table><thead><tr><th>Item</th><th>Brand</th><th>Colour</th><th>Print Code</th><th>Total In</th><th>Total Out (Used)</th><th>Current Stock</th></tr></thead>
      <tbody>${whItems.map(r=>{
        const bal=r.in-r.out;
        return`<tr>
          <td><strong>${r.item_name||'—'}</strong></td>
          <td>${r.brand||'—'}</td>
          <td><div style="display:flex;align-items:center;gap:5px">
            ${r.colour_hex?`<div style="width:12px;height:12px;border-radius:3px;background:${r.colour_hex};border:1px solid var(--bdr)"></div>`:''}
            ${r.colour||'—'}
          </div></td>
          <td class="mono">${r.print_code||'—'}</td>
          <td class="mono">${fmtN(r.in)}</td>
          <td class="mono">${fmtN(r.out)}</td>
          <td class="mono" style="font-weight:600;color:${bal>0?'var(--green)':bal===0?'var(--txt2)':'var(--red)'}">${fmtN(bal)}</td>
        </tr>`;}).join('')}
      </tbody></table>
    </div>`;
  }).join('')}

  ${millerRows.length?`<div class="card">
    <div class="ctitle" style="color:var(--amber)">Balance with Millers</div>
    <table><thead><tr><th>Miller</th><th>Contract</th><th>Item</th><th>Brand·Colour·Code</th><th>Bags Sent</th><th>Bags Loaded</th><th>Balance</th></tr></thead>
    <tbody>${millerRows.map(r=>{
      const bal=r.sent-r.loaded;
      return`<tr>
        <td><strong>${r.miller||'—'}</strong></td>
        <td class="mono" style="color:var(--green)">${r.contract||'—'}</td>
        <td>${r.item_name||'—'}</td>
        <td><div style="display:flex;align-items:center;gap:4px">
          ${r.colour_hex?`<div style="width:10px;height:10px;border-radius:2px;background:${r.colour_hex};border:1px solid var(--bdr)"></div>`:''}
          <span>${[r.brand,r.colour,r.print_code].filter(Boolean).join('·')||'—'}</span>
        </div></td>
        <td class="mono">${fmtN(r.sent)}</td>
        <td class="mono dok">${fmtN(r.loaded)}</td>
        <td class="mono" style="font-weight:600;color:${bal>0?'var(--amber)':bal===0?'var(--green)':'var(--red)'}">${fmtN(bal)}</td>
      </tr>`;}).join('')}
    </tbody></table>
  </div>`:''}`;
}

function toggleExpBillType(){
  const v=fv('eb_type');
  const sp=document.getElementById('eb_specific_section');
  const ls=document.getElementById('eb_lumpsum_section');
  if(sp)sp.style.display=v==='Lumpsum'?'none':'contents';

function calcExpINR(){
  const cur=fv('eb_cur');
  const amt=parseFloat(fv('eb_amount'))||0;
  const ex=parseFloat(fv('eb_exrate'))||1;
  const inr=cur==='USD'?amt*ex:amt;
  const disp=document.getElementById('eb_inr_disp');
  const hidden=document.getElementById('eb_inr');
  if(disp)disp.textContent=inr?'₹'+fmt(inr):'—';
  if(hidden)hidden.value=inr||'';
  calcExpBalance();
}

function calcExpBalance(){
  const inr=parseFloat(document.getElementById('eb_inr')?.value)||0;
  const paid=parseFloat(fv('eb_paid'))||0;
  const bal=inr-paid;
  const disp=document.getElementById('eb_bal_disp');
  const hidden=document.getElementById('eb_bal');
  if(disp){disp.textContent=bal>=0?'₹'+fmt(bal):'₹0';disp.style.color=bal>0?'var(--red)':'var(--green)';}
  if(hidden)hidden.value=Math.max(0,bal);
}

function addExpAllocation(){

function removeExpAlloc(i){

}
function updExpAlloc(i,f,v){if(_expBillAllocations[i])_expBillAllocations[i][f]=v;}


function calcExpGST(){
  const inr=parseFloat(document.getElementById('eb_inr')?.value)||0;
  const gstType=fv('eb_gsttype');
  const gstPct=parseFloat(fv('eb_gstpct'))||0;
  if(gstType==='None'||!gstPct||!inr){
    // Amount entered IS the basic amount
    const basicEl=document.getElementById('eb_basic');if(basicEl)basicEl.value=inr||'';
    const bdisp=document.getElementById('eb_basic_disp');if(bdisp)bdisp.textContent=inr?'₹'+fmt(inr):'—';
    ['eb_cgst','eb_sgst','eb_igst','eb_gst'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    ['eb_cgst_disp','eb_sgst_disp','eb_igst_disp','eb_gst_disp'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='—';});
    calcExpBalance();return;
  }
  // Amount is TOTAL (basic + GST), back-calculate basic
  const basic=inr/(1+gstPct/100);
  const gstAmt=inr-basic;
  const cgst=gstType==='CGST+SGST'?gstAmt/2:0;
  const sgst=gstType==='CGST+SGST'?gstAmt/2:0;
  const igst=gstType==='IGST'?gstAmt:0;
  const sv=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val.toFixed(2)||'';};
  const sd=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val?'₹'+fmt(val):'—';};
  sv('eb_basic',basic);sd('eb_basic_disp',basic);
  sv('eb_cgst',cgst);sd('eb_cgst_disp',cgst);
  sv('eb_sgst',sgst);sd('eb_sgst_disp',sgst);
  sv('eb_igst',igst);sd('eb_igst_disp',igst);
  sv('eb_gst',gstAmt);sd('eb_gst_disp',gstAmt);
  calcExpBalance();
}

function verifyExpBill(billId){
  const bill=(S.recs.exp_bills||[]).find(b=>b.id===billId);
  if(!bill)return;
  const cur=bill.bill_status||'Received';
  let next='Under Verification';
  if(cur==='Received')next='Under Verification';
  else if(cur==='Under Verification')next='Accepted';
  if(!confirm(`Mark bill ${bill.bill_no||billId} as "${next}"?`))return;
  db.from('exp_bills').update({bill_status:next}).eq('id',billId).then(({error})=>{
    if(!error){loadTable('exp_bills').then(()=>{renderAll();toast('Bill status: '+next);});}
    else toast(error.message,'e');
  });
}

function prefillExpPayment(){
  const sel=document.getElementById('ep_bill');
  if(!sel||!sel.value)return;
  const opt=sel.options[sel.selectedIndex];
  const sv=(id,val)=>{const el=document.getElementById(id);if(el){el.value=val||'';if(val)el.classList.add('af');}};
  sv('ep_billno',opt.dataset.billno);
  sv('ep_vendor',opt.dataset.vendor);
  const catEl=document.getElementById('ep_cat');
  if(catEl&&opt.dataset.cat)catEl.value=opt.dataset.cat;
  const amtEl=document.getElementById('ep_amount');
  if(amtEl&&!amtEl.value)amtEl.value=opt.dataset.bal||'';

async function saveExpPayment(id){
  const billSel=document.getElementById('ep_bill');
  const billId=billSel?.value||null;
  const amtPaid=parseFloat(fv('ep_amount'))||0;
  const data={
    bill_id:billId,bill_no:fv('ep_billno'),category:fv('ep_cat'),
    vendor:fv('ep_vendor'),payment_date:fv('ep_date')||null,
    amount_paid:amtPaid,payment_mode:fv('ep_mode'),
    payment_ref:fv('ep_ref'),bank:fv('ep_bank'),remarks:fv('ep_rem')
  };
  if(!id)data.id=uid('EPY');

  // Update the linked bill's paid amount and balance
  if(billId){
    const bill=(S.recs.exp_bills||[]).find(b=>b.id===billId);
    if(bill){
      const prevPaid=Number(bill.amount_paid)||0;
      const newPaid=prevPaid+amtPaid;
      const inr=Number(bill.amount_inr)||0;
      const newBal=Math.max(0,inr-newPaid);
      const newStatus=newBal<=0?'Paid':newPaid>0?'Partial':'Unpaid';
      await db.from('exp_bills').update({
        amount_paid:newPaid,balance_due:newBal,payment_status:newStatus
      }).eq('id',billId);
    }
  }
  await saveRec('exp_payments',data,id||null);
}

function renderExpSummary(){
  const bills=S.recs.exp_bills||[];
  // Build cost map per contract
  const costMap={};

  bills.forEach(b=>{
    const addTo=(contractNo,amt)=>{
      if(!contractNo)return;
      if(!costMap[contractNo])costMap[contractNo]={contract_no:contractNo,categories:{}};
      const cat=b.category||'Miscellaneous';
      if(!costMap[contractNo].categories[cat])costMap[contractNo].categories[cat]=0;
      costMap[contractNo].categories[cat]+=(Number(amt)||0);
    };

    if(b.bill_type==='Lumpsum'){
      // Use allocations
      let allocs=[];try{allocs=JSON.parse(b.allocations||'[]');}catch(e){}
      allocs.forEach(a=>addTo(a.contract_no,a.amount_inr));
    } else {
      // Specific — split across listed contracts
      const contracts=(b.contract_nos||'').split(',').map(s=>s.trim()).filter(Boolean);
      const splitAmt=contracts.length?(Number(b.amount_inr)||0)/contracts.length:(Number(b.amount_inr)||0);
      if(contracts.length){contracts.forEach(c=>addTo(c,splitAmt));}
    }
  });

  const entries=Object.values(costMap);
  if(!entries.length)return`<div class="empty"><strong>No cost data yet</strong>Add bills in the Bills Received tab to see cost summary per contract.</div>`;

  return`
  <div style="margin-bottom:12px;font-size:12px;color:var(--txt2)">Cost breakdown per contract. Lumpsum bills split by manual allocation. Specific bills split equally across listed contracts.</div>
  ${entries.map(e=>{
    const contract=S.recs.orders.find(o=>o.contract_no===e.contract_no);
    const total=Object.values(e.categories).reduce((s,v)=>s+v,0);
    const invoice=S.recs.invoices.find(i=>i.contract_no===e.contract_no);
    const invVal=invoice?(Number(invoice.invoice_value)||0)*(Number(invoice.exchange_rate||83)):0;
    return`<div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue)">${e.contract_no}</div>
          ${contract?`<div style="font-size:12px;color:var(--txt2);margin-top:2px">${contract.buyer||'—'} · ${contract.product||'—'} · ${fmtN(contract.qty)} MT</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--txt3)">Total Costs (INR)</div>
          <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--red)">₹${fmt(total)}</div>
        </div>
      </div>

}

// A. GST INPUT CREDIT REGISTER

function renderGstRegister(){
  // Pull all expense bills and calculate GST
  const bills=S.recs.exp_bills||[];
  const rows=bills.filter(b=>Number(b.gst_amount)>0);
  const totalBasic=rows.reduce((s,r)=>s+(Number(r.basic_amount)||0),0);
  const totalGST=rows.reduce((s,r)=>s+(Number(r.gst_amount)||0),0);
  const totalCGST=rows.reduce((s,r)=>s+(Number(r.cgst_amount)||0),0);
  const totalSGST=rows.reduce((s,r)=>s+(Number(r.sgst_amount)||0),0);
  const totalIGST=rows.reduce((s,r)=>s+(Number(r.igst_amount)||0),0);
  const claimable=rows.filter(r=>r.gst_status!=='Not Claimable').reduce((s,r)=>s+(Number(r.gst_amount)||0),0);
  const claimed=rows.filter(r=>r.gst_status==='Claimed').reduce((s,r)=>s+(Number(r.gst_amount)||0),0);
  const pending=claimable-claimed;

  return`
  <div class="kgrid" style="grid-template-columns:repeat(5,1fr)">
    <div class="kpi"><div class="klbl">Total Basic (INR)</div><div class="kval" style="color:var(--txt);font-size:14px">₹${fmt(totalBasic)}</div></div>
    <div class="kpi"><div class="klbl">Total GST Paid</div><div class="kval" style="color:var(--blue);font-size:14px">₹${fmt(totalGST)}</div></div>
    <div class="kpi"><div class="klbl">CGST+SGST</div><div class="kval" style="color:var(--purple);font-size:14px">₹${fmt(totalCGST+totalSGST)}</div></div>
    <div class="kpi"><div class="klbl">IGST</div><div class="kval" style="color:var(--cyan);font-size:14px">₹${fmt(totalIGST)}</div></div>
    <div class="kpi"><div class="klbl">Pending Claim</div><div class="kval" style="color:${pending>0?'var(--amber)':'var(--green)'};font-size:14px">₹${fmt(pending)}</div></div>
  </div>
  <div class="sbar">
    <input placeholder="Search bill no., vendor, category…" value="${S.search||''}"
      oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderAccounting()">
    <select style="background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:12px;color:var(--txt);font-family:var(--font);outline:none"
      onchange="S.search=this.value;document.getElementById('ca').innerHTML=renderAccounting()">
      <option value="">All Status</option>
      <option>Claimable</option><option>Claimed</option><option>Not Claimable</option>
    </select>
  </div>
  <div class="card">`+tbl(
    rows.filter(r=>!S.search||[r.bill_no,r.vendor,r.category,r.gst_status].join(' ').toLowerCase().includes(S.search.toLowerCase())),
    ['Bill No.','Date','Vendor','Category','GST Type','Basic Amt (INR)','GST %','CGST','SGST','IGST','Total GST','Bill Total','Contract','Claim Status','Actions'],
    r=>`<tr>
      <td><span class="mono" style="color:var(--blue)">${r.bill_no||r.id}</span></td>
      <td>${r.bill_date||'—'}</td>
      <td>${r.vendor||'—'}</td>
      <td><span class="badge bb">${r.category||'—'}</span></td>
      <td><span class="badge ${r.gst_type==='IGST'?'bc':'bp'}">${r.gst_type||'—'}</span></td>
      <td class="mono">₹${fmt(r.basic_amount)}</td>
      <td class="mono">${r.gst_pct||0}%</td>
      <td class="mono">${r.cgst_amount?'₹'+fmt(r.cgst_amount):'—'}</td>
      <td class="mono">${r.sgst_amount?'₹'+fmt(r.sgst_amount):'—'}</td>
      <td class="mono">${r.igst_amount?'₹'+fmt(r.igst_amount):'—'}</td>
      <td class="mono" style="font-weight:600;color:var(--blue)">₹${fmt(r.gst_amount)}</td>
      <td class="mono">₹${fmt(r.amount_inr)}</td>
      <td style="font-size:11px">${r.contract_nos||'—'}</td>
      <td>${bdg(r.gst_status||'Claimable')}</td>
      <td><button class="sm" onclick="updateGstStatus('${r.id}')">Update</button></td>
    </tr>`,
    'No GST data found. Add expense bills with GST amounts.'
  )+`</div>`;
}

function updateGstStatus(billId){
  const bill=(S.recs.exp_bills||[]).find(b=>b.id===billId);
  if(!bill)return;
  const statuses=['Claimable','Claimed','Not Claimable'];
  const cur=bill.gst_status||'Claimable';
  const next=statuses[(statuses.indexOf(cur)+1)%statuses.length];
  db.from('exp_bills').update({gst_status:next}).eq('id',billId).then(({error})=>{
    if(!error){loadTable('exp_bills').then(()=>renderAll());toast('GST status: '+next);}
    else toast(error.message,'e');
  });
}

// ══════════════════════════════════════════════════════════
// B. DEBTORS LEDGER (per company, per buyer)
// ══════════════════════════════════════════════════════════
let _debtorCoFilter='';

function renderDebtors(){
  const companies=S.recs.companies||[];
  const invoices=S.recs.invoices||[];
  const payments=S.recs.payments||[];

  // Group invoices by buyer and company(exporter)
  const ledger={};
  // Only finalised invoices post to debtors
  // Criteria: invoice_no exists AND payment_status is Unpaid/Partial/Overdue/Paid
  invoices.filter(inv=>inv.invoice_no&&inv.payment_status&&inv.payment_status!=='').forEach(inv=>{
    const exporter=inv.exporter||'Unknown';
    const buyer=inv.buyer||'Unknown';
    const key=exporter+'::'+buyer;
    if(!ledger[key])ledger[key]={exporter,buyer,invoices:[],payments:[],currency:inv.currency||'USD'};
    const invValINR=(Number(inv.invoice_value)||0)*(Number(inv.exchange_rate)||83);
    ledger[key].invoices.push({
      id:inv.id,invoice_no:inv.invoice_no,date:inv.invoice_date,
      value_usd:Number(inv.invoice_value)||0,
      value_inr:invValINR,
      exchange_rate:Number(inv.exchange_rate)||83,
      payment_status:inv.payment_status,
      contract_no:inv.contract_no
    });
  });

  // Add payment receipts
  payments.forEach(p=>{
    const inv=invoices.find(i=>i.id===p.invoice_id||i.invoice_no===p.invoice_no);
    if(!inv)return;
    const exporter=inv.exporter||'Unknown';
    const buyer=inv.buyer||'Unknown';
    const key=exporter+'::'+buyer;
    if(ledger[key]){
      ledger[key].payments.push({
        id:p.id,date:p.payment_received_date,
        amount_usd:Number(p.amount_received)||0,
        invoice_no:p.invoice_no,mode:p.payment_mode
      });
    }
  });

  const entries=Object.values(ledger).filter(e=>
    !_debtorCoFilter||e.exporter===_debtorCoFilter
  );

  const totalOutUSD=entries.reduce((s,e)=>{
    const inv=e.invoices.reduce((ss,i)=>ss+i.value_usd,0);
    const rcv=e.payments.reduce((ss,p)=>ss+p.amount_usd,0);
    return s+(inv-rcv);
  },0);

  return`
  <div class="kgrid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi"><div class="klbl">Total Debtors</div><div class="kval" style="color:var(--blue)">${Object.keys(ledger).length}</div></div>
    <div class="kpi"><div class="klbl">Total Invoiced (USD)</div><div class="kval" style="color:var(--txt);font-size:14px">$${fmt(entries.reduce((s,e)=>s+e.invoices.reduce((ss,i)=>ss+i.value_usd,0),0))}</div></div>
    <div class="kpi"><div class="klbl">Total Received (USD)</div><div class="kval" style="color:var(--green);font-size:14px">$${fmt(entries.reduce((s,e)=>s+e.payments.reduce((ss,p)=>ss+p.amount_usd,0),0))}</div></div>
    <div class="kpi"><div class="klbl">Outstanding (USD)</div><div class="kval" style="color:${totalOutUSD>0?'var(--red)':'var(--green)'};font-size:14px">$${fmt(totalOutUSD)}</div></div>
  </div>
  <div class="sbar">
    <select style="background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:12px;color:var(--txt);font-family:var(--font);outline:none"
      onchange="_debtorCoFilter=this.value;document.getElementById('ca').innerHTML=renderAccounting()">
      <option value="">All Companies</option>
      ${companies.map(c=>`<option value="${c.name}" ${_debtorCoFilter===c.name?'selected':''}>${c.name}</option>`).join('')}
    </select>
  </div>
  ${entries.length?entries.map(e=>{
    const totalInv=e.invoices.reduce((s,i)=>s+i.value_usd,0);
    const totalRcv=e.payments.reduce((s,p)=>s+p.amount_usd,0);
    const outstanding=totalInv-totalRcv;
    return`<div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--txt)">${e.buyer}</div>
          <div style="font-size:11px;color:var(--txt2);margin-top:2px">Exporter: <strong>${e.exporter}</strong></div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em">Outstanding</div>
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${outstanding>0?'var(--red)':'var(--green)'}">$${fmt(outstanding)}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
        <div class="kpi"><div class="klbl">Total Invoiced</div><div style="font-family:var(--mono);font-size:14px;font-weight:600">$${fmt(totalInv)}</div></div>
        <div class="kpi"><div class="klbl">Received</div><div style="font-family:var(--mono);font-size:14px;font-weight:600;color:var(--green)">$${fmt(totalRcv)}</div></div>
        <div class="kpi"><div class="klbl">Balance Due</div><div style="font-family:var(--mono);font-size:14px;font-weight:600;color:${outstanding>0?'var(--red)':'var(--green)'}">$${fmt(outstanding)}</div></div>
      </div>
      <table style="font-size:11px"><thead><tr>
        <th>Type</th><th>Date</th><th>Reference</th><th>Contract</th><th>Debit (USD)</th><th>Credit (USD)</th><th>Status</th>
      </tr></thead><tbody>
        ${[
          ...e.invoices.map(i=>({type:'Invoice',date:i.date,ref:i.invoice_no,contract:i.contract_no,debit:i.value_usd,credit:0,status:i.payment_status})),
          ...e.payments.map(p=>({type:'Payment',date:p.date,ref:p.invoice_no+' ('+p.mode+')',contract:'',debit:0,credit:p.amount_usd,status:'Received'}))
        ].sort((a,b)=>new Date(a.date||0)-new Date(b.date||0))
        .map(row=>`<tr>
          <td>${bdg(row.type==='Invoice'?'bb':'bg',row.type)}<span class="badge ${row.type==='Invoice'?'bb':'bg'}">${row.type}</span></td>
          <td>${row.date||'—'}</td>
          <td class="mono">${row.ref||'—'}</td>
          <td class="mono" style="color:var(--green)">${row.contract||'—'}</td>
          <td class="mono" style="color:var(--red)">${row.debit?'$'+fmt(row.debit):'—'}</td>
          <td class="mono" style="color:var(--green)">${row.credit?'$'+fmt(row.credit):'—'}</td>
          <td>${bdg(row.status||'—')}</td>
        </tr>`).join('')}
        <tr style="background:var(--surf2);font-weight:600">
          <td colspan="4" style="text-align:right;color:var(--txt2)">CLOSING BALANCE</td>
          <td class="mono" style="color:var(--red)">$${fmt(totalInv)}</td>
          <td class="mono" style="color:var(--green)">$${fmt(totalRcv)}</td>
          <td class="mono" style="color:${outstanding>0?'var(--red)':'var(--green)'}">$${fmt(outstanding)}</td>
        </tr>
      </tbody></table>
    </div>`;
  }).join(''):`<div class="empty"><strong>No debtor data</strong>Create invoices and record payment receipts to see debtor ledger.</div>`}`;
}

// ══════════════════════════════════════════════════════════
// C. CREDITORS LEDGER (per company, per vendor)
// ══════════════════════════════════════════════════════════
let _credCoFilter='';

function renderCreditors(){
  const companies=S.recs.companies||[];
  // Build creditor entries from: purchases, exp_bills, pkg_orders
  const ledger={};

  const addEntry=(exporter,vendor,type,date,ref,contract,amtINR,paidINR)=>{
    if(!vendor)return;
    const co=exporter||'Unknown';
    const key=co+'::'+vendor;
    if(!ledger[key])ledger[key]={exporter:co,vendor,transactions:[]};
    ledger[key].transactions.push({type,date,ref,contract,amount:amtINR||0,paid:paidINR||0});
  };

  // CREDITORS: Only accepted bills create outstanding
  // Raw material purchases do NOT create creditor outstanding until miller bill is received and accepted
  // Packaging orders do NOT create creditor outstanding until vendor bill is received and accepted
  // Only exp_bills with bill_status = Accepted post to creditors

  // Accepted expense bills (covers raw material, freight, CHA, surveyor, packaging etc.)
  (S.recs.exp_bills||[]).filter(b=>b.bill_status==='Accepted').forEach(b=>{
    addEntry(b.exporter_co||null,b.vendor,b.category||'Expense',
      b.bill_date,b.bill_no,b.contract_nos,
      Number(b.basic_amount)||Number(b.amount_inr)||0,
      Number(b.amount_paid)||0);
  });

  // Expense payments — reduce balances on accepted bills
  (S.recs.exp_payments||[]).forEach(ep=>{
    const bill=(S.recs.exp_bills||[]).find(b=>b.id===ep.bill_id&&b.bill_status==='Accepted');
    if(bill){
      const co=bill.exporter_co||'Unknown';
      const key=co+'::'+bill.vendor;
      const entry=ledger[key];
      if(entry){
        entry.transactions.push({
          type:'Payment Made',date:ep.payment_date,
          ref:ep.payment_ref||ep.id,contract:'',
          amount:0,paid:Number(ep.amount_paid)||0
        });
      }
    }
  });

  const entries=Object.values(ledger).filter(e=>
    !_credCoFilter||e.exporter===_credCoFilter
  );

  // Add exporter_co field to exp_bills save — already handled
  const totalPayable=entries.reduce((s,e)=>{
    const billed=e.transactions.reduce((ss,t)=>ss+t.amount,0);
    const paid=e.transactions.reduce((ss,t)=>ss+t.paid,0);
    return s+(billed-paid);
  },0);

  return`
  <div class="kgrid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi"><div class="klbl">Total Creditors</div><div class="kval" style="color:var(--blue)">${entries.length}</div></div>
    <div class="kpi"><div class="klbl">Total Payable (INR)</div><div class="kval" style="color:${totalPayable>0?'var(--red)':'var(--green)'};font-size:14px">₹${fmt(totalPayable)}</div></div>
    <div class="kpi"><div class="klbl">Total Paid (INR)</div><div class="kval" style="color:var(--green);font-size:14px">₹${fmt(entries.reduce((s,e)=>s+e.transactions.reduce((ss,t)=>ss+t.paid,0),0))}</div></div>
  </div>
  <div style="background:rgba(37,99,235,.05);border:1px solid rgba(37,99,235,.15);border-radius:7px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--blue)">
    ℹ Only <strong>Accepted</strong> bills appear here. Go to Expenses & Costs → Bills Received to verify and accept bills from millers, freight vendors, CHA etc.
  </div>
  <div class="sbar">
    <select style="background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:12px;color:var(--txt);font-family:var(--font);outline:none"
      onchange="_credCoFilter=this.value;document.getElementById('ca').innerHTML=renderAccounting()">
      <option value="">All Companies</option>
      ${companies.map(c=>`<option value="${c.name}" ${_credCoFilter===c.name?'selected':''}>${c.name}</option>`).join('')}
    </select>
    <input placeholder="Search vendor…" value="${S.search||''}"
      oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderAccounting()">
  </div>
  ${entries.filter(e=>!S.search||e.vendor.toLowerCase().includes(S.search.toLowerCase())).map(e=>{
    const billed=e.transactions.reduce((s,t)=>s+t.amount,0);
    const paid=e.transactions.reduce((s,t)=>s+t.paid,0);
    const outstanding=billed-paid;
    return`<div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--txt)">${e.vendor}</div>
          ${e.exporter!=='Unknown'?`<div style="font-size:11px;color:var(--txt2);margin-top:2px">Company: <strong>${e.exporter}</strong></div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em">Outstanding Payable</div>
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${outstanding>0?'var(--red)':'var(--green)'}">₹${fmt(outstanding)}</div>
        </div>
      </div>
      <table style="font-size:11px"><thead><tr>
        <th>Type</th><th>Date</th><th>Reference</th><th>Contract</th><th>Amount (INR)</th><th>Paid (INR)</th>
      </tr></thead><tbody>
        ${e.transactions.sort((a,b)=>new Date(a.date||0)-new Date(b.date||0)).map(t=>`<tr>
          <td><span class="badge ${t.type==='Payment Made'?'bg':'br'}">${t.type}</span></td>
          <td>${t.date||'—'}</td>
          <td class="mono">${t.ref||'—'}</td>
          <td class="mono" style="color:var(--green)">${t.contract||'—'}</td>
          <td class="mono" style="color:${t.amount?'var(--red)':'var(--txt3)'}">₹${fmt(t.amount)||'—'}</td>
          <td class="mono" style="color:${t.paid?'var(--green)':'var(--txt3)'}">₹${fmt(t.paid)||'—'}</td>
        </tr>`).join('')}
        <tr style="background:var(--surf2);font-weight:600">
          <td colspan="4" style="text-align:right;color:var(--txt2)">CLOSING BALANCE</td>
          <td class="mono" style="color:var(--red)">₹${fmt(billed)}</td>
          <td class="mono" style="color:${outstanding>0?'var(--red)':'var(--green)'}">₹${fmt(outstanding)} due</td>
        </tr>
      </tbody></table>
    </div>`;
  }).join('')||`<div class="empty"><strong>No creditor data</strong>Add purchases, expense bills and packaging orders to see creditor ledger.</div>`}`;
}

function renderInterCo(){
  const rows=S.recs.interco_bills||[];
  const totalRebill=rows.reduce((s,r)=>s+(Number(r.rebill_amount_inr)||0),0);
  const totalPaid=rows.reduce((s,r)=>s+(Number(r.amount_paid)||0),0);
  return`
  <div class="kgrid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi"><div class="klbl">Total Rebills</div><div class="kval" style="color:var(--blue)">${rows.length}</div></div>
    <div class="kpi"><div class="klbl">Total Rebill Amount (INR)</div><div class="kval" style="color:var(--txt);font-size:14px">₹${fmt(totalRebill)}</div></div>
    <div class="kpi"><div class="klbl">Received</div><div class="kval" style="color:var(--green);font-size:14px">₹${fmt(totalPaid)}</div></div>
    <div class="kpi"><div class="klbl">Outstanding</div><div class="kval" style="color:${totalRebill-totalPaid>0?'var(--red)':'var(--green)'};font-size:14px">₹${fmt(totalRebill-totalPaid)}</div></div>
  </div>
  <div class="sbar">
    <input placeholder="Search rebill no., purchasing company, exporting company…" value="${S.search||''}"
      oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderAccounting()">
    <button class="pri" onclick="openInterCoModal()">+ New Rebill</button>
  </div>
  <div class="card">`+tbl(
    rows.filter(r=>!S.search||[r.rebill_no,r.purchasing_co,r.exporting_co,r.contract_no].join(' ').toLowerCase().includes(S.search.toLowerCase())),
    ['Rebill No.','Date','Contract','Purchasing Co (B)','Exporting Co (A)','Purchase Qty (MT)','Purchase Rate (INR)','Rebill Rate (INR)','Purchase Amt','Rebill Amt','Margin','Paid','Balance','Status','Actions'],
    r=>{
      const purAmt=(Number(r.purchase_qty)||0)*(Number(r.purchase_rate_inr)||0);
      const rebillAmt=(Number(r.purchase_qty)||0)*(Number(r.rebill_rate_inr)||0);
      const margin=rebillAmt-purAmt;
      const bal=rebillAmt-(Number(r.amount_paid)||0);
      return`<tr>
        <td><span class="mono" style="color:var(--blue)">${r.rebill_no||r.id}</span></td>
        <td>${r.rebill_date||'—'}</td>
        <td><span class="mono" style="color:var(--green)">${r.contract_no||'—'}</span></td>
        <td><strong>${r.purchasing_co||'—'}</strong></td>
        <td>${r.exporting_co||'—'}</td>
        <td class="mono">${fmtN(r.purchase_qty)}</td>
        <td class="mono">₹${fmt(r.purchase_rate_inr)}</td>
        <td class="mono">₹${fmt(r.rebill_rate_inr)}</td>
        <td class="mono">₹${fmt(purAmt)}</td>
        <td class="mono" style="font-weight:600">₹${fmt(rebillAmt)}</td>
        <td class="mono" style="color:${margin>=0?'var(--green)':'var(--red)'}">₹${fmt(margin)}</td>
        <td class="mono dok">₹${fmt(r.amount_paid)}</td>
        <td class="mono ${bal>0?'dbad':'dok'}">₹${fmt(bal)}</td>
        <td>${bdg(r.status||'Pending')}</td>
        <td><div class="acell">
          <button class="sm" onclick="openInterCoModal('${r.id}')">Edit</button>
          <button class="sm dan" onclick="delRec('interco_bills','${r.id}')">Del</button>
        </div></td>
      </tr>`;
    },
    'No inter-company rebills yet. Click + New Rebill.'
  )+`</div>`;
}

function openInterCoModal(id){
  const r=id?(S.recs.interco_bills||[]).find(o=>o.id===id):{};
  const companies=(S.recs.companies||[]).map(c=>c.name);
  const body=`<div class="fg">
    ${msec('Rebill Details')}
    <div class="fgrp"><label>Rebill No.</label><input id="ic_no" value="${r.rebill_no||''}" placeholder="Auto or manual" style="font-family:var(--mono)"></div>
    <div class="fgrp"><label>Rebill Date</label><input type="date" id="ic_date" value="${r.rebill_date||today()}"></div>
    <div class="fgrp"><label>Contract No.</label><input id="ic_contract" value="${r.contract_no||''}" list="ic_contract_dl">
      <datalist id="ic_contract_dl">${(S.recs.orders||[]).map(o=>`<option value="${o.contract_no||''}">`).join('')}</datalist>
    </div>
    <div class="fgrp"><label>Purchase Reference (Lot ID)</label><input id="ic_purref" value="${r.purchase_ref||''}" placeholder="Purchase lot or PO ref" style="font-family:var(--mono)"></div>
    ${msec('Companies')}
    <div class="fgrp"><label>Purchasing Company (Company B — bought from miller)</label>
      <input id="ic_pco" value="${r.purchasing_co||''}" list="ic_co_dl" placeholder="Company that bought material">
    </div>
    <div class="fgrp"><label>Exporting Company (Company A — being rebilled)</label>
      <input id="ic_eco" value="${r.exporting_co||''}" list="ic_co_dl" placeholder="Company on export contract">
    </div>
    <datalist id="ic_co_dl">${companies.map(c=>`<option value="${c}">`).join('')}</datalist>
    ${msec('Rates & Amounts')}
    <div class="fgrp"><label>Quantity (MT)</label><input type="number" step="0.001" id="ic_qty" value="${r.purchase_qty||''}" oninput="calcInterCo()"></div>
    <div class="fgrp"><label>Purchase Rate — Company B paid (INR/MT)</label><input type="number" id="ic_purrate" value="${r.purchase_rate_inr||''}" placeholder="Rate B paid to miller" oninput="calcInterCo()"></div>
    <div class="fgrp"><label>Rebill Rate — Company A pays (INR/MT)</label><input type="number" id="ic_rebrate" value="${r.rebill_rate_inr||''}" placeholder="Rate A pays to B" oninput="calcInterCo()"></div>
    <div class="fgrp"><label>Purchase Amount (auto)</label>
      <div id="ic_puramt" style="padding:6px 9px;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--txt)">₹${r.purchase_rate_inr&&r.purchase_qty?fmt((r.purchase_qty||0)*(r.purchase_rate_inr||0)):'—'}</div>
    </div>
    <div class="fgrp"><label>Rebill Amount (auto)</label>
      <div id="ic_rebamt" style="padding:6px 9px;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue)">₹${r.rebill_rate_inr&&r.purchase_qty?fmt((r.purchase_qty||0)*(r.rebill_rate_inr||0)):'—'}</div>
      <input type="hidden" id="ic_rebamt_val" value="${r.rebill_amount_inr||''}">
    </div>
    <div class="fgrp"><label>Margin (auto)</label>
      <div id="ic_margin" style="padding:6px 9px;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)">—</div>
    </div>
    ${msec('Rebill Invoice')}
    <div class="fgrp"><label>Rebill Invoice No.</label><input id="ic_invno" value="${r.rebill_invoice_no||''}" style="font-family:var(--mono)"></div>
    <div class="fgrp"><label>Rebill Invoice Date</label><input type="date" id="ic_invdate" value="${r.rebill_invoice_date||''}"></div>
    <div class="fgrp"><label>GST on Rebill (INR)</label><input type="number" id="ic_gst" value="${r.gst_amount||0}"></div>
    ${msec('Payment')}
    <div class="fgrp"><label>Amount Received (INR)</label><input type="number" id="ic_paid" value="${r.amount_paid||0}" oninput="calcInterCo()"></div>
    <div class="fgrp"><label>Payment Status</label><select id="ic_status">${sel(['Pending','Partial','Paid'],r.status||'Pending')}</select></div>
    <div class="fgrp full"><label>Remarks</label><textarea id="ic_rem">${r.remarks||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit Inter-Company Rebill':'New Inter-Company Rebill',body,id?`saveInterCo('${id}')`:'saveInterCo()',true));
  setTimeout(()=>calcInterCo(),80);
}

function calcInterCo(){
  const qty=parseFloat(fv('ic_qty'))||0;
  const pr=parseFloat(fv('ic_purrate'))||0;
  const rr=parseFloat(fv('ic_rebrate'))||0;
  const purAmt=qty*pr;const rebAmt=qty*rr;const margin=rebAmt-purAmt;
  const s=(id,val,col)=>{const el=document.getElementById(id);if(el){el.textContent='₹'+fmt(val);if(col)el.style.color=col;}};
  s('ic_puramt',purAmt,'var(--txt)');
  s('ic_rebamt',rebAmt,'var(--blue)');
  s('ic_margin',margin,margin>=0?'var(--green)':'var(--red)');
  const h=document.getElementById('ic_rebamt_val');if(h)h.value=rebAmt||'';
}

async function saveInterCo(id){
  calcInterCo();
  const qty=parseFloat(fv('ic_qty'))||0;
  const pr=parseFloat(fv('ic_purrate'))||0;
  const rr=parseFloat(fv('ic_rebrate'))||0;
  const data={
    rebill_no:fv('ic_no'),rebill_date:fv('ic_date')||null,
    contract_no:fv('ic_contract'),purchase_ref:fv('ic_purref'),
    purchasing_co:fv('ic_pco'),exporting_co:fv('ic_eco'),
    purchase_qty:qty||null,purchase_rate_inr:pr||null,rebill_rate_inr:rr||null,
    purchase_amount_inr:qty*pr||null,rebill_amount_inr:qty*rr||null,
    rebill_invoice_no:fv('ic_invno'),rebill_invoice_date:fv('ic_invdate')||null,
    gst_amount:fv('ic_gst')||0,amount_paid:fv('ic_paid')||0,
    status:fv('ic_status'),remarks:fv('ic_rem')
  };
  if(!id){data.id=uid('ICO');if(!data.rebill_no)data.rebill_no='REBILL-'+Date.now().toString(36).toUpperCase();}
  await saveRec('interco_bills',data,id||null);
}

// E. P&L STATEMENT
// ══════════════════════════════════════════════════════════
let _plCoFilter='',_plExchRate=83;

function renderPL(){
  const companies=S.recs.companies||[];
  const invoices=S.recs.invoices||[];
  const expBills=S.recs.exp_bills||[];
  const purchases=S.recs.purchases||[];

  // Build P&L per contract
  const contracts=S.recs.orders.filter(o=>o.signed_contract==='Yes');
  const filtered=contracts.filter(c=>!_plCoFilter||c.exporter===_plCoFilter);

  const grandRevINR=filtered.reduce((s,c)=>{
    const inv=invoices.filter(i=>i.contract_no===c.contract_no||i.linked_contract_id===c.id);
    return s+inv.reduce((ss,i)=>{
      const rate=Number(i.exchange_rate)||_plExchRate;
      return ss+(Number(i.invoice_value)||0)*rate;
    },0);
  },0);

  const grandCostINR=filtered.reduce((s,c)=>{
    // Raw material cost
    const purs=purchases.filter(p=>p.linked_contract_no===c.contract_no||p.linked_contract_id===c.id);
    const matCost=purs.reduce((ss,p)=>{
      const qty=Number(p.qty)||0;const rate=Number(p.price_inr)||0;return ss+qty*rate;
    },0);
    // Expense costs (basic only, excluding GST)
    const expCost=expBills.filter(b=>{
      if(b.bill_type==='Lumpsum'){
        let allocs=[];try{allocs=JSON.parse(b.allocations||'[]');}catch(e){}
        return allocs.some(a=>a.contract_no===c.contract_no);
      }
      return (b.contract_nos||'').split(',').map(x=>x.trim()).includes(c.contract_no);
    }).reduce((ss,b)=>{
      if(b.bill_type==='Lumpsum'){
        let allocs=[];try{allocs=JSON.parse(b.allocations||'[]');}catch(e){}
        const alloc=allocs.find(a=>a.contract_no===c.contract_no);
        return ss+(Number(alloc?.amount_inr)||0);
      }
      const contracts2=(b.contract_nos||'').split(',').map(x=>x.trim()).filter(Boolean);
      const split=contracts2.length?(Number(b.basic_amount)||Number(b.amount_inr)||0)/contracts2.length:(Number(b.basic_amount)||Number(b.amount_inr)||0);
      return ss+split;
    },0);
    return s+matCost+expCost;
  },0);

  return`
  <div class="kgrid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi"><div class="klbl">Total Revenue (INR)</div><div class="kval" style="color:var(--green);font-size:14px">₹${fmt(grandRevINR)}</div></div>
    <div class="kpi"><div class="klbl">Total Costs (INR)</div><div class="kval" style="color:var(--red);font-size:14px">₹${fmt(grandCostINR)}</div></div>
    <div class="kpi"><div class="klbl">Gross Profit (INR)</div><div class="kval" style="color:${grandRevINR-grandCostINR>=0?'var(--green)':'var(--red)'};font-size:14px">₹${fmt(grandRevINR-grandCostINR)}</div></div>
    <div class="kpi"><div class="klbl">Gross Margin</div><div class="kval" style="color:${grandRevINR>0&&(grandRevINR-grandCostINR)/grandRevINR>=0?'var(--green)':'var(--red)'};font-size:14px">${grandRevINR>0?((grandRevINR-grandCostINR)/grandRevINR*100).toFixed(1):'0'}%</div></div>
  </div>
  <div class="sbar">
    <select style="background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:12px;color:var(--txt);font-family:var(--font);outline:none"
      onchange="_plCoFilter=this.value;document.getElementById('ca').innerHTML=renderAccounting()">
      <option value="">All Companies</option>
      ${companies.map(c=>`<option value="${c.name}" ${_plCoFilter===c.name?'selected':''}>${c.name}</option>`).join('')}
    </select>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2)">
      Default USD→INR rate:
      <input type="number" value="${_plExchRate}" style="width:70px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;font-size:12px;font-family:var(--mono);color:var(--txt);outline:none"
        onchange="_plExchRate=parseFloat(this.value)||83;document.getElementById('ca').innerHTML=renderAccounting()">
    </div>
  </div>
  ${filtered.length?filtered.map(c=>{
    const invs=invoices.filter(i=>i.contract_no===c.contract_no||i.linked_contract_id===c.id);
    const revINR=invs.reduce((s,i)=>{const rate=Number(i.exchange_rate)||_plExchRate;return s+(Number(i.invoice_value)||0)*rate;},0);
    const purs=purchases.filter(p=>p.linked_contract_no===c.contract_no||p.linked_contract_id===c.id);
    const matCost=purs.reduce((s,p)=>(Number(p.qty)||0)*(Number(p.price_inr)||0)+s,0);
    const catCosts={};
    expBills.filter(b=>{
      if(b.bill_type==='Lumpsum'){let a=[];try{a=JSON.parse(b.allocations||'[]')}catch(e){}return a.some(x=>x.contract_no===c.contract_no);}
      return (b.contract_nos||'').split(',').map(x=>x.trim()).includes(c.contract_no);
    }).forEach(b=>{
      const cat=b.category||'Other';
      let amt=0;
      if(b.bill_type==='Lumpsum'){let a=[];try{a=JSON.parse(b.allocations||'[]')}catch(e){}const al=a.find(x=>x.contract_no===c.contract_no);amt=Number(al?.amount_inr)||0;}
      else{const cs=(b.contract_nos||'').split(',').map(x=>x.trim()).filter(Boolean);amt=cs.length?(Number(b.basic_amount)||Number(b.amount_inr)||0)/cs.length:(Number(b.basic_amount)||Number(b.amount_inr)||0);}
      catCosts[cat]=(catCosts[cat]||0)+amt;
    });
    const totalExpCost=Object.values(catCosts).reduce((s,v)=>s+v,0);
    const totalCost=matCost+totalExpCost;
    const grossProfit=revINR-totalCost;
    const margin=revINR>0?(grossProfit/revINR*100):0;
    return`<div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">
        <div>
          <div style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue)">${c.contract_no}</div>
          <div style="font-size:12px;color:var(--txt2);margin-top:2px">${c.buyer||'—'} · ${c.product||'—'} · ${fmtN(c.qty)} MT · ${c.exporter||'—'}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em">Gross Profit</div>
          <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:${grossProfit>=0?'var(--green)':'var(--red)'}">₹${fmt(grossProfit)}</div>
          <div style="font-size:11px;color:var(--txt3);margin-top:2px">${margin.toFixed(1)}% margin</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Revenue</div>
          ${invs.map(i=>{const rate=Number(i.exchange_rate)||_plExchRate;const inr=(Number(i.invoice_value)||0)*rate;return`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bdr);font-size:12px"><span class="mono" style="color:var(--blue)">${i.invoice_no||i.id}</span><span class="mono">$${fmt(i.invoice_value)} = ₹${fmt(inr)}</span></div>`;}).join('')}
          <div style="display:flex;justify-content:space-between;padding:6px 0;font-weight:600;font-size:12px">
            <span>Total Revenue</span><span class="mono" style="color:var(--green)">₹${fmt(revINR)}</span>
          </div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Costs (excl. GST)</div>
          <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bdr);font-size:12px">
            <span>Raw Material</span><span class="mono">₹${fmt(matCost)}</span>
          </div>
          ${Object.entries(catCosts).map(([cat,amt])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bdr);font-size:12px"><span>${cat}</span><span class="mono">₹${fmt(amt)}</span></div>`).join('')}
          <div style="display:flex;justify-content:space-between;padding:6px 0;font-weight:600;font-size:12px">
            <span>Total Costs</span><span class="mono" style="color:var(--red)">₹${fmt(totalCost)}</span>
          </div>
        </div>
      </div>
      <div style="background:${grossProfit>=0?'rgba(5,150,105,.06)':'rgba(220,38,38,.06)'};border:1px solid ${grossProfit>=0?'rgba(5,150,105,.2)':'rgba(220,38,38,.2)'};border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:500;color:var(--txt)">Gross Profit / Loss</span>
        <div style="text-align:right">
          <span style="font-family:var(--mono);font-size:18px;font-weight:700;color:${grossProfit>=0?'var(--green)':'var(--red)'}">₹${fmt(grossProfit)}</span>
          <span style="font-size:12px;color:var(--txt3);margin-left:10px">(${margin.toFixed(1)}%)</span>
        </div>
      </div>
    </div>`;
  }).join(''):`<div class="empty"><strong>No confirmed contracts</strong>Confirm contracts and add invoices + costs to see P&L.</div>`}`;
}

// EPC MODULE
// ══════════════════════════════════════════════════════════
function renderEpc(){
  const rows=S.recs.epc||[];
  const companies=S.recs.companies||[];

  // Net EPC available per company
  const epcByCompany={};
  rows.forEach(r=>{
    const co=r.company||'Unknown';
    if(!epcByCompany[co])epcByCompany[co]={sanctioned:0,taken:0,adjusted:0};
    epcByCompany[co].sanctioned+=(Number(r.epc_limit)||0);
    if(!r.adjusted_date)epcByCompany[co].taken+=(Number(r.epc_amount)||0);
    else epcByCompany[co].adjusted+=(Number(r.epc_amount)||0);
  });

  return`
  <div class="kgrid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">
    ${Object.entries(epcByCompany).map(([co,v])=>{
      const avail=v.sanctioned-v.taken+v.adjusted;
      return`<div class="kpi"><div class="klbl">${co}</div>
        <div style="font-family:var(--mono);font-size:15px;font-weight:600;color:${avail>0?'var(--green)':'var(--red)'}">₹${fmt(avail)}</div>
        <div style="font-size:10px;color:var(--txt3);margin-top:2px">Limit: ₹${fmt(v.sanctioned)} · Taken: ₹${fmt(v.taken)}</div>
      </div>`;
    }).join('')||'<div class="kpi"><div class="klbl">No EPC records</div></div>'}
  </div>
  <div class="sbar">
    <input placeholder="Search bank, company, invoice…" value="${S.search||''}"
      oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderEpc()">
    <button class="pri" onclick="openEpcModal()">+ New EPC Record</button>
  </div>
  <div class="card">`+tbl(rows.filter(r=>!S.search||[r.bank_name,r.company,r.invoice_no].join(' ').toLowerCase().includes(S.search.toLowerCase())),
    ['ID','Company','Bank Name','EPC Limit (INR)','EPC Amount Taken','Rate of Interest','EPC Taken Date','Adjusted Date','Linked Invoice','Status','Actions'],
    r=>`<tr>
      <td><span class="mono" style="color:var(--txt3);font-size:10px">${r.id}</span></td>
      <td><strong>${r.company||'—'}</strong></td>
      <td>${r.bank_name||'—'}</td>
      <td class="mono">₹${fmt(r.epc_limit)}</td>
      <td class="mono" style="color:var(--blue)">₹${fmt(r.epc_amount)}</td>
      <td class="mono">${r.interest_rate||'—'}%</td>
      <td>${r.taken_date||'—'}</td>
      <td>${r.adjusted_date||'—'}</td>
      <td class="mono" style="color:var(--green)">${r.invoice_no||'—'}</td>
      <td>${bdg(r.adjusted_date?'Adjusted':'Active')}</td>
      <td><div class="acell">
        <button class="sm" onclick="openEpcModal('${r.id}')">Edit</button>
        <button class="sm dan" onclick="delRec('epc','${r.id}')">Del</button>
      </div></td>
    </tr>`,
    'No EPC records yet.'
  )+`</div>`;
}

function openEpcModal(id){
  const r=id?(S.recs.epc||[]).find(o=>o.id===id):{};
  const companies=(S.recs.companies||[]).map(c=>c.name);
  const body=`<div class="fg">
    ${msec('EPC Details')}
    <div class="fgrp"><label>Company</label>
      <select id="epc_co"><option value="">— Select —</option>
        ${companies.map(c=>`<option value="${c}" ${r.company===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="fgrp"><label>Bank Name</label><input id="epc_bank" value="${r.bank_name||''}"></div>
    <div class="fgrp"><label>EPC Limit Sanctioned (INR)</label><input type="number" id="epc_limit" value="${r.epc_limit||''}"></div>
    <div class="fgrp"><label>EPC Amount Taken (INR)</label><input type="number" id="epc_amount" value="${r.epc_amount||''}"></div>
    <div class="fgrp"><label>Rate of Interest (%)</label><input type="number" step="0.01" id="epc_rate" value="${r.interest_rate||''}"></div>
    <div class="fgrp"><label>EPC Taken Date</label><input type="date" id="epc_taken" value="${r.taken_date||today()}"></div>
    ${msec('Adjustment')}
    <div class="fgrp"><label>Adjusted Date</label><input type="date" id="epc_adj" value="${r.adjusted_date||''}"></div>
    <div class="fgrp"><label>Linked Invoice No.</label>
      <input id="epc_inv" value="${r.invoice_no||''}" list="epc_inv_dl">
      <datalist id="epc_inv_dl">${(S.recs.invoices||[]).map(i=>`<option value="${i.invoice_no||''}">`).join('')}</datalist>
    </div>
    <div class="fgrp full"><label>Remarks</label><textarea id="epc_rem">${r.remarks||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit EPC':'New EPC Record',body,id?`saveEpc('${id}')`:'saveEpc()'));
}

async function saveEpc(id){
  const data={
    company:fv('epc_co'),bank_name:fv('epc_bank'),
    epc_limit:fv('epc_limit')||null,epc_amount:fv('epc_amount')||null,
    interest_rate:fv('epc_rate')||null,taken_date:fv('epc_taken')||null,
    adjusted_date:fv('epc_adj')||null,invoice_no:fv('epc_inv'),remarks:fv('epc_rem')
  };
  if(!id)data.id=uid('EPC');
  await saveRec('epc',data,id||null);
}

// DASHBOARD — complete rewrite
// ══════════════════════════════════════════════════════════
let _dashCo='',_dashExpanded={};

// ── Global contract report filter ──────────────────────────
// Set when navigating from Contract Tracking to a module
let _reportContractNo=null,_reportContractId=null,_reportContractLabel='';

function setReportFilter(contractNo,contractId,label){
  _reportContractNo=contractNo;
  _reportContractId=contractId;
  _reportContractLabel=label||contractNo;
}
function clearReportFilter(){
  _reportContractNo=null;_reportContractId=null;_reportContractLabel='';
}
  // tracks which contracts are expanded

function renderDash(){
  const companies=(S.recs.companies||[]);
  const orders=S.recs.orders||[];
  const invoices=S.recs.invoices||[];
  const payments_=S.recs.payments||[];
  const containers=S.recs.containers||[];
  const epcRecs=S.recs.epc||[];

  // Filter by company
  const filtOrders=orders.filter(o=>o.signed_contract==='Yes'&&
    (!_dashCo||o.exporter===_dashCo));

  // KPIs
  const confirmedQty=filtOrders.reduce((s,o)=>s+(Number(o.qty)||0),0);
  const bookedConts=containers.filter(c=>filtOrders.some(o=>o.contract_no===c.linked_contract_no)).reduce((s,c)=>s+(Number(c.num_containers)||0),0);

  const filtInvoices=invoices.filter(inv=>filtOrders.some(o=>o.contract_no===inv.contract_no));
  const invValueUSD=filtInvoices.reduce((s,i)=>s+(Number(i.invoice_value)||0),0);

  const payPending=payments_.filter(p=>filtInvoices.some(i=>i.invoice_no===p.invoice_no)&&p.status!=='Paid').reduce((s,p)=>s+(Number(p.balance_due)||0),0);

  // EPC available for selected company
  const epcFiltered=_dashCo?epcRecs.filter(e=>e.company===_dashCo):epcRecs;
  const epcAvail=epcFiltered.reduce((s,e)=>s+(e.adjusted_date?0:Number(e.epc_amount)||0),0);
  const epcLimit=epcFiltered.reduce((s,e)=>s+(Number(e.epc_limit)||0),0);
  const epcNet=epcLimit-epcAvail;

  // Split contracts into completed vs pending
  const completedContracts=filtOrders.filter(o=>{
    const invs=invoices.filter(i=>i.contract_no===o.contract_no);
    if(!invs.length)return false;
    const totalInvQty=invs.reduce((s,i)=>s+(Number(i.qty)||0),0);
    const allPaid=invs.every(i=>i.payment_status==='Paid');
    return allPaid&&totalInvQty>=(Number(o.qty)||0)*0.95;
  });
  const pendingContracts=filtOrders.filter(o=>!completedContracts.find(c=>c.id===o.id));

  return`
  <!-- Company filter -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <div style="font-size:13px;font-weight:500;color:var(--txt2)">Company:</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <div onclick="_dashCo='';_dashExpanded={};document.getElementById('ca').innerHTML=renderDash()"
        style="padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;border:1px solid;transition:all .12s;
               ${!_dashCo?'background:var(--blue);color:#fff;border-color:var(--blue)':'background:var(--surf);color:var(--txt2);border-color:var(--bdr)'}">
        All Companies
      </div>
      ${companies.map(c=>`
        <div onclick="_dashCo='${c.name}';_dashExpanded={};document.getElementById('ca').innerHTML=renderDash()"
          style="padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;border:1px solid;transition:all .12s;
                 ${_dashCo===c.name?'background:var(--blue);color:#fff;border-color:var(--blue)':'background:var(--surf);color:var(--txt2);border-color:var(--bdr)'}">
          ${c.short_code||c.name}
        </div>`).join('')}
    </div>
  </div>

  <!-- KPIs -->
  <div class="kgrid" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">
    <div class="kpi">
      <div class="klbl">Confirmed Orders</div>
      <div class="kval" style="color:var(--blue)">${filtOrders.length}</div>
      <div style="font-size:10px;color:var(--txt3);margin-top:3px;font-family:var(--mono)">${fmtN(confirmedQty)} MT total</div>
    </div>
    <div class="kpi">
      <div class="klbl">Containers Booked</div>
      <div class="kval" style="color:var(--green)">${bookedConts}</div>
      <div style="font-size:10px;color:var(--txt3);margin-top:3px">${containers.filter(c=>filtOrders.some(o=>o.contract_no===c.linked_contract_no)).length} bookings</div>
    </div>
    <div class="kpi" style="cursor:pointer" onclick="setPage('epc')">
      <div class="klbl">EPC Available ↗</div>
      <div class="kval" style="color:${epcNet>0?'var(--amber)':'var(--green)'};font-size:16px">₹${fmt(epcNet)}</div>
      <div style="font-size:10px;color:var(--txt3);margin-top:3px">Limit: ₹${fmt(epcLimit)}</div>
    </div>
    <div class="kpi">
      <div class="klbl">Invoice Value Raised</div>
      <div class="kval" style="color:var(--green);font-size:16px">$${fmt(invValueUSD)}</div>
      <div style="font-size:10px;color:var(--txt3);margin-top:3px">${filtInvoices.length} invoices</div>
    </div>
    <div class="kpi">
      <div class="klbl">Payment Pending</div>
      <div class="kval" style="color:${payPending>0?'var(--red)':'var(--green)'};font-size:16px">$${fmt(payPending)}</div>
      <div style="font-size:10px;color:var(--txt3);margin-top:3px">${payments_.filter(p=>filtInvoices.some(i=>i.invoice_no===p.invoice_no)&&p.status!=='Paid').length} unpaid</div>
    </div>
  </div>

  <!-- Completed Contracts -->
  ${completedContracts.length?`
  <div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:8px">
    <span class="badge bg">✓ Completed Contracts</span>
    <span style="font-size:10px;color:var(--txt3);font-weight:400">${completedContracts.length} contract${completedContracts.length>1?'s':''} — payment received</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
    ${completedContracts.map(o=>renderContractCard(o,'completed')).join('')}
  </div>`:''}

  <!-- Pending Contracts -->
  ${pendingContracts.length?`
  <div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:8px">
    <span class="badge ba">⏳ Pending Contracts</span>
    <span style="font-size:10px;color:var(--txt3);font-weight:400">${pendingContracts.length} contract${pendingContracts.length>1?'s':''} in progress</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    ${pendingContracts.map(o=>renderContractCard(o,'pending')).join('')}
  </div>`:''}

  ${!filtOrders.length?`<div class="empty"><strong>No confirmed contracts</strong>Confirm contracts in Orders & Contracts to see them here.</div>`:''}`;
}

// ── Contract card renderer ─────────────────────────────────
function renderContractCard(o, type){
  const invoices_=S.recs.invoices||[];
  const invs=invoices_.filter(i=>i.contract_no===o.contract_no||i.linked_contract_id===o.id);
  const invoicedQty=invs.reduce((s,i)=>s+(Number(i.qty)||0),0);
  const pendingQty=(Number(o.qty)||0)-invoicedQty;
  const isExpanded=_dashExpanded[o.id]||false;

  const cardHtml=`
  <div class="card" style="border-left:3px solid ${type==='completed'?'var(--green)':'var(--blue)'};margin-bottom:0">
    <!-- Contract header — always visible, clickable -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer"
      onclick="_dashExpanded['${o.id}']=!(_dashExpanded['${o.id}']||false);document.getElementById('ca').innerHTML=renderDash()">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue)">${o.contract_no||o.id}</span>
          ${bdg(type==='completed'?'Completed':'Pending')}
          <span style="font-size:11px;color:var(--txt2)">${o.buyer||'—'}</span>
          <span style="font-size:11px;color:var(--txt3)">·</span>
          <span style="font-size:11px;color:var(--txt2)">${o.exporter||'—'}</span>
        </div>
        <div style="margin-top:5px;display:flex;gap:10px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--txt3)">Product: <strong style="color:var(--txt)">${o.product||'—'}</strong></span>
          <span style="font-size:11px;color:var(--txt3)">Contract Qty: <strong style="font-family:var(--mono);color:var(--txt)">${fmtN(o.qty)} MT</strong></span>
          <span style="font-size:11px;color:var(--txt3)">Invoiced: <strong style="font-family:var(--mono);color:var(--green)">${fmtN(invoicedQty)} MT</strong></span>
          ${pendingQty>0?`<span style="font-size:11px;color:var(--txt3)">Pending: <strong style="font-family:var(--mono);color:var(--amber)">${fmtN(pendingQty)} MT</strong></span>`:''}
          <span style="font-size:11px;color:var(--txt3)">${o.currency||'USD'} ${fmt(o.unit_price)}/MT</span>
        </div>
      </div>
      <div style="font-size:16px;color:var(--txt3);padding:2px 6px">${isExpanded?'▲':'▼'}</div>
    </div>

    ${isExpanded?`
    <div style="margin-top:12px;border-top:1px solid var(--bdr);padding-top:12px">

      <!-- INVOICED PORTION -->
      ${invs.length?`
      <div style="font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Invoiced Portion — ${invs.length} Invoice${invs.length>1?'s':''}</div>
      ${invs.map(inv=>renderInvoiceBlock(inv,o)).join('')}`:''}

      <!-- PENDING PORTION -->
      ${pendingQty>0?`
      <div style="font-size:10px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-top:${invs.length?'14px':'0'};margin-bottom:8px">Pending Portion — ${fmtN(pendingQty)} MT remaining</div>
      ${renderPendingStatus(o)}`:''}

    </div>`:''}
  </div>`;
  return cardHtml;
}

// ── Invoice block with drill-down ─────────────────────────

  const packListRec=(S.recs.packing_list||[]).find(p=>p.invoice_no===inv.invoice_no||p.invoice_id===inv.id);
  const payRec=(S.recs.payments||[]).find(p=>p.invoice_no===inv.invoice_no||p.invoice_id===inv.id);
  const isExpInv=_dashExpanded['inv_'+inv.id]||false;

  let conts=[];try{conts=JSON.parse(packListRec?.containers||inv.containers||'[]');}catch(e){}

  return`
  <div style="background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:7px">
    <!-- Invoice header -->
    <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer"
      onclick="_dashExpanded['inv_${inv.id}']=!(_dashExpanded['inv_${inv.id}']||false);document.getElementById('ca').innerHTML=renderDash()">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue)">${inv.invoice_no||inv.id}</span>
        <span style="font-size:11px;color:var(--txt3)">${inv.invoice_date||'—'}</span>
        <span class="badge bb">${inv.currency||'USD'} ${fmt(inv.invoice_value)}</span>
        ${bdg(inv.payment_status||'Unpaid')}
        ${payRec?.payment_received_date?`<span style="font-size:10px;color:var(--green)">Received: ${payRec.payment_received_date}</span>`:''}
      </div>
      <span style="font-size:14px;color:var(--txt3)">${isExpInv?'▲':'▼'}</span>
    </div>

    ${isExpInv?`
    <div style="margin-top:10px;border-top:1px solid var(--bdr);padding-top:10px">

      <!-- BL Details -->
      ${shippingRec?`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:7px 10px;background:rgba(8,145,178,.06);border:1px solid rgba(8,145,178,.15);border-radius:6px;cursor:pointer"
        onclick="_dashExpanded['bl_${inv.id}']=!(_dashExpanded['bl_${inv.id}']||false);document.getElementById('ca').innerHTML=renderDash()">
        <span style="font-size:10px;font-weight:600;color:var(--cyan);text-transform:uppercase;letter-spacing:.07em">BL No.</span>
        <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--cyan)">${shippingRec.bl_no||'Pending'}</span>
        <span style="font-size:11px;color:var(--txt3)">${shippingRec.vessel||'—'} · ATD: ${shippingRec.atd||'—'}</span>
        ${bdg(shippingRec.bl_received?'BL Received':'BL Pending')}
        <span style="margin-left:auto;font-size:12px;color:var(--txt3)">${_dashExpanded['bl_'+inv.id]?'▲':'▼'}</span>
      </div>

      ${_dashExpanded['bl_'+inv.id]&&conts.length?`
      <div style="margin-left:12px">
        <div style="font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">${conts.length} Container${conts.length>1?'s':''}</div>
        ${conts.map((c,ci)=>renderContainerDrilldown(c,ci,inv,contract)).join('')}
      </div>`:''}
      `:`<div style="font-size:11px;color:var(--txt3);padding:4px 0">No BL record yet. Add in Shipping & BL module.</div>`}

    </div>`:''}
  </div>`;
}

// ── Container drill-down ──────────────────────────────────
function renderContainerDrilldown(c,ci,inv,contract){
  const isExpCont=_dashExpanded['cont_'+inv.id+'_'+ci]||false;

  // Find sourcing — EF stuffing or CFS trucks
  const efRec=(S.recs.ef_stuffing||[]).find(r=>r.linked_contract_no===contract.contract_no);
  const efConts=efRec?JSON.parse(efRec.containers||'[]').filter(ec=>ec.container_no===c.container_no):[];

  const cfsStuffRec=(S.recs.cfs_stuffing||[]).find(r=>r.export_invoice_no===inv.invoice_no);
  const cfsConts=cfsStuffRec?JSON.parse(cfsStuffRec.containers||'[]').filter(cc=>cc.container_no===c.container_no):[];

  // Trucks for this invoice
  const trucks=(S.recs.cfs_trucks||[]).filter(t=>t.invoice_ref===inv.invoice_no);
  // Group trucks by miller (as company proxy)
  const trucksByMiller={};
  trucks.forEach(t=>{
    const k=t.miller_name||t.purchaser||'Unknown';
    if(!trucksByMiller[k])trucksByMiller[k]=[];
    trucksByMiller[k].push(t);
  });

  return`
  <div style="background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;margin-bottom:5px">
    <div style="display:flex;align-items:center;gap:8px;cursor:pointer"
      onclick="_dashExpanded['cont_${inv.id}_${ci}']=!(_dashExpanded['cont_${inv.id}_${ci}']||false);document.getElementById('ca').innerHTML=renderDash()">
