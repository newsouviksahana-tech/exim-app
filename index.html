<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExIm Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0d1117;--surf:#161b27;--surf2:#1c2235;--surf3:#222840;
  --bdr:#2a3050;--bdr2:#353d5c;
  --txt:#e2e8f0;--txt2:#8892b0;--txt3:#4a5580;
  --blue:#4f9cf9;--blue2:#3b82f6;--green:#34d399;--amber:#fbbf24;
  --red:#f87171;--purple:#a78bfa;--cyan:#22d3ee;--pink:#f472b6;
  --r:10px;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surf)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* APP */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:224px;min-width:224px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:16px 14px 10px;border-bottom:1px solid var(--bdr)}
.logo h1{font-size:13px;font-weight:600;letter-spacing:-.2px}
.logo p{font-size:10px;color:var(--txt3);margin-top:2px;font-family:var(--mono)}
.db-pill{margin:8px 8px 2px;padding:5px 9px;border-radius:6px;font-size:10px;font-family:var(--mono);display:flex;align-items:center;gap:5px;border:1px solid}
.dbok{background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.2);color:var(--green)}
.dberr{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.2);color:var(--red)}
.dbload{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.2);color:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
.spn{display:inline-block;width:10px;height:10px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
.nav-grp{padding:10px 8px 2px;font-size:9px;font-weight:600;color:var(--txt3);letter-spacing:.12em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:pointer;border-radius:6px;margin:1px 4px;font-size:12px;color:var(--txt2);transition:all .12s}
.nav-item:hover{background:var(--surf2);color:var(--txt)}
.nav-item.active{background:rgba(79,156,249,.12);color:var(--blue);font-weight:500}
.ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:14px;font-weight:600;letter-spacing:-.2px}
.pbadge{font-size:9px;padding:1px 6px;border-radius:20px;background:var(--surf2);color:var(--txt3);margin-left:7px;font-family:var(--mono)}
.content{flex:1;overflow-y:auto;padding:14px 16px}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px}
.klbl{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.kval{font-size:22px;font-weight:600;font-family:var(--mono);letter-spacing:-1px}

/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.ctitle{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 9px;background:var(--surf2);font-weight:500;font-size:10px;color:var(--txt3);border-bottom:1px solid var(--bdr);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:6px 9px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.016)}
.mono{font-family:var(--mono);font-size:11px}

/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--mono)}
.bg{background:rgba(52,211,153,.1);color:var(--green)}
.bb{background:rgba(79,156,249,.1);color:var(--blue)}
.ba{background:rgba(251,191,36,.1);color:var(--amber)}
.br{background:rgba(248,113,113,.1);color:var(--red)}
.bp{background:rgba(167,139,250,.1);color:var(--purple)}
.bc{background:rgba(34,211,238,.1);color:var(--cyan)}
.bgr{background:var(--surf2);color:var(--txt3)}

/* BUTTONS */
button{cursor:pointer;border:1px solid var(--bdr2);background:var(--surf2);color:var(--txt2);border-radius:6px;padding:5px 11px;font-size:12px;font-family:var(--font);transition:all .12s;white-space:nowrap}
button:hover{background:var(--bdr);color:var(--txt)}
button.pri{background:var(--blue);color:#fff;border-color:transparent;font-weight:500}
button.pri:hover{background:var(--blue2)}
button.suc{background:rgba(52,211,153,.12);color:var(--green);border-color:rgba(52,211,153,.25)}
button.suc:hover{background:rgba(52,211,153,.2)}
button.dan{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.2)}
button.dan:hover{background:rgba(248,113,113,.2)}
button.ghost{background:transparent;border-color:transparent;color:var(--txt3)}
button.ghost:hover{background:var(--surf2);color:var(--txt)}
button.sm{padding:3px 8px;font-size:11px}
button.xs{padding:2px 6px;font-size:10px}

/* SEARCH */
.sbar{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.sbar input,.sbar select{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:12px;font-family:var(--font);color:var(--txt);outline:none;max-width:260px}
.sbar input:focus,.sbar select:focus{border-color:var(--blue)}
.sbar input::placeholder{color:var(--txt3)}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:40px 14px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:var(--surf);border:1px solid var(--bdr2);border-radius:12px;width:620px;max-width:96vw;padding:20px;max-height:88vh;overflow-y:auto}
.modal.lg{width:820px}
.modal h3{font-size:14px;font-weight:600;margin-bottom:16px;letter-spacing:-.2px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fgrp{display:flex;flex-direction:column;gap:3px}
.fgrp.full{grid-column:1/-1}
label{font-size:10px;color:var(--txt3);font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.fgrp input,.fgrp select,.fgrp textarea{background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:6px 9px;font-size:12px;font-family:var(--font);color:var(--txt);width:100%;outline:none;transition:border .12s}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--blue)}
.fgrp input.af{border-color:rgba(52,211,153,.4);color:var(--green)}
.fgrp select option{background:var(--surf2)}
textarea{resize:vertical;min-height:54px}
.mac{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;padding-top:12px;border-top:1px solid var(--bdr)}
.msec{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;padding:12px 0 6px;border-bottom:1px solid var(--bdr);grid-column:1/-1;margin-top:2px}

/* QUERY WINDOW */
.qwin{background:var(--surf2);border:1px solid var(--bdr2);border-radius:8px;padding:10px;margin-bottom:12px}
.qwin-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.qwin-title{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.08em}
.qwin-search{background:var(--surf);border:1px solid var(--bdr);border-radius:5px;padding:5px 8px;font-size:11px;font-family:var(--font);color:var(--txt);outline:none;width:200px}
.qwin-search::placeholder{color:var(--txt3)}
.qwin-search:focus{border-color:var(--blue)}
.qwin-list{max-height:190px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.qcard{background:var(--surf);border:1px solid var(--bdr);border-radius:7px;padding:9px 11px;cursor:pointer;transition:all .1s}
.qcard:hover{border-color:var(--blue);background:rgba(79,156,249,.05)}
.qcard.sel{border-color:var(--green);background:rgba(52,211,153,.06)}
.qcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.qcard-id{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--blue)}
.qcard-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.qtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.qtag{background:var(--surf2);border:1px solid var(--bdr);border-radius:3px;padding:1px 6px;font-size:10px;color:var(--txt2)}
.qtag.hi{color:var(--amber)}
.qtag.ok{color:var(--green)}
.bmark{display:flex;align-items:center;gap:5px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:6px;padding:4px 8px;margin-top:5px}
.bmark-lbl{font-size:9px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.bmark-val{font-size:11px;font-weight:500;color:var(--amber);font-family:var(--mono)}
.sel-pill{display:flex;align-items:center;gap:8px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:6px;padding:6px 10px;margin-top:6px}
.sel-pill-txt{font-size:11px;color:var(--green);font-weight:500;flex:1}

/* MISC */
.acell{display:flex;gap:3px}
.dok{color:var(--green);font-weight:500}
.dbad{color:var(--red);font-weight:500}
.empty{text-align:center;padding:30px;color:var(--txt3);font-size:12px;line-height:1.8}
.divider{height:1px;background:var(--bdr);margin:12px 0}
.ref-strip{display:none;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:7px;padding:8px 11px;grid-column:1/-1}
.ref-strip b{font-size:11px;font-weight:500;color:var(--green);display:block;margin-bottom:2px}
.ref-strip span{font-size:10px;color:var(--green);opacity:.8}

/* TOAST */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:18px;right:18px;padding:9px 15px;border-radius:9px;font-size:12px;z-index:9999;font-weight:500;border:1px solid;animation:fadeUp .2s ease}
.ts{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:var(--green)}
.te{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red)}
.tw{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--amber)}

/* ALERT BANNER */
.alert-banner{border-radius:8px;padding:9px 13px;margin-bottom:10px;border:1px solid;display:none}
.alert-red{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.25)}
.alert-amber{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.25)}
.alert-title{font-size:12px;font-weight:500;margin-bottom:2px}
.alert-red .alert-title{color:var(--red)}
.alert-amber .alert-title{color:var(--amber)}
.alert-sub{font-size:11px}
.alert-red .alert-sub{color:var(--red)}
.alert-amber .alert-sub{color:var(--amber)}

/* MULTI PLOT */
.plot-row{background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.plot-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.plot-lbl{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em}
.plot-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:7px}
.plot-grid .fgrp input,.plot-grid .fgrp select{font-size:11px;padding:5px 7px}
.add-link{background:none;border:none;font-size:11px;color:var(--blue);cursor:pointer;padding:4px 0;font-family:var(--font)}
.add-link:hover{opacity:.8}

/* GROUPS */
.grp-box{background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;overflow:hidden;margin-bottom:9px}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surf3);border-bottom:1px solid var(--bdr)}
.grp-hdr-l{display:flex;align-items:center;gap:8px}
.grp-num{width:20px;height:20px;border-radius:50%;background:rgba(79,156,249,.15);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid rgba(79,156,249,.3);flex-shrink:0}
.grp-name{background:transparent;border:none;font-size:12px;font-weight:500;color:var(--txt);font-family:var(--font);outline:none;width:170px}
.grp-name:focus{border-bottom:1px solid var(--blue)}
.grp-meta{font-size:10px;color:var(--txt3);margin-top:1px}
.grp-body{padding:12px}
.grp-surv{display:flex;align-items:center;gap:8px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--bdr)}
.grp-surv-lbl{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;min-width:110px}
.grp-surv input{max-width:180px;font-size:12px}
.grp-surv-note{font-size:10px;color:var(--txt3);margin-left:8px}
.col-hdrs{display:grid;gap:4px;margin-bottom:3px}
.col-hdr{font-size:9px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;text-align:center}
.con-row{display:grid;gap:4px;align-items:center;margin-bottom:4px}
.con-row input,.con-row select{font-size:11px;padding:4px 7px;background:var(--surf);border:1px solid var(--bdr);border-radius:5px;color:var(--txt);font-family:var(--font);outline:none;width:100%}
.con-row input:focus,.con-row select:focus{border-color:var(--blue)}
.con-row input.auto{border-color:rgba(52,211,153,.35);color:var(--green)}
.vbtn{background:var(--surf3);border:1px solid var(--bdr);border-radius:5px;padding:4px 7px;font-size:11px;color:var(--txt3);cursor:pointer;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .12s;width:100%}
.vbtn:hover{border-color:var(--blue);color:var(--txt)}
.vbtn.filled{border-color:rgba(52,211,153,.35);color:var(--green);font-weight:500}
.sovr{font-size:9px;color:var(--txt3);cursor:pointer;display:flex;align-items:center;gap:3px;margin-top:2px}
.sovr:hover{color:var(--blue)}
</style>
</head>
<body>
<div id="root"></div>
<div id="mroot"></div>

<script>
const SUPA_URL='https://wktdubbvddynyigxmoyb.supabase.co';
const SUPA_KEY='sb_publishable_-BjRXe1NkSTPQKQoRWDQVQ_Uu5CNZFX';
const{createClient}=supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

// ── State ──────────────────────────────────────────────────
const TABLES=['orders','purchases','containers','transporters','loading','surveyor_ef',
  'psi','cfs_trucks','cfs_stuffing','invoices','customs','shipping','payments','rates','product_specs'];

let S={
  page:'dashboard',
  recs:Object.fromEntries(TABLES.map(t=>[t,[]])),
  masters:{buyers:[],products:[],exporters:[],transporters:[]},
  dbStatus:'loading',search:'',
  // modal temp
  sel:{contract:null,booking:null,assignment:null,vendor1:null,vendor2:null},
  groups:[],groupCounter:0,
  plots:[],plotCounter:0,
  qSearch:{contract:'',booking:'',assignment:'',vendor:''},
  _editIds:{},
};

// ── DB ─────────────────────────────────────────────────────
async function loadTable(t){
  try{const{data,error}=await db.from(t).select('*').order('created_at',{ascending:false});
    if(error)throw error;S.recs[t]=data||[];}
  catch(e){S.recs[t]=[];console.warn(t,e.message);}
}
async function loadAll(){
  S.dbStatus='loading';renderSidebar();
  await Promise.all(TABLES.map(t=>loadTable(t)));
  rebuildMasters();S.dbStatus='ok';renderAll();
}
function rebuildMasters(){
  S.masters.buyers=[...new Set(S.recs.orders.map(o=>o.buyer).filter(Boolean))];
  S.masters.products=[...new Set(S.recs.orders.map(o=>o.product).filter(Boolean))];
  S.masters.exporters=[...new Set(S.recs.orders.map(o=>o.exporter).filter(Boolean))];
  S.masters.transporters=[...new Set(S.recs.transporters.map(o=>o.transporter).filter(Boolean))];
}
async function saveRec(table,data,id){
  try{
    const res=id?await db.from(table).update(data).eq('id',id).select()
                :await db.from(table).insert(data).select();
    if(res.error)throw res.error;
    await loadTable(table);rebuildMasters();renderAll();closeModal();toast('Saved');
  }catch(e){toast(e.message,'e');console.error(e);}
}
async function delRec(table,id){
  if(!confirm('Delete this record?'))return;
  try{const{error}=await db.from(table).delete().eq('id',id);
    if(error)throw error;await loadTable(table);renderAll();toast('Deleted','w');}
  catch(e){toast(e.message,'e');}
}

// ── Helpers ────────────────────────────────────────────────
const today=()=>new Date().toISOString().slice(0,10);
const fy=()=>{const y=new Date().getFullYear(),m=new Date().getMonth();
  return m>=3?`${y}-${String(y+1).slice(2)}`:`${y-1}-${String(y).slice(2)}`;}
const fmt=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const fmtN=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN'):'—';
const fv=(id)=>{const e=document.getElementById(id);return e?e.value:'';}
const uid=(p)=>`${p}-${Date.now().toString(36).toUpperCase()}`;

function toast(msg,type='s'){
  const d=document.createElement('div');
  d.className=`toast t${type}`;d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),2600);
}
function bdg(v){
  const m={Confirmed:'bg',Pending:'ba',Cancelled:'br',Matched:'bg',Discrepancy:'br',
    Approved:'bb',Paid:'bg',Unpaid:'ba',Overdue:'br','Booked':'bb',Yes:'bg',No:'br',
    'Gate-In Done':'bg','LEO Received':'bb','Clearance Pending':'ba',Completed:'bg',
    'In Transit':'bb',Assigned:'ba','Ready for Customs':'bg',Scheduled:'ba',
    'In Progress':'bb',Passed:'bg',Failed:'br','Re-inspection':'ba',Partial:'bp',
    'PSI Done':'bg','PSI Pending':'ba','Dispatched':'bb','Received':'bg',
    'Stuffed':'bg','Awaiting Stuffing':'ba','BL Received':'bg','Docs Sent':'bc',
    'Payment Received':'bg','Telex Released':'bp'};
  return`<span class="badge ${m[v]||'bgr'}">${v||'—'}</span>`;
}
function setPage(p){S.page=p;S.search='';renderAll();}
function closeModal(){document.getElementById('mroot').innerHTML='';}
function openModal(html){document.getElementById('mroot').innerHTML=`<div class="moverlay" onclick="if(event.target===this)closeModal()">${html}</div>`;}
function mw(title,body,onSave,lg=false){
  return`<div class="modal${lg?' lg':''}"><h3>${title}</h3>${body}<div class="mac"><button onclick="closeModal()">Cancel</button><button class="pri" onclick="${onSave}">Save to Database</button></div></div>`;
}
function mf(lbl,id,type='text',opts='',full=false,val=''){
  const c='fgrp'+(full?' full':'');
  if(type==='select')return`<div class="${c}"><label>${lbl}</label><select id="${id}">${opts}</select></div>`;
  if(type==='textarea')return`<div class="${c}"><label>${lbl}</label><textarea id="${id}">${val||''}</textarea></div>`;
  return`<div class="${c}"><label>${lbl}</label><input type="${type}" id="${id}" value="${(val||'').toString().replace(/"/g,'&quot;')}"></div>`;
}
function sel(opts,cur){return opts.map(o=>`<option value="${o}"${cur===o?' selected':''}>${o}</option>`).join('');}
function dlf(lbl,id,lid,items,full=false,val=''){
  const c='fgrp'+(full?' full':'');
  return`<div class="${c}"><label>${lbl}</label><input id="${id}" list="${lid}" value="${(val||'').replace(/"/g,'&quot;')}" autocomplete="off"><datalist id="${lid}">${items.map(i=>`<option value="${i}">`).join('')}</datalist></div>`;
}
function msec(t){return`<div class="msec">${t}</div>`;}

// ── Contract number auto-generate ─────────────────────────
function genContractNo(exp){
  if(!exp)return'';
  const pfx=exp.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,4);
  const ex=S.recs.orders.filter(o=>o.contract_no&&o.contract_no.startsWith(pfx+'/'));
  return`${pfx}/${fy()}/${String(ex.length+1).padStart(3,'0')}`;
}

function calcDeadline(){
  const p=document.getElementById('t_pickup')?.value;
  const ft=parseInt(document.getElementById('t_freetime')?.value)||0;

  const ban=document.getElementById('trans-deadline-banner');
  if(!p||!ft){if(el)el.value='';return;}
  const d=new Date(p);d.setDate(d.getDate()+ft-1);
  const dl=d.toISOString().slice(0,10);
  if(el){el.value=dl;
    const diff=Math.round((d-new Date())/86400000);

function pickVendor(pid){
  const p=S.recs.purchases.find(x=>x.id===pid);

async function saveLoading(id){

function setSurveyResult(res){
  document.getElementById('sv_result').value=res;
  ['Passed','Failed','Re-inspection'].forEach(r2=>{
    const el=document.getElementById('sres-'+r2.replace(' ',''));
    if(el){
      const active=r2===res;
      el.style.borderColor=active?(r2==='Passed'?'var(--green)':r2==='Failed'?'var(--red)':'var(--amber)'):'var(--bdr)';
      el.style.background=active?(r2==='Passed'?'rgba(52,211,153,.08)':r2==='Failed'?'rgba(248,113,113,.08)':'rgba(251,191,36,.08)'):'';
    }
  });
  document.getElementById('sv_fail_section').style.display=(res==='Failed'||res==='Re-inspection')?'block':'none';
  document.getElementById('sv_loading_section').style.display=(res==='Passed'||res==='Re-inspection')?'block':'none';
}
function setSurveyResolution(res){
  document.getElementById('sv_resolution').value=res;
  ['New material manufactured','Redirect to different vendor','Accept at discounted rate','Partial acceptance'].forEach(r2=>{
    const el=document.getElementById('svres-'+r2.replace(/ /g,'-'));
    if(el){el.style.borderColor=r2===res?'var(--blue)':'var(--bdr)';el.style.background=r2===res?'rgba(79,156,249,.08)':'';}
  });
  const av=document.getElementById('sv_alt_vendor_row');
  const disc=document.getElementById('sv_disc_row');
  if(av)av.style.display=res==='Redirect to different vendor'?'flex':'none';
  if(disc)disc.style.display=res==='Accept at discounted rate'?'grid':'none';
}
function calcSurveyDiffs(){
  const pp=parseFloat(document.getElementById('sv_poprice')?.value)||0;
  const bp=parseFloat(document.getElementById('sv_billprice')?.value)||0;
  const pq=parseFloat(document.getElementById('sv_poqty')?.value)||0;
  const bq=parseFloat(document.getElementById('sv_billqty')?.value)||0;
  const pd=bp-pp,qd=bq-pq;
  const pel=document.getElementById('sv_pricediff');
  const qel=document.getElementById('sv_qtydiff');
  if(pel&&(pp||bp)){pel.textContent=(pd>=0?'+':'')+'₹'+fmt(pd);pel.style.color=pd===0?'var(--green)':pd>0?'var(--red)':'var(--green)';}
  if(qel&&(pq||bq)){qel.textContent=(qd>=0?'+':'')+qd.toFixed(3)+' MT';qel.style.color=qd===0?'var(--green)':Math.abs(qd)>0.1?'var(--red)':'var(--green)';}
}
function toggleSurveyInvoice(){
  const flag=document.getElementById('sv_invflag');
  const tog=document.getElementById('sv_inv_toggle');
  const knob=document.getElementById('sv_knob');
  const lbl=document.getElementById('sv_inv_lbl');
  const det=document.getElementById('sv_inv_detail');
  const on=flag.value!=='1';
  flag.value=on?'1':'';
  if(tog)tog.style.background=on?'var(--green)':'var(--bdr)';
  if(knob)knob.style.left=on?'18px':'2px';
  if(lbl){lbl.textContent=on?'Flagged':'Not flagged';lbl.style.color=on?'var(--green)':'var(--txt3)';lbl.style.fontWeight=on?'500':'400';}
  if(det)det.style.display=on?'contents':'none';
}

async function savePsi(id){
  // Collect dynamic spec fields
  const contract=_psiSelC?S.recs.orders.find(o=>o.id===_psiSelC):null;
  const specRec=contract?S.recs.product_specs.find(ps=>ps.product===contract.product):null;
  const specFields=specRec?.spec_fields?specRec.spec_fields.split(',').map(s=>s.trim()):['Moisture %','Broken %','DD %','Length','Black Kernels'];
  const specResults={};
  specFields.forEach(f=>{
    const v=fv('spec_'+f.replace(/[^a-zA-Z0-9]/g,'_'));
    if(v)specResults[f]=parseFloat(v);
  });
  const data={
    psi_date:fv('psi_date')||null,miller_name:fv('psi_miller'),miller_location:fv('psi_loc'),
    surveyor_name:fv('psi_surveyor'),purchase_id:fv('psi_purchase')||null,
    linked_contract_no:fv('psi_contract'),linked_contract_id:_psiSelC||null,
    qty_surveyed:fv('psi_surveyed')||null,qty_approved:fv('psi_approved')||null,
    qty_dispatched:fv('psi_dispatched')||0,
    spec_results:JSON.stringify(specResults),spec_notes:fv('psi_notes'),
    result:fv('psi_result'),remarks:fv('psi_rem')
  };
  if(!id)data.id=uid('PSI');
  _psiSelC=null;_reRenderFn=null;
  await saveRec('psi',data,id||null);
}

}
function calcCfsAmount(){
  const qty=parseFloat(document.getElementById('cfs_qty')?.value)||0;
  const rate=parseFloat(document.getElementById('cfs_rate')?.value)||0;
  const el=document.getElementById('cfs_amount');
  if(el&&qty&&rate)el.textContent='₹'+fmt(qty*rate);
}
function calcWeightDiff(){
  const fg=parseFloat(document.getElementById('cfs_fgross')?.value)||0;
  const ft=parseFloat(document.getElementById('cfs_ftare')?.value)||0;
  const cg=parseFloat(document.getElementById('cfs_cgross')?.value)||0;
  const ct=parseFloat(document.getElementById('cfs_ctare')?.value)||0;
  const fn2=fg-ft,cn=cg-ct,diff=cn-fn2;
  const fnel=document.getElementById('cfs_fnet');
  const cnel=document.getElementById('cfs_cnet');
  const dnel=document.getElementById('cfs_wdiff');
  if(fnel&&fg)fnel.textContent=fn2.toFixed(3)+' MT';
  if(cnel&&cg)cnel.textContent=cn.toFixed(3)+' MT';
  if(dnel&&(fg||cg)){dnel.textContent=(diff>0?'+':'')+diff.toFixed(3)+' MT';dnel.style.color=Math.abs(diff)<0.1?'var(--green)':Math.abs(diff)<0.3?'var(--amber)':'var(--red)';}
}
function checkPsiLimit(){
  const psiId=fv('cfs_psi');
  const qty=parseFloat(fv('cfs_qty'))||0;
  const flagRow=document.getElementById('psi_flag_row');
  if(!psiId||!qty||!flagRow){if(flagRow)flagRow.style.display='none';return;}
  const psi=S.recs.psi.find(p=>p.id===psiId);
  if(!psi){flagRow.style.display='none';return;}
  const avail=(psi.qty_approved||0)-(psi.qty_dispatched||0);
  flagRow.style.display=qty>avail?'block':'none';
}
async function saveCfsTruck(id){
  const fg=parseFloat(fv('cfs_fgross'))||0,ft=parseFloat(fv('cfs_ftare'))||0;
  const cg=parseFloat(fv('cfs_cgross'))||0,ct=parseFloat(fv('cfs_ctare'))||0;
  const qty=parseFloat(fv('cfs_qty'))||0,rate=parseFloat(fv('cfs_rate'))||0;
  const data={
    invoice_ref:fv('cfs_invref'),brand:fv('cfs_brand'),billing_party:fv('cfs_billing'),
    miller_name:fv('cfs_miller'),miller_place:fv('cfs_mplace'),
    miller_invoice_no:fv('cfs_minvno'),miller_invoice_date:fv('cfs_minvdate')||null,
    vehicle_no:fv('cfs_vehicle'),truck_date:fv('cfs_truckdate')||null,
    total_bags:parseInt(fv('cfs_bags'))||null,qty_mt:qty||null,rate_inr:rate||null,
    amount_inr:qty&&rate?qty*rate:null,
    receiving_bags:parseInt(fv('cfs_rcvbags'))||null,
    cfs_date:fv('cfs_cfsdate')||null,cfs_name:fv('cfs_cfsname'),
    is_part:fv('cfs_part')==='Yes',
    factory_gross:fg||null,factory_tare:ft||null,factory_net:fg?fg-ft:null,
    cfs_gross:cg||null,cfs_tare:ct||null,cfs_net:cg?cg-ct:null,
    psi_id:fv('cfs_psi')||null,linked_contract_no:fv('cfs_contract'),
    linked_contract_id:_cfsSelC||null,remarks:fv('cfs_rem')
  };
  if(!id)data.id=uid('CFS');
  _cfsSelC=null;_reRenderFn=null;
  await saveRec('cfs_trucks',data,id||null);
}

function addStuffingRow(){_stuffContainers.push({container_no:'',seal_no:'',bags:'',stuffing_date:today(),tare_weight:'',is_part:false,remarks:''});document.getElementById('stf_containers_render').innerHTML=renderStuffingContainers();}

function updateStuffedBagsCalc(){
  const stuffed=_stuffContainers.reduce((s,c)=>s+(Number(c.bags)||0),0);
  const el=document.getElementById('stf_stuffedbags');
  if(el)el.textContent=fmtN(stuffed)+' bags';
  const rcv=parseInt(document.getElementById('stf_rcvbags')?.textContent)||0;
  const stock=rcv-stuffed;
  const sel=document.getElementById('stf_stockbags');
  if(sel){sel.textContent=fmtN(stock)+' bags';sel.style.color=stock>0?'var(--green)':'var(--red)';}
}
async function saveStuffing(id){
  const data={

    total_bags:parseInt(fv('stf_totbags'))||null,stock_at_cfs:fv('stf_stockmt')||null,
    remarks:fv('stf_rem')
  };
  if(!id)data.id=uid('STF');
  _stuffSelC=null;_stuffContainers=[];_reRenderFn=null;
  await saveRec('cfs_stuffing',data,id||null);
}

  const unpaid=rows.filter(r=>r.payment_status==='Unpaid'||r.payment_status==='Overdue').length;
  return`
  <div class="kgrid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi"><div class="klbl">Total Invoices</div><div class="kval" style="color:var(--blue)">${rows.length}</div></div>
    <div class="kpi"><div class="klbl">Total Value (USD)</div><div class="kval" style="color:var(--green);font-size:16px">$${fmt(totalVal)}</div></div>
    <div class="kpi"><div class="klbl">Pending Payment</div><div class="kval" style="color:var(--amber)">${unpaid}</div></div>
    <div class="kpi"><div class="klbl">Paid</div><div class="kval" style="color:var(--green)">${rows.filter(r=>r.payment_status==='Paid').length}</div></div>
  </div>
  <div class="sbar">
    <input placeholder="Search invoice no., buyer, contract…" value="${S.search||''}" oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderInvoices()">
    <button class="pri" onclick="openInvoiceModal()">+ New Invoice</button>
  </div>
  <div class="card">`+tbl(rows,
    ['Invoice No.','Date','Contract No.','Buyer','Commodity','Qty (MT)','Currency','Invoice Value','Containers','Cut-Off Date','Type','Payment Status','Actions'],
    r=>{
      let conts=[];try{conts=JSON.parse(r.containers||'[]');}catch(e){}
      return`<tr>
        <td><strong style="font-family:var(--mono);color:var(--blue)">${r.invoice_no||r.id}</strong></td>
        <td>${r.invoice_date||'—'}</td>
        <td><span class="mono" style="color:var(--green)">${r.contract_no||'—'}</span></td>
        <td>${r.buyer||'—'}</td>
        <td>${r.commodity||'—'}</td>
        <td class="mono">${fmtN(r.qty)}</td>
        <td>${r.currency||'USD'}</td>
        <td class="mono" style="font-weight:600;color:var(--green)">$${fmt(r.invoice_value)}</td>
        <td class="mono">${conts.length}</td>
        <td class="mono" style="color:${r.cutoff_date&&new Date(r.cutoff_date)<new Date()?'var(--red)':'var(--txt2)'}">${r.cutoff_date||'—'}</td>
        <td>${bdg(r.invoice_type||'Ex-Factory')}</td>
        <td>${bdg(r.payment_status||'Unpaid')}</td>
        <td><div class="acell">
          <button class="sm" onclick="openInvoiceModal('${r.id}')">Edit</button>
          <button class="sm" onclick="viewInvoiceDetail('${r.id}')">View</button>
          <button class="sm dan" onclick="delRec('invoices','${r.id}')">Del</button>
        </div></td>
      </tr>`;
    },
    'No invoices yet. Click + New Invoice to begin.'
  )+`</div>`;
}

function viewInvoiceDetail(id){
  const r=S.recs.invoices.find(o=>o.id===id);if(!r)return;
  let conts=[];try{conts=JSON.parse(r.containers||'[]');}catch(e){}
  let pl=[];try{pl=JSON.parse(r.packing_list||'[]');}catch(e){}
  const body=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div>
        <div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">Invoice No.</div>
        <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--blue)">${r.invoice_no||r.id}</div>
      </div>
      <div>
        <div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">Invoice Value</div>
        <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--green)">${r.currency||'USD'} ${fmt(r.invoice_value)}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
      <div class="kpi"><div class="klbl">Buyer</div><div style="font-size:13px;font-weight:500">${r.buyer||'—'}</div></div>
      <div class="kpi"><div class="klbl">Contract</div><div style="font-family:var(--mono);font-size:13px;font-weight:500;color:var(--green)">${r.contract_no||'—'}</div></div>
      <div class="kpi"><div class="klbl">Commodity</div><div style="font-size:13px;font-weight:500">${r.commodity||'—'}</div></div>
      <div class="kpi"><div class="klbl">Qty (MT)</div><div style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue)">${fmtN(r.qty)}</div></div>
      <div class="kpi"><div class="klbl">Cut-Off Date</div><div style="font-family:var(--mono);font-size:13px;font-weight:500;color:${r.cutoff_date&&new Date(r.cutoff_date)<new Date()?'var(--red)':'var(--txt)'}">${r.cutoff_date||'—'}</div></div>
      <div class="kpi"><div class="klbl">Payment Status</div><div>${bdg(r.payment_status||'Unpaid')}</div></div>
    </div>
    <div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Container & Seal Numbers (Packing List)</div>
    <div style="overflow-x:auto;margin-bottom:12px">
    <table>
      <thead><tr><th>#</th><th>Container No.</th><th>Seal No.</th><th>Port Entry Vehicle No.</th><th>No. of Bags</th><th>Net Wt (MT)</th><th>Gross Wt (MT)</th><th>Remarks</th></tr></thead>
      <tbody>${conts.map((c,i)=>`<tr>
        <td class="mono">${i+1}</td>
        <td class="mono" style="color:var(--blue)">${c.container_no||'—'}</td>
        <td class="mono" style="color:var(--amber)">${c.seal_no||'—'}</td>
        <td class="mono">${c.port_vehicle_no||'—'}</td>
        <td class="mono">${fmtN(c.bags)}</td>
        <td class="mono">${fmtN(c.net_weight)}</td>
        <td class="mono">${fmtN(c.gross_weight)}</td>
        <td style="font-size:11px;color:var(--txt3)">${c.remarks||'—'}</td>
      </tr>`).join('')||`<tr><td colspan="8" class="empty">No containers in packing list.</td></tr>`}
      </tbody>
    </table>
    </div>
    <div class="mac"><button onclick="closeModal()">Close</button><button class="pri" onclick="openInvoiceModal('${id}')">Edit</button></div>`;
  openModal(`<div class="modal lg"><h3>Invoice: ${r.invoice_no||r.id}</h3>${body}</div>`);
}

function openInvoiceModal(id){
  S._editIds.invoices=id||null;
  const r=id?S.recs.invoices.find(o=>o.id===id):{};
  const selCId=_invSelC||(id?r.linked_contract_id:null);
  _reRenderFn=()=>openInvoiceModal(id);
  if(id){try{_invContainers=JSON.parse(r.containers||'[]');}catch(e){_invContainers=[];}}
  else if(!_invContainers.length)_invContainers=[];

  const body=`
    ${contractQWin(selCId,'selInvoiceContract')}
    <div class="fg">
      ${msec('Invoice Details')}
      <div class="fgrp"><label>Linked Contract (auto)</label><input id="inv_contract" value="${r.contract_no||''}" readonly class="af" style="font-family:var(--mono)"></div>
      <div class="fgrp"><label>Invoice No.</label><input id="inv_no" value="${r.invoice_no||''}" placeholder="e.g. VAST/26-27/001" style="font-family:var(--mono)"></div>
      <div class="fgrp"><label>Invoice Date</label><input type="date" id="inv_date" value="${r.invoice_date||today()}"></div>
      <div class="fgrp"><label>Invoice Type</label><select id="inv_type">${sel(['Ex-Factory','CFS / Port Delivery'],r.invoice_type||'Ex-Factory')}</select></div>
      <div class="fgrp"><label>Buyer</label><input id="inv_buyer" value="${r.buyer||''}"></div>
      <div class="fgrp"><label>Exporter</label><input id="inv_exporter" value="${r.exporter||''}"></div>
      <div class="fgrp"><label>Commodity</label><input id="inv_comm" value="${r.commodity||''}"></div>
      <div class="fgrp"><label>Bag Marking</label><input id="inv_bmark" value="${r.bag_marking||''}"></div>
      ${msec('Pricing')}
      <div class="fgrp"><label>Quantity (MT)</label><input type="number" id="inv_qty" value="${r.qty||''}" oninput="calcInvoiceValue()"></div>
      <div class="fgrp"><label>Unit Price</label><input type="number" id="inv_price" value="${r.unit_price||''}" oninput="calcInvoiceValue()"></div>
      <div class="fgrp"><label>Currency</label><select id="inv_cur">${sel(['USD','EUR','GBP','INR','AED'],r.currency||'USD')}</select></div>
      <div class="fgrp"><label>Invoice Value (auto)</label><div id="inv_value_disp" style="padding:6px 9px;font-family:var(--mono);font-size:14px;font-weight:700;color:var(--green)">${r.invoice_value?'$'+fmt(r.invoice_value):'—'}</div></div>
      <input type="hidden" id="inv_value" value="${r.invoice_value||''}">
      ${msec('Dates & Status')}
      <div class="fgrp"><label>Cut-Off Date (Shipping Line)</label><input type="date" id="inv_cutoff" value="${r.cutoff_date||''}"></div>
      <div class="fgrp"><label>Payment Terms</label><input id="inv_pterm" value="${r.payment_terms||''}"></div>
      <div class="fgrp"><label>Delivery Terms</label><input id="inv_dterm" value="${r.delivery_terms||''}"></div>
      <div class="fgrp"><label>Payment Status</label><select id="inv_pstatus">${sel(['Unpaid','Partial','Paid','Overdue'],r.payment_status||'Unpaid')}</select></div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
      <div>
        <div style="font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em">Packing List — Container & Seal Numbers</div>
        <div style="font-size:10px;color:var(--txt3);margin-top:2px">One row per container. Port entry vehicle may differ from loading vehicle.</div>
      </div>
      <button class="suc sm" onclick="addInvContainer()">＋ Add Container</button>
    </div>
    <div id="inv_containers_render">${renderInvContainers()}</div>
    <div class="fg" style="margin-top:10px">
      <div class="fgrp full"><label>Remarks</label><textarea id="inv_rem">${r.remarks||''}</textarea></div>
    </div>`;
  openModal(mw(id?'Edit Invoice':'New Invoice & Packing List',body,id?`saveInvoice('${id}')`:'saveInvoice()',true));
  setTimeout(()=>calcInvoiceValue(),80);
}
function selInvoiceContract(id){
  _invSelC=id;
  const c=S.recs.orders.find(o=>o.id===id);
  if(c){
    af('inv_contract',c.contract_no||'');
    const b=document.getElementById('inv_buyer');if(b&&!b.value)b.value=c.buyer||'';
    const e=document.getElementById('inv_exporter');if(e&&!e.value)e.value=c.exporter||'';
    const cm=document.getElementById('inv_comm');if(cm&&!cm.value)cm.value=c.product||'';
    const bm=document.getElementById('inv_bmark');if(bm&&!bm.value)bm.value=c.bag_marking||'';
    const cu=document.getElementById('inv_cur');if(cu)cu.value=c.currency||'USD';
    const pr=document.getElementById('inv_price');if(pr&&!pr.value)pr.value=c.unit_price||'';
    setTimeout(()=>calcInvoiceValue(),50);
  }
  S.qSearch.contract='';
  openInvoiceModal(S._editIds.invoices);
}
function calcInvoiceValue(){
  const qty=parseFloat(document.getElementById('inv_qty')?.value)||0;
  const price=parseFloat(document.getElementById('inv_price')?.value)||0;
  const val=qty*price;
  const disp=document.getElementById('inv_value_disp');
  const hidden=document.getElementById('inv_value');
  if(disp)disp.textContent=val>0?'$'+fmt(val):'—';
  if(hidden)hidden.value=val||'';
}
function renderInvContainers(){
  if(!_invContainers.length)return`<div style="text-align:center;padding:14px;color:var(--txt3);font-size:12px;border:1px dashed var(--bdr);border-radius:7px">No containers in packing list yet. Click + Add Container.</div>`;
  const ICOLS='1.2fr 1fr 1fr 80px 90px 90px 90px 22px';
  return`<div style="overflow-x:auto">
  <div style="display:grid;grid-template-columns:${ICOLS};gap:4px;margin-bottom:3px">
    ${['Container No.','Seal No.','Port Entry Vehicle No.','Bags','Net Wt (MT)','Gross Wt (MT)','Tare Wt (MT)',''].map(h=>`<div class="col-hdr" style="font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;text-align:center">${h}</div>`).join('')}
  </div>
  ${_invContainers.map((c,i)=>`
    <div style="display:grid;grid-template-columns:${ICOLS};gap:4px;margin-bottom:4px;align-items:center">
      <input style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);color:var(--blue);width:100%" value="${c.container_no||''}" placeholder="TCKU1234567" oninput="updInvCont(${i},'container_no',this.value)">
      <input style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);color:var(--amber);width:100%" value="${c.seal_no||''}" placeholder="SEAL001" oninput="updInvCont(${i},'seal_no',this.value)">
      <input style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);width:100%" value="${c.port_vehicle_no||''}" placeholder="Port entry vehicle" oninput="updInvCont(${i},'port_vehicle_no',this.value)">
      <input type="number" style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);width:100%" value="${c.bags||''}" placeholder="0" oninput="updInvCont(${i},'bags',this.value)">
      <input type="number" step="0.001" style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);width:100%" value="${c.net_weight||''}" placeholder="0.000" oninput="updInvCont(${i},'net_weight',this.value)">
      <input type="number" step="0.001" style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);width:100%" value="${c.gross_weight||''}" placeholder="0.000" oninput="updInvCont(${i},'gross_weight',this.value)">
      <input type="number" step="0.001" style="background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;font-size:11px;font-family:var(--mono);width:100%" value="${c.tare_weight||''}" placeholder="0.000" oninput="updInvCont(${i},'tare_weight',this.value)">
      <button class="ghost xs" onclick="removeInvCont(${i})">✕</button>
    </div>`).join('')}
  <div style="margin-top:6px;font-size:11px;color:var(--txt3)">
    Containers: <strong style="color:var(--blue);font-family:var(--mono)">${_invContainers.length}</strong> ·
    Total bags: <strong style="color:var(--green);font-family:var(--mono)">${fmtN(_invContainers.reduce((s,c)=>s+(Number(c.bags)||0),0))}</strong> ·
    Total net wt: <strong style="color:var(--green);font-family:var(--mono)">${fmt(_invContainers.reduce((s,c)=>s+(Number(c.net_weight)||0),0))} MT</strong>
  </div>
  </div>`;
}
function addInvContainer(){_invContainers.push({container_no:'',seal_no:'',port_vehicle_no:'',bags:'',net_weight:'',gross_weight:'',tare_weight:''});document.getElementById('inv_containers_render').innerHTML=renderInvContainers();}
function removeInvCont(i){_invContainers.splice(i,1);document.getElementById('inv_containers_render').innerHTML=renderInvContainers();}
function updInvCont(i,f,v){if(_invContainers[i])_invContainers[i][f]=v;}
async function saveInvoice(id){
  calcInvoiceValue();
  const data={
    invoice_no:fv('inv_no')||null,invoice_date:fv('inv_date')||null,
    contract_no:fv('inv_contract'),linked_contract_id:_invSelC||null,
    buyer:fv('inv_buyer'),exporter:fv('inv_exporter'),commodity:fv('inv_comm'),
    bag_marking:fv('inv_bmark'),qty:fv('inv_qty')||null,unit_price:fv('inv_price')||null,
    currency:fv('inv_cur'),invoice_value:fv('inv_value')||null,
    payment_terms:fv('inv_pterm'),delivery_terms:fv('inv_dterm'),
    cutoff_date:fv('inv_cutoff')||null,invoice_type:fv('inv_type'),
    payment_status:fv('inv_pstatus'),
    containers:JSON.stringify(_invContainers),
    remarks:fv('inv_rem')
  };
  if(!id)data.id=uid('INV');
  _invSelC=null;_invContainers=[];_reRenderFn=null;
  await saveRec('invoices',data,id||null);
}


// ── Page registry ─────────────────────────────────────────
const pages={
  dashboard:{title:'Dashboard',render:renderDash},
  orders:{title:'Orders & Contracts',render:renderOrders},
  purchases:{title:'Raw Material Purchase',render:renderPurchases},
  containers:{title:'Container Bookings',render:renderContainers},
  transporters:{title:'Transporters & Plot',render:renderTransporters},
  loading:{title:'Loading Assignment',render:renderLoading},
  surveyor_ef:{title:'Surveyor Report — Ex-Factory',render:renderSurveyorEf},
  psi:{title:'PSI — Pre-Shipment Inspection',render:renderPsi},
  cfs_trucks:{title:'CFS Truck Dispatch & Receipt',render:renderCfsTrucks},
  cfs_stuffing:{title:'CFS Stuffing & Container Allocation',render:renderCfsStuffing},
  invoices:{title:'Invoice & Packing List',render:renderInvoices},
  customs:{title:'Customs & Documentation',render:()=>placeholderPage('Customs & Documentation','🛃','First check copy, LEO, Phyto, seal numbers, port entry vehicle numbers per container.')},
  shipping:{title:'Shipping & BL',render:()=>placeholderPage('Shipping & BL','🚢','BL copy receipt. Miscellaneous documents. Full document checklist per shipment.')},
  payments:{title:'Payment Tracking',render:()=>placeholderPage('Payment Tracking','💰','Bank negotiation, telex release, direct payment. Track per invoice.')},
  rates:{title:'Master Rates',render:renderRates},
  product_specs:{title:'Product Specs',render:renderProductSpecs},
};

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
renderAll();loadAll();
</script>
</body>
</html>
