<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExIm Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2335;--border:#2a2f45;--border2:#353c56;
  --text:#e8ecf4;--text2:#9aa5c4;--text3:#5a6484;
  --accent:#4f8ef7;--accent2:#3d7ae0;--green:#2ecc8a;--amber:#f5a623;--red:#e05555;--purple:#8b6cf7;
  --radius:10px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:218px;min-width:218px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo h1{font-size:14px;font-weight:600;letter-spacing:-.2px;color:var(--text)}
.logo p{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.nav-sec{padding:14px 12px 4px;font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-radius:7px;margin:1px 6px;font-size:12px;color:var(--text2);transition:all .15s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(79,142,247,.12);color:var(--accent);font-weight:500}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.db-pill{margin:8px 10px 4px;padding:6px 10px;border-radius:7px;background:rgba(46,204,138,.08);border:1px solid rgba(46,204,138,.2);font-size:10px;color:var(--green);font-family:var(--mono);display:flex;align-items:center;gap:6px}
.db-pill.err{background:rgba(224,85,85,.08);border-color:rgba(224,85,85,.2);color:var(--red)}
.db-pill.loading{background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.2);color:var(--amber)}
.pulse{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg)}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.topbar h2{font-size:15px;font-weight:600;letter-spacing:-.2px}
.pbadge{font-size:9px;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--text3);margin-left:8px;font-family:var(--mono)}
.content{padding:18px 20px;flex:1}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.kpi-lbl{font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.kpi-val{font-size:24px;font-weight:600;font-family:var(--mono);letter-spacing:-1px}
.kpi-val.blue{color:var(--accent)}.kpi-val.green{color:var(--green)}.kpi-val.red{color:var(--red)}.kpi-val.amber{color:var(--amber)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.card-ttl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;background:var(--surface2);font-weight:500;font-size:10px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--mono)}
.bg{background:rgba(46,204,138,.12);color:var(--green)}.bb{background:rgba(79,142,247,.12);color:var(--accent)}.ba{background:rgba(245,166,35,.12);color:var(--amber)}.br{background:rgba(224,85,85,.12);color:var(--red)}.bgr{background:var(--surface2);color:var(--text3)}.bpu{background:rgba(139,108,247,.12);color:var(--purple)}

/* BUTTONS */
button{cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:7px;padding:6px 12px;font-size:12px;font-family:var(--font);transition:all .15s}
button:hover{background:var(--border);color:var(--text)}
button.pri{background:var(--accent);color:#fff;border-color:transparent}
button.pri:hover{background:var(--accent2)}
button.danger{background:rgba(224,85,85,.12);color:var(--red);border-color:rgba(224,85,85,.2)}
button.danger:hover{background:rgba(224,85,85,.2)}
button.sm{padding:3px 8px;font-size:11px}
button.ghost{background:transparent;border-color:transparent;color:var(--text3)}
button.ghost:hover{color:var(--text);background:var(--surface2)}

/* SEARCH BAR */
.sbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.sbar input,.sbar select{max-width:240px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:12px;font-family:var(--font);color:var(--text);outline:none}
.sbar input:focus,.sbar select:focus{border-color:var(--accent)}
.sbar input::placeholder{color:var(--text3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:48px 16px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:600px;max-width:96vw;padding:22px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:18px;color:var(--text);letter-spacing:-.2px}
.modal-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgrp{display:flex;flex-direction:column;gap:4px}
.fgrp.full{grid-column:1/-1}
.fgrp.third{grid-column:span 1}
label{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.fgrp input,.fgrp select,.fgrp textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-family:var(--font);color:var(--text);width:100%;outline:none;transition:border .15s}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--accent)}
.fgrp select option{background:var(--surface2)}
textarea{resize:vertical;min-height:60px}
.mac{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}

/* HELPERS */
.acell{display:flex;gap:4px}
.dok{color:var(--green);font-weight:500}.dbad{color:var(--red);font-weight:500}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:12px;line-height:1.8}
.empty strong{display:block;font-size:14px;color:var(--text2);margin-bottom:4px}

/* CONTRACT PREVIEW CARD */
.preview-card{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.preview-card:hover{border-color:var(--accent)}
.preview-card.selected{border-color:var(--accent);background:rgba(79,142,247,.08)}
.preview-card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}
.preview-card-meta{font-size:11px;color:var(--text3);display:flex;flex-wrap:wrap;gap:8px}
.preview-card-meta span{background:var(--surface);padding:2px 6px;border-radius:4px}

/* GROUP SECTION */
.group-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.group-title{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:space-between}
.group-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.group-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}

/* SPINNER */
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:10px;font-size:12px;z-index:9999;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast.s{background:rgba(46,204,138,.12);border-color:rgba(46,204,138,.3);color:var(--green)}
.toast.e{background:rgba(224,85,85,.12);border-color:rgba(224,85,85,.3);color:var(--red)}
.toast.w{background:rgba(245,166,35,.12);border-color:rgba(245,166,35,.3);color:var(--amber)}
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-root"></div>

<script>
const SUPA_URL='https://wktdubbvddynyigxmoyb.supabase.co';
const SUPA_KEY='sb_publishable_-BjRXe1NkSTPQKQoRWDQVQ_Uu5CNZFX';
const {createClient}=supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

// ── Master state ──────────────────────────────────────────────────────────
let S={
  page:'dashboard',
  records:{orders:[],purchases:[],containers:[],transporters:[],loading:[],surveyor:[],customs:[],rates:[]},
  masters:{buyers:[],products:[],exporters:[],transporterNames:[]},
  modal:null,search:'',dbStatus:'loading'
};

// ── Utilities ─────────────────────────────────────────────────────────────
const fmt=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const fmtN=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN'):'—';
const fv=(id)=>{const e=document.getElementById(id);return e?e.value:'';}
const today=()=>new Date().toISOString().slice(0,10);
const fy=()=>{const y=new Date().getFullYear();const m=new Date().getMonth();return m>=3?`${y}-${String(y+1).slice(2)}`:String(y-1)+'-'+String(y).slice(2);}

function toast(msg,type='s'){
  const d=document.createElement('div');
  d.className=`toast ${type}`;d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),2800);
}

function bdg(v){
  const m={Confirmed:'bg',Pending:'ba',Cancelled:'br',Matched:'bg',Discrepancy:'br',Approved:'bb',Paid:'bg',Unpaid:'ba',Overdue:'br',Partial:'bpu','Booked':'bb',Yes:'bg',No:'br','Gate-In Done':'bg','LEO Received':'bb','Clearance Pending':'ba',Completed:'bg','In Transit':'bb',Assigned:'ba','Applied-Pending':'ba','Ready for Customs':'bg','Fumigation Done':'bb',Scheduled:'ba','In Progress':'bb',Passed:'bg',Failed:'br','Re-inspection':'ba'};
  return`<span class="badge ${m[v]||'bgr'}">${v||'—'}</span>`;
}

// ── DB helpers ────────────────────────────────────────────────────────────
async function loadTable(t){
  try{
    const{data,error}=await db.from(t).select('*').order('created_at',{ascending:false});
    if(error)throw error;
    S.records[t]=data||[];
  }catch(e){S.records[t]=[];console.warn(t,e.message);}
}

async function loadAll(){
  S.dbStatus='loading';renderSidebar();
  await Promise.all(Object.keys(S.records).map(t=>loadTable(t)));
  rebuildMasters();
  S.dbStatus='ok';renderAll();
}

function rebuildMasters(){
  S.masters.buyers=[...new Set(S.records.orders.map(o=>o.buyer).filter(Boolean))];
  S.masters.products=[...new Set(S.records.orders.map(o=>o.product).filter(Boolean))];
  S.masters.exporters=[...new Set(S.records.orders.map(o=>o.exporter).filter(Boolean))];
  S.masters.transporterNames=[...new Set(S.records.transporters.map(o=>o.transporter).filter(Boolean))];
}

async function saveRec(table,data,id){
  try{
    let res;
    if(id){res=await db.from(table).update(data).eq('id',id).select();}
    else{res=await db.from(table).insert(data).select();}
    if(res.error)throw res.error;
    await loadTable(table);
    rebuildMasters();
    renderAll();closeModal();toast('Saved successfully');
  }catch(e){toast('Error: '+e.message,'e');console.error(e);}
}

async function delRec(table,id){
  if(!confirm('Delete this record?'))return;
  try{
    const{error}=await db.from(table).delete().eq('id',id);
    if(error)throw error;
    await loadTable(table);renderAll();toast('Deleted','w');
  }catch(e){toast('Error: '+e.message,'e');}
}

// ── Navigation ────────────────────────────────────────────────────────────
function setPage(p){S.page=p;S.modal=null;S.search='';renderAll();}
function closeModal(){S.modal=null;document.getElementById('modal-root').innerHTML='';}
function openModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;}

// ── Form helpers ──────────────────────────────────────────────────────────
function mf(lbl,id,type='text',opts='',full=false,val=''){
  const cls='fgrp'+(full?' full':'');
  if(type==='select')return`<div class="${cls}"><label>${lbl}</label><select id="${id}">${opts}</select></div>`;
  if(type==='textarea')return`<div class="${cls}"><label>${lbl}</label><textarea id="${id}">${val||''}</textarea></div>`;
  return`<div class="${cls}"><label>${lbl}</label><input type="${type}" id="${id}" value="${(val||'').toString().replace(/"/g,'&quot;')}"></div>`;
}
function sel(opts,cur){return opts.map(o=>`<option value="${o}"${cur===o?' selected':''}>${o}</option>`).join('');}
function datalistField(lbl,id,listId,items,full=false,val=''){
  const cls='fgrp'+(full?' full':'');
  return`<div class="${cls}"><label>${lbl}</label><input id="${id}" list="${listId}" value="${(val||'').toString().replace(/"/g,'&quot;')}" autocomplete="off"><datalist id="${listId}">${items.map(i=>`<option value="${i}">`).join('')}</datalist></div>`;
}
function mw(title,fields,onSave){
  return`<div class="modal"><h3>${title}</h3>${fields}<div class="mac"><button onclick="closeModal()">Cancel</button><button class="pri" onclick="${onSave}">Save to Database</button></div></div>`;
}
function secHdr(txt){return`<div class="modal-section">${txt}</div>`;}

// ── Contract number generator ─────────────────────────────────────────────
function genContractNo(exporterName){
  if(!exporterName)return'';
  const words=exporterName.trim().split(/\s+/);
  const prefix=words.map(w=>w[0]).join('').toUpperCase().slice(0,4);
  const fy_str=fy().replace('-','-');
  const existing=S.records.orders.filter(o=>o.contract_no&&o.contract_no.startsWith(prefix+'/'));
  const seq=String(existing.length+1).padStart(3,'0');
  return`${prefix}/${fy_str}/${seq}`;
}

// ── Contract preview cards ────────────────────────────────────────────────
function pendingContractCards(selectedId,onSelect){
  const pending=S.records.orders.filter(o=>o.status==='Confirmed');
  if(!pending.length)return`<div style="color:var(--text3);font-size:12px;padding:8px 0">No confirmed contracts available.</div>`;
  return pending.map(o=>`
    <div class="preview-card${selectedId===o.id?' selected':''}" onclick="${onSelect}('${o.id}')">
      <div class="preview-card-title">${o.contract_no||o.id} — ${o.buyer||'—'}</div>
      <div class="preview-card-meta">
        <span>📦 ${o.product||'—'}</span>
        <span>⚖️ ${fmtN(o.qty)} MT</span>
        <span>💰 ${o.currency||'USD'} ${fmt(o.unit_price)}</span>
        <span>🏭 ${o.exporter||'—'}</span>
      </div>
    </div>`).join('');
}

function pendingBookingCards(selectedId,onSelect){
  const pending=S.records.containers.filter(c=>c.status==='Booked'||c.status==='Confirmed');
  if(!pending.length)return`<div style="color:var(--text3);font-size:12px;padding:8px 0">No pending bookings.</div>`;
  return pending.map(c=>`
    <div class="preview-card${selectedId===c.id?' selected':''}" onclick="${onSelect}('${c.id}')">
      <div class="preview-card-title">${c.booking_ref||c.id} — ${c.shipping_line||'—'}</div>
      <div class="preview-card-meta">
        <span>🚢 ${c.vessel||'—'}</span>
        <span>📦 ${c.num_containers||'?'} × ${c.container_type||'—'}</span>
        <span>📅 ETD: ${c.etd||'—'}</span>
        <span>🏷️ ${c.linked_contract_no||'—'}</span>
      </div>
    </div>`).join('');
}

function pendingPurchaseCards(selectedId,onSelect){
  const pending=S.records.purchases.filter(p=>Number(p.pending_qty||p.qty)>0);
  if(!pending.length)return`<div style="color:var(--text3);font-size:12px;padding:8px 0">No pending purchase lots.</div>`;
  return pending.map(p=>`
    <div class="preview-card${selectedId===p.id?' selected':''}" onclick="${onSelect}('${p.id}')">
      <div class="preview-card-title">${p.vendor||'—'} — ${p.commodity||'—'}</div>
      <div class="preview-card-meta">
        <span>⚖️ ${fmtN(p.pending_qty||p.qty)} MT pending</span>
        <span>🏷️ ${p.bag_marking||'—'}</span>
        <span>💰 ₹${fmt(p.price_inr)}/MT</span>
        <span>📋 ${p.linked_contract_no||'—'}</span>
      </div>
    </div>`).join('');
}

// ── NAV ───────────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',label:'Dashboard',color:'#4f8ef7'},
  {id:'orders',label:'Orders & Contracts',color:'#4f8ef7'},
  {id:'purchases',label:'Raw Material Purchase',color:'#f5a623'},
  {id:'containers',label:'Container Bookings',color:'#2ecc8a'},
  {id:'transporters',label:'Transporters & Plot',color:'#8b6cf7'},
  {id:'loading',label:'Loading Assignment',color:'#64748b'},
  {id:'surveyor',label:'Surveyor Report & Loading',color:'#06b6d4'},
  {id:'customs',label:'Customs & Port',color:'#e05555'},
  {id:'rates',label:'Master Rates',color:'#5a6484'},
];

function renderSidebar(){
  const el=document.getElementById('sidebar-nav');if(!el)return;
  const pill=S.dbStatus==='ok'
    ?`<div class="db-pill"><span class="pulse"></span>Live · Supabase</div>`
    :S.dbStatus==='loading'
    ?`<div class="db-pill loading"><span class="spin"></span>Connecting…</div>`
    :`<div class="db-pill err"><span class="pulse"></span>DB Error</div>`;
  el.innerHTML=pill+NAV.map(n=>`<div class="nav-item${S.page===n.id?' active':''}" onclick="setPage('${n.id}')"><span class="nav-dot" style="background:${n.color}"></span>${n.label}</div>`).join('');
}

function renderAll(){
  const root=document.getElementById('root');if(!root)return;
  const pc=pages[S.page]||pages.dashboard;
  const cnt=S.records[S.page];
  root.innerHTML=`
  <div class="app">
    <div class="sidebar">
      <div class="logo"><h1>ExIm Manager</h1><p>v2.0 · Supabase live</p></div>
      <div class="nav-sec">Modules</div>
      <div id="sidebar-nav"></div>
      <div style="margin-top:auto;padding:12px 10px 16px;border-top:1px solid var(--border)">
        <div style="font-size:9px;color:var(--text3);padding:0 6px;line-height:1.6">All data synced to cloud.<br>Shared across all users.</div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <h2>${pc.title}${Array.isArray(cnt)?`<span class="pbadge">${cnt.length}</span>`:''}</h2>
        <div style="display:flex;gap:6px">
          <button class="ghost sm" onclick="loadAll()">↻ Sync</button>
        </div>
      </div>
      <div class="content" id="ca">${pc.render()}</div>
    </div>
  </div>`;
  renderSidebar();
}

function tbl(rows,hdrs,rowFn,emsg){
  return`<div style="overflow-x:auto"><table><thead><tr>${hdrs.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(rowFn).join(''):`<tr><td colspan="${hdrs.length}"><div class="empty"><strong>No records yet</strong>${emsg}</div></td></tr>`}</tbody></table></div>`;
}

// ════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════
function renderDash(){
  const o=S.records.orders||[],p=S.records.purchases||[],c=S.records.containers||[],cu=S.records.customs||[];
  const conf=o.filter(x=>x.status==='Confirmed').length;
  const ttlCon=c.reduce((s,x)=>s+(Number(x.num_containers)||0),0);
  const pipeline=[

    <div class="fgrp"><label>Unit Price</label><input type="number" id="o_price" value="${r.unit_price||''}"></div>
    <div class="fgrp"><label>Payment Terms</label><input id="o_pterm" value="${r.payment_terms||''}"></div>

    <div class="fgrp"><label>Bag Type</label><select id="o_btype">${sel(bagTypes,r.bag_type||'PP Bag')}</select></div>
    <div class="fgrp full"><label>Remarks</label><textarea id="o_rem">${r.remarks||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit Contract':'New Contract',f,id?`saveOrder('${id}')`:'saveOrder()'));
  // auto-generate contract no when exporter changes
  setTimeout(()=>{
    const expEl=document.getElementById('o_exp');
    const cnoEl=document.getElementById('o_cno');
    if(expEl&&cnoEl&&!id){
      expEl.addEventListener('input',()=>{
        const v=expEl.value.trim();
        if(v){
          const words=v.split(/\s+/);
          const prefix=words.map(w=>w[0]).join('').toUpperCase().slice(0,4);
          const fy_str=fy();
          const existing=S.records.orders.filter(o=>o.contract_no&&o.contract_no.startsWith(prefix+'/'));
          cnoEl.value=`${prefix}/${fy_str}/${String(existing.length+1).padStart(3,'0')}`;
        }
      });
    }
  },100);
}

  const c=S.records.containers.find(o=>o.id===id);
  if(c){
    const br=document.getElementById('t_booking');
    const oid=document.getElementById('t_order');
    if(br)br.value=c.booking_ref||'';
    if(oid)oid.value=c.linked_contract_no||'';
    const nc=document.getElementById('t_num');
    if(nc&&!nc.value)nc.value=c.num_containers||1;
    document.querySelectorAll('.preview-card').forEach(el=>{
      el.classList.remove('selected');
      if(el.getAttribute('onclick')&&el.getAttribute('onclick').includes(id))el.classList.add('selected');
    });
  }
}

    ${secHdr('Port Entry')}
    <div class="fgrp"><label>LEO Copy No.</label><input id="cu_leo" value="${r.leo_copy_no||''}"></div>
    <div class="fgrp"><label>LEO Date</label><input type="date" id="cu_leodate" value="${r.leo_date||''}"></div>
    <div class="fgrp"><label>Gate-In Date</label><input type="date" id="cu_gatein" value="${r.gate_in_date||''}"></div>
    <div class="fgrp"><label>Seal No.</label><input id="cu_seal" value="${r.seal_no||''}"></div>
    <div class="fgrp"><label>Gate Pass No.</label><input id="cu_gatepass" value="${r.gate_pass_no||''}"></div>
    <div class="fgrp"><label>Port Name</label><input id="cu_port" value="${r.port_name||''}"></div>
    <div class="fgrp"><label>Berth / Terminal</label><input id="cu_berth" value="${r.berth_terminal||''}"></div>
    <div class="fgrp"><label>Status</label><select id="cu_status">${sel(['Clearance Pending','LEO Received','Gate-In Done','Loaded on Vessel'],r.status||'Clearance Pending')}</select></div>
    <div class="fgrp full"><label>Remarks</label><textarea id="cu_rem">${r.remarks||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit Customs':'Customs & Port Entry',f,id?`saveCustoms('${id}')`:'saveCustoms()'));
}
async function saveCustoms(id){
  const data={entry_date:fv('cu_date')||null,container_no:fv('cu_cno'),order_id:fv('cu_order')||null,clearing_agent:fv('cu_agent'),customs_entry_no:fv('cu_entry'),clearance_date:fv('cu_cdate')||null,leo_copy_no:fv('cu_leo'),leo_date:fv('cu_leodate')||null,gate_in_date:fv('cu_gatein')||null,seal_no:fv('cu_seal'),gate_pass_no:fv('cu_gatepass'),port_name:fv('cu_port'),berth_terminal:fv('cu_berth'),status:fv('cu_status'),remarks:fv('cu_rem')};
  if(!id)data.id='CUS-'+Date.now().toString(36).toUpperCase();
  await saveRec('customs',data,id||null);
}

// ════════════════════════════════════════════════════════════
// H. MASTER RATES
// ════════════════════════════════════════════════════════════
function renderRates(){
  const rows=(S.records.rates||[]).filter(r=>!S.search||r.category?.toLowerCase().includes(S.search.toLowerCase())||r.provider?.toLowerCase().includes(S.search.toLowerCase()));
  return`<div class="sbar"><input placeholder="Filter category, provider…" value="${S.search||''}" oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderRates()"><button class="pri" onclick="openRateModal()">+ Add Rate</button></div>`+
  `<div class="card">`+tbl(rows,['Category','Provider / Route','Description','Rate','Unit','Effective From','Remarks','Actions'],r=>`<tr>
    <td><span class="badge bb">${r.category||'—'}</span></td>
    <td><strong>${r.provider||'—'}</strong></td>
    <td>${r.description||'—'}</td>
    <td style="font-family:var(--mono);color:var(--green)">${fmt(r.rate)}</td>
    <td>${r.unit||'—'}</td>
    <td>${r.effective_from||'—'}</td>
    <td style="color:var(--text3)">${r.remarks||'—'}</td>
    <td><div class="acell"><button class="sm" onclick="openRateModal('${r.id}')">Edit</button><button class="sm danger" onclick="delRec('rates','${r.id}')">Del</button></div></td>
  </tr>`,'No rates defined yet.')+`</div>`;
}
function openRateModal(id){
  const r=id?(S.records.rates||[]).find(o=>o.id===id):{};
  const f=`<div class="fg">
    <div class="fgrp"><label>Category</label><select id="r_cat">${sel(['Freight','Transporter','Clearing','Phyto','Fumigation','Plot Charges','Survey'],r.category||'Freight')}</select></div>
    <div class="fgrp"><label>Provider / Route</label><input id="r_prov" value="${r.provider||''}"></div>
    <div class="fgrp full"><label>Description</label><input id="r_desc" value="${r.description||''}"></div>
    <div class="fgrp"><label>Rate</label><input type="number" id="r_rate" value="${r.rate||''}"></div>
    <div class="fgrp"><label>Unit</label><input id="r_unit" value="${r.unit||'per container'}"></div>
    <div class="fgrp"><label>Effective From</label><input type="date" id="r_from" value="${r.effective_from||today()}"></div>
    <div class="fgrp full"><label>Remarks</label><textarea id="r_rem">${r.remarks||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit Rate':'Add Rate',f,id?`saveRate('${id}')`:'saveRate()'));
}
async function saveRate(id){
  const data={category:fv('r_cat'),provider:fv('r_prov'),description:fv('r_desc'),rate:fv('r_rate')||null,unit:fv('r_unit'),effective_from:fv('r_from')||null,remarks:fv('r_rem')};
  if(!id)data.id='RATE-'+Date.now().toString(36).toUpperCase();
  await saveRec('rates',data,id||null);
}

// ── Page registry ─────────────────────────────────────────────────────────
const pages={
  dashboard:{title:'Dashboard',render:renderDash},
  orders:{title:'Orders & Contracts',render:renderOrders},
  purchases:{title:'Raw Material Purchase',render:renderPurchases},
  containers:{title:'Container Bookings',render:renderContainers},
  transporters:{title:'Transporters & Plot Charges',render:renderTransporters},
  loading:{title:'Loading Assignment',render:renderLoading},
  surveyor:{title:'Surveyor Report & Loading',render:renderSurveyor},
  customs:{title:'Customs & Port Entry',render:renderCustoms},
  rates:{title:'Master Rates',render:renderRates},
};

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
renderAll();
loadAll();
</script>
</body>
</html>
