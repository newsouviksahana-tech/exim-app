<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExIm Manager v3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0d1117;--surf:#161b27;--surf2:#1c2235;--surf3:#222840;
  --bdr:#2a3050;--bdr2:#353d5c;
  --txt:#e2e8f0;--txt2:#8892b0;--txt3:#4a5580;
  --blue:#4f9cf9;--blue2:#3b82f6;--green:#34d399;--amber:#fbbf24;--red:#f87171;--purple:#a78bfa;--cyan:#22d3ee;
  --r:10px;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surf)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

/* APP SHELL */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:18px 16px 12px;border-bottom:1px solid var(--bdr)}
.logo h1{font-size:14px;font-weight:700;letter-spacing:-.3px}
.logo p{font-size:10px;color:var(--txt3);margin-top:3px;font-family:var(--mono)}
.nav-sec{padding:14px 12px 3px;font-size:9px;font-weight:600;color:var(--txt3);letter-spacing:.12em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-radius:7px;margin:1px 6px;font-size:12px;color:var(--txt2);transition:all .12s}
.nav-item:hover{background:var(--surf2);color:var(--txt)}
.nav-item.active{background:rgba(79,156,249,.13);color:var(--blue);font-weight:600}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.db-pill{margin:8px 10px 4px;padding:6px 10px;border-radius:7px;font-size:10px;font-family:var(--mono);display:flex;align-items:center;gap:6px;border:1px solid}
.db-ok{background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.2);color:var(--green)}
.db-err{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.2);color:var(--red)}
.db-load{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.2);color:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:11px;height:11px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:15px;font-weight:600;letter-spacing:-.2px}
.pbadge{font-size:9px;padding:2px 7px;border-radius:20px;background:var(--surf2);color:var(--txt3);margin-left:8px;font-family:var(--mono)}
.content{flex:1;overflow-y:auto;padding:16px 18px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px}
.kpi-lbl{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:700;font-family:var(--mono);letter-spacing:-1px}
.blue{color:var(--blue)}.green{color:var(--green)}.amber{color:var(--amber)}.red{color:var(--red)}

/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.card-ttl{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;background:var(--surf2);font-weight:500;font-size:10px;color:var(--txt3);border-bottom:1px solid var(--bdr);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:7px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.018)}
.mono{font-family:var(--mono);font-size:11px}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--mono)}
.bg{background:rgba(52,211,153,.1);color:var(--green)}
.bb{background:rgba(79,156,249,.1);color:var(--blue)}
.ba{background:rgba(251,191,36,.1);color:var(--amber)}
.br{background:rgba(248,113,113,.1);color:var(--red)}
.bp{background:rgba(167,139,250,.1);color:var(--purple)}
.bc{background:rgba(34,211,238,.1);color:var(--cyan)}
.bgr{background:var(--surf2);color:var(--txt3)}

/* BUTTONS */
button{cursor:pointer;border:1px solid var(--bdr2);background:var(--surf2);color:var(--txt2);border-radius:7px;padding:6px 12px;font-size:12px;font-family:var(--font);transition:all .12s;white-space:nowrap}
button:hover{background:var(--bdr);color:var(--txt)}
button.pri{background:var(--blue);color:#fff;border-color:transparent;font-weight:500}
button.pri:hover{background:var(--blue2)}
button.danger{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.2)}
button.danger:hover{background:rgba(248,113,113,.2)}
button.success{background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.2)}
button.success:hover{background:rgba(52,211,153,.2)}
button.sm{padding:3px 9px;font-size:11px}
button.ghost{background:transparent;border-color:transparent;color:var(--txt3)}
button.ghost:hover{background:var(--surf2);color:var(--txt)}

/* SEARCH BAR */
.sbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.sbar input,.sbar select{background:var(--surf);border:1px solid var(--bdr);border-radius:7px;padding:6px 10px;font-size:12px;font-family:var(--font);color:var(--txt);outline:none;max-width:260px}
.sbar input:focus,.sbar select:focus{border-color:var(--blue)}
.sbar input::placeholder{color:var(--txt3)}

/* MAIN MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow-y:auto;backdrop-filter:blur(6px)}
.modal{background:var(--surf);border:1px solid var(--bdr2);border-radius:14px;width:640px;max-width:96vw;padding:24px;max-height:90vh;overflow-y:auto}
.modal-lg{width:820px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:18px;letter-spacing:-.2px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fgrp{display:flex;flex-direction:column;gap:4px}
.fgrp.full{grid-column:1/-1}
.fgrp.third{grid-column:span 1}
label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.fgrp input,.fgrp select,.fgrp textarea{background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;padding:7px 10px;font-size:12px;font-family:var(--font);color:var(--txt);width:100%;outline:none;transition:border .12s}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--blue)}
.fgrp input.auto-filled{border-color:rgba(52,211,153,.4);color:var(--green)}
.fgrp select option{background:var(--surf2)}
textarea{resize:vertical;min-height:58px}
.mac{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--bdr)}
.sec{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;padding:14px 0 8px;border-bottom:1px solid var(--bdr);margin-bottom:12px;grid-column:1/-1}

/* QUERY WINDOW (popup within modal) */
.qwin{background:var(--surf2);border:1px solid var(--bdr2);border-radius:10px;padding:14px;margin-bottom:14px}
.qwin-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.qwin-title{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.08em}
.qwin-search{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;font-size:11px;font-family:var(--font);color:var(--txt);outline:none;width:200px}
.qwin-search::placeholder{color:var(--txt3)}
.qwin-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.qcard{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .12s}
.qcard:hover{border-color:var(--blue);background:rgba(79,156,249,.06)}
.qcard.selected{border-color:var(--green);background:rgba(52,211,153,.06)}
.qcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.qcard-id{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--blue)}
.qcard-status{font-size:10px}
.qcard-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.qcard-tag{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--txt2)}
.qcard-tag.hi{color:var(--amber)}
.selected-pill{display:flex;align-items:center;gap:8px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);border-radius:7px;padding:7px 12px;margin-top:8px}
.selected-pill-txt{font-size:12px;color:var(--green);font-weight:500;flex:1}
.selected-pill button{padding:2px 8px;font-size:10px}

/* GROUPS */
.groups-wrap{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.group-box{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.group-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surf3);border-bottom:1px solid var(--bdr)}
.group-hdr-left{display:flex;align-items:center;gap:8px}
.group-num{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.group-name{font-size:12px;font-weight:600;color:var(--txt)}
.group-meta{font-size:10px;color:var(--txt3);margin-top:1px}
.group-body{padding:14px}
.group-rows{display:flex;flex-direction:column;gap:8px}
.container-row{display:grid;grid-template-columns:1fr 1fr 80px 1fr 1fr 1fr 1fr 80px 28px;gap:6px;align-items:center}
.container-row input,.container-row select{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;font-size:11px;font-family:var(--font);color:var(--txt);width:100%;outline:none}
.container-row input:focus,.container-row select:focus{border-color:var(--blue)}
.container-row input.auto{border-color:rgba(52,211,153,.3);color:var(--green)}
.cr-lbl{font-size:9px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;text-align:center}
.cr-hdrs{display:grid;grid-template-columns:1fr 1fr 80px 1fr 1fr 1fr 1fr 80px 28px;gap:6px;margin-bottom:4px}
.add-row-btn{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--blue);cursor:pointer;padding:4px 0}
.add-row-btn:hover{color:var(--green)}
.vendor-select-btn{background:var(--surf3);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--txt2);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .12s;text-align:left;width:100%}
.vendor-select-btn:hover{border-color:var(--blue);color:var(--txt)}
.vendor-select-btn.filled{border-color:rgba(52,211,153,.3);color:var(--green)}

/* MISC */
.acell{display:flex;gap:4px}
.dok{color:var(--green);font-weight:500}
.dbad{color:var(--red);font-weight:500}
.empty{text-align:center;padding:36px;color:var(--txt3);line-height:1.8}
.empty strong{display:block;font-size:14px;color:var(--txt2);margin-bottom:4px}
.divider{height:1px;background:var(--bdr);margin:14px 0}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:10px;font-size:12px;z-index:9999;font-weight:500;box-shadow:0 4px 24px rgba(0,0,0,.5);border:1px solid;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.t-s{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:var(--green)}
.t-e{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red)}
.t-w{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--amber)}
</style>
</head>
<body>
<div id="root"></div>
<div id="mroot"></div>

<script>
const SUPA_URL='https://wktdubbvddynyigxmoyb.supabase.co';
const SUPA_KEY='sb_publishable_-BjRXe1NkSTPQKQoRWDQVQ_Uu5CNZFX';
const{createClient}=supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

// ── State ──────────────────────────────────────────────────
let S={
  page:'dashboard',
  recs:{orders:[],purchases:[],containers:[],transporters:[],loading:[],surveyor:[],customs:[],rates:[]},
  masters:{buyers:[],products:[],exporters:[],transporters:[]},
  dbStatus:'loading',
  search:'',
  // modal temp state
  sel:{contract:null,booking:null,assignment:null,vendor1:null,vendor2:null},
  groups:[],           // loading groups
  qSearch:{contract:'',booking:'',assignment:'',vendor:''},
};

// ── DB ─────────────────────────────────────────────────────
async function loadTable(t){
  try{const{data,error}=await db.from(t).select('*').order('created_at',{ascending:false});
    if(error)throw error;S.recs[t]=data||[];}
  catch(e){S.recs[t]=[];console.warn(t,e.message);}
}
async function loadAll(){
  S.dbStatus='loading';renderSidebar();
  await Promise.all(Object.keys(S.recs).map(t=>loadTable(t)));
  rebuildMasters();S.dbStatus='ok';renderAll();
}
function rebuildMasters(){
  S.masters.buyers=[...new Set(S.recs.orders.map(o=>o.buyer).filter(Boolean))];
  S.masters.products=[...new Set(S.recs.orders.map(o=>o.product).filter(Boolean))];
  S.masters.exporters=[...new Set(S.recs.orders.map(o=>o.exporter).filter(Boolean))];
  S.masters.transporters=[...new Set(S.recs.transporters.map(o=>o.transporter).filter(Boolean))];
}
async function saveRec(table,data,id){
  try{
    let res=id?await db.from(table).update(data).eq('id',id).select():await db.from(table).insert(data).select();
    if(res.error)throw res.error;
    await loadTable(table);rebuildMasters();renderAll();closeModal();toast('Saved');
  }catch(e){toast(e.message,'e');console.error(e);}
}
async function delRec(table,id){
  if(!confirm('Delete this record?'))return;
  try{const{error}=await db.from(table).delete().eq('id',id);
    if(error)throw error;await loadTable(table);renderAll();toast('Deleted','w');}
  catch(e){toast(e.message,'e');}
}

// ── Helpers ────────────────────────────────────────────────
const today=()=>new Date().toISOString().slice(0,10);
const fy=()=>{const y=new Date().getFullYear(),m=new Date().getMonth();return m>=3?`${y}-${String(y+1).slice(2)}`:`${y-1}-${String(y).slice(2)}`;}
const fmt=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const fmtN=(n)=>n!=null&&n!==''?Number(n).toLocaleString('en-IN'):'—';
const fv=(id)=>{const e=document.getElementById(id);return e?e.value:'';}
const uid=(p)=>`${p}-${Date.now().toString(36).toUpperCase()}`;

function toast(msg,type='s'){
  const d=document.createElement('div');
  d.className=`toast t-${type}`;d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),2600);
}
function bdg(v){
  const m={Confirmed:'bg',Pending:'ba',Cancelled:'br',Matched:'bg',Discrepancy:'br',Approved:'bb',Paid:'bg',Unpaid:'ba',Overdue:'br','Booked':'bb',Yes:'bg',No:'br','Gate-In Done':'bg','LEO Received':'bb','Clearance Pending':'ba',Completed:'bg','In Transit':'bb',Assigned:'ba','Applied-Pending':'ba','Ready for Customs':'bg',Scheduled:'ba','In Progress':'bb',Passed:'bg',Failed:'br','Re-inspection':'ba','Partial':'bp'};
  return`<span class="badge ${m[v]||'bgr'}">${v||'—'}</span>`;
}
function setPage(p){S.page=p;S.search='';renderAll();}
function closeModal(){document.getElementById('mroot').innerHTML='';}
function openModal(html){document.getElementById('mroot').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;}
function mf(lbl,id,type='text',opts='',full=false,val='',cls=''){
  const c='fgrp'+(full?' full':'');
  if(type==='select')return`<div class="${c}"><label>${lbl}</label><select id="${id}" class="${cls}">${opts}</select></div>`;
  if(type==='textarea')return`<div class="${c}"><label>${lbl}</label><textarea id="${id}" class="${cls}">${val||''}</textarea></div>`;
  return`<div class="${c}"><label>${lbl}</label><input type="${type}" id="${id}" value="${(val||'').toString().replace(/"/g,'&quot;')}" class="${cls}"></div>`;
}
function sel(opts,cur){return opts.map(o=>`<option value="${o}"${cur===o?' selected':''}>${o}</option>`).join('');}
function dlf(lbl,id,lid,items,full=false,val=''){
  const c='fgrp'+(full?' full':'');
  return`<div class="${c}"><label>${lbl}</label><input id="${id}" list="${lid}" value="${(val||'').replace(/"/g,'&quot;')}" autocomplete="off"><datalist id="${lid}">${items.map(i=>`<option value="${i}">`).join('')}</datalist></div>`;
}
function sec(t){return`<div class="sec">${t}</div>`;}
function mw(title,body,onSave,lg=false){
  return`<div class="modal${lg?' modal-lg':''}"><h3>${title}</h3>${body}<div class="mac"><button onclick="closeModal()">Cancel</button><button class="pri" onclick="${onSave}">Save to Database</button></div></div>`;
}

// ── Contract number generator ──────────────────────────────
function genContractNo(exp){
  if(!exp)return'';
  const pfx=exp.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,4);
  const existing=S.recs.orders.filter(o=>o.contract_no&&o.contract_no.startsWith(pfx+'/'));
  return`${pfx}/${fy()}/${String(existing.length+1).padStart(3,'0')}`;
}

// ═══════════════════════════════════════════════════════════
// QUERY WINDOWS — reusable popup pickers
// ═══════════════════════════════════════════════════════════

// Contract query window (pending/confirmed contracts)
function contractQueryWindow(selectedId, onSelectFn, filterStatus='Confirmed'){
  const q=S.qSearch.contract||'';
  const list=S.recs.orders.filter(o=>(filterStatus==='all'||o.signed_contract==='Yes')&&
    (!q||[o.contract_no,o.buyer,o.product,o.exporter].join(' ').toLowerCase().includes(q.toLowerCase())));
  const selObj=selectedId?S.recs.orders.find(o=>o.id===selectedId):null;
  return`
  <div class="qwin">
    <div class="qwin-hdr">
      <span class="qwin-title">📋 Select Pending Contract</span>
      <input class="qwin-search" placeholder="Search contract, buyer, product…" value="${q}"
        oninput="S.qSearch.contract=this.value;refreshQWin()">
    </div>
    <div class="qwin-list" id="qwin-contract">
      ${list.length?list.map(o=>`
        <div class="qcard${selectedId===o.id?' selected':''}" onclick="${onSelectFn}('${o.id}')">
          <div class="qcard-top">
            <span class="qcard-id">${o.contract_no||o.id}</span>
            ${bdg(o.signed_contract==='Yes'?'Confirmed':'Pending')}
          </div>
          <div class="qcard-row">
            <span class="qcard-tag">👤 ${o.buyer||'—'}</span>
            <span class="qcard-tag">🏭 ${o.exporter||'—'}</span>
            <span class="qcard-tag hi">📦 ${o.product||'—'}</span>
            <span class="qcard-tag">⚖️ ${fmtN(o.qty)} MT</span>
            <span class="qcard-tag hi">${o.currency||'USD'} ${fmt(o.unit_price)}</span>
            <span class="qcard-tag">📅 ${o.contract_date||'—'}</span>
          </div>
        </div>`).join(''):`<div class="empty">No confirmed contracts found.</div>`}
    </div>
    ${selObj?`<div class="selected-pill"><span class="selected-pill-txt">✓ Selected: ${selObj.contract_no||selObj.id} — ${selObj.buyer||'—'} · ${selObj.product||'—'}</span><button class="sm danger" onclick="${onSelectFn}(null)">Clear</button></div>`:''}
  </div>`;
}

// Booking query window (pending container bookings)
function bookingQueryWindow(selectedId, onSelectFn){
  const q=S.qSearch.booking||'';
  const list=S.recs.containers.filter(c=>(c.status==='Booked'||c.status==='Confirmed')&&

// GROUPS STATE (for loading assignment)
// ═══════════════════════════════════════════════════════════
// S.groups = array of groups, each group = {id, name, rows:[{containerId,vehicleId,qty,from,to,vendor,bagMarking,surveyor,rate,purchaseId}]}

function initGroups(existingData){
  if(existingData&&existingData.groups){
    try{S.groups=JSON.parse(existingData.groups);}catch(e){S.groups=[];}
  } else {S.groups=[];}
}

function addGroup(){
  S.groups.push({id:uid('GRP'),name:`Group ${S.groups.length+1}`,rows:[]});
  openLoadingModal(S._editingLoadId);
}
function removeGroup(gi){
  S.groups.splice(gi,1);
  openLoadingModal(S._editingLoadId);
}
function addRowToGroup(gi){
  S.groups[gi].rows.push({containerId:'',vehicleId:'',qty:'',from:'',to:'',vendor:'',bagMarking:'',surveyor:'',rate:'',purchaseId:''});
  openLoadingModal(S._editingLoadId);
}
function removeRowFromGroup(gi,ri){
  S.groups[gi].rows.splice(ri,1);
  openLoadingModal(S._editingLoadId);
}
function updateGroupRow(gi,ri,field,val){
  if(S.groups[gi]&&S.groups[gi].rows[ri])S.groups[gi].rows[ri][field]=val;
}
function selectVendorForRow(purchaseId, rowIdx){
  // rowIdx encodes gi*1000+ri
  const gi=Math.floor(rowIdx/1000),ri=rowIdx%1000;
  const p=S.recs.purchases.find(x=>x.id===purchaseId);
  if(p&&S.groups[gi]&&S.groups[gi].rows[ri]){
    S.groups[gi].rows[ri].vendor=p.vendor||'';
    S.groups[gi].rows[ri].bagMarking=p.bag_marking||'';
    S.groups[gi].rows[ri].purchaseId=purchaseId;
  }
  openLoadingModal(S._editingLoadId);
}
function openVendorPicker(gi,ri){
  const rowIdx=gi*1000+ri;
  S.qSearch.vendor='';
  document.getElementById('mroot').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeVendorQWin()">${vendorQueryWindow(S.groups[gi]?.rows[ri]?.purchaseId,'selectVendorForRow',rowIdx)}</div>`;
}

function renderGroups(){
  if(!S.groups.length)return`<div style="color:var(--txt3);font-size:12px;padding:8px 0;text-align:center">No groups yet. Click "Add Group" to create one.</div>`;
  return`<div class="groups-wrap">${S.groups.map((g,gi)=>`
    <div class="group-box">
      <div class="group-hdr">
        <div class="group-hdr-left">
          <div class="group-num">${gi+1}</div>
          <div>
            <div class="group-name"><input style="background:transparent;border:none;color:var(--txt);font-size:12px;font-weight:600;font-family:var(--font);width:200px;outline:none" value="${g.name}" oninput="S.groups[${gi}].name=this.value"></div>
            <div class="group-meta">${g.rows.length} container row${g.rows.length!==1?'s':''} · Total: ${fmtN(g.rows.reduce((s,r)=>s+(Number(r.qty)||0),0))} MT</div>
          </div>
        </div>
        <button class="sm danger" onclick="removeGroup(${gi})">Remove Group</button>
      </div>
      <div class="group-body">
        <div class="cr-hdrs">
          ${['Container No.','Vehicle No.','Qty (MT)','From','To','Vendor (auto)','Bag Marking (auto)','Surveyor / Rate',''].map(h=>`<div class="cr-lbl">${h}</div>`).join('')}
        </div>
        <div class="group-rows">
          ${g.rows.map((r,ri)=>`
            <div class="container-row">
              <input placeholder="TCKU123456-7" value="${r.containerId||''}" oninput="updateGroupRow(${gi},${ri},'containerId',this.value)">
              <input placeholder="TN01AB1234" value="${r.vehicleId||''}" oninput="updateGroupRow(${gi},${ri},'vehicleId',this.value)">
              <input type="number" placeholder="0.000" value="${r.qty||''}" oninput="updateGroupRow(${gi},${ri},'qty',this.value)">
              <input placeholder="Vendor location" value="${r.from||''}" oninput="updateGroupRow(${gi},${ri},'from',this.value)">
              <input placeholder="Port / CFS" value="${r.to||''}" oninput="updateGroupRow(${gi},${ri},'to',this.value)">
              <button class="vendor-select-btn${r.vendor?' filled':''}" onclick="openVendorPicker(${gi},${ri})">${r.vendor||'+ Select Vendor'}</button>
              <input placeholder="Bag marking" value="${r.bagMarking||''}" class="${r.bagMarking?'auto':''}" oninput="updateGroupRow(${gi},${ri},'bagMarking',this.value)">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
                <input placeholder="Surveyor" value="${r.surveyor||''}" oninput="updateGroupRow(${gi},${ri},'surveyor',this.value)">
                <input type="number" placeholder="Rate" value="${r.rate||''}" oninput="updateGroupRow(${gi},${ri},'rate',this.value)">
              </div>
              <button class="sm danger ghost" onclick="removeRowFromGroup(${gi},${ri})">✕</button>
            </div>`).join('')}
        </div>
        <div class="add-row-btn" onclick="addRowToGroup(${gi})">＋ Add container row to this group</div>
      </div>
    </div>`).join('')}</div>`;
}

function openOrderModal(id){
  const r=id?(S.recs.orders||[]).find(o=>o.id===id):{};
  const currencies=['USD','EUR','GBP','INR','AED','SGD','JPY'];
  const bagTypes=['PP Bag','Jute Bag','HDPE Bag','Paper Bag','Bulk','Other'];
  const body=`<div class="fg">
    ${sec('Contract Details')}
    ${dlf('Exporter / Seller Name','o_exp','o_exp_dl',S.masters.exporters,false,r.exporter||'')}
    <div class="fgrp"><label>Contract Number (auto-generated)</label><input id="o_cno" value="${r.contract_no||''}" style="font-family:var(--mono);color:var(--blue)"></div>
    <div class="fgrp"><label>Contract Date</label><input type="date" id="o_date" value="${r.contract_date||today()}"></div>
    <div class="fgrp"><label>Signed Contract Received?</label><select id="o_signed">${sel(['No','Yes','Pending'],r.signed_contract||'No')}</select></div>
    ${sec('Buyer Details')}
    ${dlf('Buyer Name','o_buyer','o_buyer_dl',S.masters.buyers,false,r.buyer||'')}
    <div class="fgrp"><label>Buyer Port</label><input id="o_bport" value="${r.buyer_port||''}"></div>
    ${sec('Product & Pricing')}
    ${dlf('Product','o_prod','o_prod_dl',S.masters.products,false,r.product||'')}
    <div class="fgrp"><label>Quantity (MT)</label><input type="number" id="o_qty" value="${r.qty||''}"></div>
    <div class="fgrp"><label>Currency</label><select id="o_cur">${sel(currencies,r.currency||'USD')}</select></div>
    <div class="fgrp"><label>Unit Price</label><input type="number" id="o_price" value="${r.unit_price||''}"></div>
    <div class="fgrp"><label>Payment Terms</label><input id="o_pterm" value="${r.payment_terms||''}"></div>
    <div class="fgrp"><label>Delivery Terms</label><input id="o_dterm" value="${r.delivery_terms||''}"></div>
    ${sec('Packing')}
    <div class="fgrp"><label>Bag Marking</label><input id="o_bmark" value="${r.bag_marking||''}"></div>
    <div class="fgrp"><label>Bag Type</label><select id="o_btype">${sel(bagTypes,r.bag_type||'PP Bag')}</select></div>
    <div class="fgrp full"><label>Remarks</label><textarea id="o_rem">${r.remarks||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit Contract':'New Contract',body,id?`saveOrder('${id}')`:'saveOrder()'));
  setTimeout(()=>{
    const expEl=document.getElementById('o_exp');
    const cnoEl=document.getElementById('o_cno');
    if(expEl&&cnoEl&&!id){
      expEl.addEventListener('input',()=>{
        const v=expEl.value.trim();
        if(v){
          const pfx=v.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,4);
          const ex=S.recs.orders.filter(o=>o.contract_no&&o.contract_no.startsWith(pfx+'/'));
          cnoEl.value=`${pfx}/${fy()}/${String(ex.length+1).padStart(3,'0')}`;
        }
      });
    }
  },80);
}

    <td>${bdg(r.bill_verified?'Yes':'No')}</td>

}
function openSurveyorModal(id){

  const body=`<div class="fg">
    ${sec('Survey Details')}
    <div class="fgrp"><label>Survey Date</label><input type="date" id="sv_date" value="${r.survey_date||today()}"></div>
    <div class="fgrp"><label>Loading Assignment ID</label><select id="sv_aid"><option value="">— Select —</option>${assignments.map(l=>`<option value="${l.assignment_id||l.id}"${r.assignment_id===(l.assignment_id||l.id)?' selected':''}>${l.assignment_id||l.id} · ${l.booking_ref||'—'}</option>`).join('')}</select></div>
    <div class="fgrp"><label>Container No.</label><input id="sv_cno" value="${r.container_no||''}"></div>
    <div class="fgrp"><label>Vendor</label><input id="sv_vendor" value="${r.vendor||''}"></div>

    ${sec('Survey Outcome')}

    <div class="fgrp full"><label>Fail Reason (if failed)</label><input id="sv_fail" value="${r.fail_reason||''}"></div>
    <div class="fgrp"><label>Resolution</label><select id="sv_res">${sel(['—','Cargo Passed — Loaded','New Material Manufactured','Sent to Different Vendor','New Order Created','Loaded at Discount'],r.resolution||'—')}</select></div>
    <div class="fgrp"><label>Alternate Vendor (if redirected)</label><input id="sv_altv" value="${r.alternate_vendor||''}"></div>
    ${sec('Loading & Billing')}

    <div class="fgrp"><label>Vendor Bill Received?</label><select id="sv_bill">${sel(['No','Yes'],r.bill_verified?'Yes':'No')}</select></div>

    <div class="fgrp"><label>Invoice Created?</label><select id="sv_inv">${sel(['No','Yes','Partial'],r.invoice_created||'No')}</select></div>
    <div class="fgrp"><label>Invoice No.</label><input id="sv_invno" value="${r.invoice_no||''}"></div>
    <div class="fgrp"><label>Invoice Qty (MT)</label><input type="number" id="sv_invqty" value="${r.invoice_qty||''}"></div>
    <div class="fgrp full"><label>Remarks</label><textarea id="sv_rem">${r.remarks||''}</textarea></div>
  </div>`;
  openModal(mw(id?'Edit Survey Report':'New Surveyor Report',body,id?`saveSurveyor('${id}')`:'saveSurveyor()'));
}
async function saveSurveyor(id){
  const data={survey_date:fv('sv_date')||null,assignment_id:fv('sv_aid'),container_no:fv('sv_cno'),vendor:fv('sv_vendor'),qty_surveyed:fv('sv_qty')||null,surveyor_name:fv('sv_name'),survey_result:fv('sv_result'),fail_reason:fv('sv_fail'),resolution:fv('sv_res'),alternate_vendor:fv('sv_altv'),weighment_slip:fv('sv_wt')==='Yes',bill_verified:fv('sv_bill')==='Yes',actual_loaded_qty:fv('sv_loaded')||null,invoice_created:fv('sv_inv'),invoice_no:fv('sv_invno'),invoice_qty:fv('sv_invqty')||null,remarks:fv('sv_rem')};
  if(!id)data.id=uid('SUR');
  await saveRec('surveyor',data,id||null);
}

function renderCustoms(){
  const rows=(S.recs.customs||[]).filter(o=>!S.search||[o.container_no,o.leo_copy_no,o.order_id].join(' ').toLowerCase().includes(S.search.toLowerCase()));
  return`<div class="sbar"><input placeholder="Search container, LEO…" value="${S.search||''}" oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderCustoms()"><button class="pri" onclick="openCustomsModal()">+ Add Customs Record</button></div>`+
  `<div class="card">`+tbl(rows,['ID','Date','Container No.','Contract Ref','Clearing Agent','Customs Entry','LEO Copy No.','LEO Date','Gate-In Date','Seal No.','Port','Status','Actions'],r=>`<tr>
    <td><span class="mono" style="color:var(--txt3)">${r.id}</span></td>
    <td>${r.entry_date||'—'}</td>
    <td><strong>${r.container_no||'—'}</strong></td><td>${r.order_id||'—'}</td>
    <td>${r.clearing_agent||'—'}</td>
    <td class="mono">${r.customs_entry_no||'—'}</td>
    <td class="mono" style="color:var(--blue)">${r.leo_copy_no||'—'}</td>
    <td>${r.leo_date||'—'}</td><td>${r.gate_in_date||'—'}</td>
    <td class="mono">${r.seal_no||'—'}</td><td>${r.port_name||'—'}</td>
    <td>${bdg(r.status||'Clearance Pending')}</td>
    <td><div class="acell"><button class="sm" onclick="openCustomsModal('${r.id}')">Edit</button><button class="sm danger" onclick="delRec('customs','${r.id}')">Del</button></div></td>
  </tr>`,'No customs records yet.')+`</div>`;
}
function openCustomsModal(id){
  const r=id?(S.recs.customs||[]).find(o=>o.id===id):{};
  const body=`<div class="fg">
    ${sec('Customs Details')}
    <div class="fgrp"><label>Date</label><input type="date" id="cu_date" value="${r.entry_date||today()}"></div>
    <div class="fgrp"><label>Container No.</label><input id="cu_cno" value="${r.container_no||''}"></div>
    <div class="fgrp"><label>Linked Contract / Order</label><input id="cu_order" value="${r.order_id||''}"></div>
    <div class="fgrp"><label>Clearing Agent (CHA)</label><input id="cu_agent" value="${r.clearing_agent||''}"></div>
    <div class="fgrp"><label>Customs Entry No.</label><input id="cu_entry" value="${r.customs_entry_no||''}"></div>
    <div class="fgrp"><label>Clearance Date</label><input type="date" id="cu_cdate" value="${r.clearance_date||''}"></div>
    ${sec('Port Entry')}
    <div class="fgrp"><label>LEO Copy No.</label><input id="cu_leo" value="${r.leo_copy_no||''}"></div>
    <div class="fgrp"><label>LEO Date</label><input type="date" id="cu_leodate" value="${r.leo_date||''}"></div>
    <div class="fgrp"><label>Gate-In Date</label><input type="date" id="cu_gatein" value="${r.gate_in_date||''}"></div>

    <div class="fgrp"><label>Port Name</label><input id="cu_port" value="${r.port_name||''}"></div>
    <div class="fgrp"><label>Berth / Terminal</label><input id="cu_berth" value="${r.berth_terminal||''}"></div>
    <div class="fgrp"><label>Status</label><select id="cu_status">${sel(['Clearance Pending','LEO Received','Gate-In Done','Loaded on Vessel'],r.status||'Clearance Pending')}</select></div>

async function saveCustoms(id){
  const data={entry_date:fv('cu_date')||null,container_no:fv('cu_cno'),order_id:fv('cu_order')||null,clearing_agent:fv('cu_agent'),customs_entry_no:fv('cu_entry'),clearance_date:fv('cu_cdate')||null,leo_copy_no:fv('cu_leo'),leo_date:fv('cu_leodate')||null,gate_in_date:fv('cu_gatein')||null,seal_no:fv('cu_seal'),gate_pass_no:fv('cu_gatepass'),port_name:fv('cu_port'),berth_terminal:fv('cu_berth'),status:fv('cu_status'),remarks:fv('cu_rem')};
  if(!id)data.id=uid('CUS');
  await saveRec('customs',data,id||null);
}

function renderRates(){
  const rows=(S.recs.rates||[]).filter(r=>!S.search||[r.category,r.provider,r.description].join(' ').toLowerCase().includes(S.search.toLowerCase()));
  return`<div class="sbar"><input placeholder="Filter…" value="${S.search||''}" oninput="S.search=this.value;document.getElementById('ca').innerHTML=renderRates()"><button class="pri" onclick="openRateModal()">+ Add Rate</button></div>`+
  `<div class="card">`+tbl(rows,['Category','Provider','Description','Rate','Unit','Effective From','Actions'],r=>`<tr>
    <td><span class="badge bb">${r.category||'—'}</span></td>
    <td><strong>${r.provider||'—'}</strong></td><td>${r.description||'—'}</td>
    <td class="mono" style="color:var(--green)">${fmt(r.rate)}</td>
    <td>${r.unit||'—'}</td><td>${r.effective_from||'—'}</td>
    <td><div class="acell"><button class="sm" onclick="openRateModal('${r.id}')">Edit</button><button class="sm danger" onclick="delRec('rates','${r.id}')">Del</button></div></td>
  </tr>`,'No rates defined yet.')+`</div>`;
}
function openRateModal(id){
  const r=id?(S.recs.rates||[]).find(o=>o.id===id):{};
  const body=`<div class="fg">
    <div class="fgrp"><label>Category</label><select id="r_cat">${sel(['Freight','Transporter','Clearing','Phyto','Fumigation','Plot Charges','Survey'],r.category||'Freight')}</select></div>

    <div class="fgrp"><label>Unit</label><input id="r_unit" value="${r.unit||'per container'}"></div>

    <div class="fgrp full"><label>Remarks</label><textarea id="r_rem">${r.remarks||''}</textarea></div>

async function saveRate(id){
  const data={category:fv('r_cat'),provider:fv('r_prov'),description:fv('r_desc'),rate:fv('r_rate')||null,unit:fv('r_unit'),effective_from:fv('r_from')||null,remarks:fv('r_rem')};
  if(!id)data.id=uid('RATE');
  await saveRec('rates',data,id||null);
}

// ── Page registry ──────────────────────────────────────────
const pages={
  dashboard:{title:'Dashboard',render:renderDash},
  orders:{title:'Orders & Contracts',render:renderOrders},
  purchases:{title:'Raw Material Purchase',render:renderPurchases},
  containers:{title:'Container Bookings',render:renderContainers},
  transporters:{title:'Transporters & Plot Charges',render:renderTransporters},
  loading:{title:'Loading Assignment',render:renderLoading},
  surveyor:{title:'Surveyor Report & Loading',render:renderSurveyor},
  customs:{title:'Customs & Port Entry',render:renderCustoms},
  rates:{title:'Master Rates',render:renderRates},
};

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
renderAll();
loadAll();
</script>
